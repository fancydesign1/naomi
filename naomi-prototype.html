<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAOMI · Clickable Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
  :root{
    --paper:#FAF6EF; --paperDeep:#F2ECDF; --ink:#1C1B19; --inkSoft:#5B564C;
    --line:#E3DCC9; --clay:#B8645A; --clayDeep:#8F4A42; --clayBg:#FBF1EE;
    --navy:#1F3A35; --gold:#C9A24B; --goldSoft:#E7D9AE; --cream:#FFFCF6;
    --ok:#5F7F5C; --okBg:#EAF1E8;
    --fontDisplay:"Fraunces","Iowan Old Style",Georgia,serif;
    --fontBody:"Inter",-apple-system,"Segoe UI",sans-serif;
    --fontMono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:radial-gradient(circle at 20% 10%, #F5EEDD, var(--paperDeep) 70%);
    display:flex; flex-direction:column; align-items:center;
    padding:40px 16px 60px; font-family:var(--fontBody);
  }
  .pageHeader{ text-align:center; margin-bottom:28px; max-width:480px; }
  .pageHeader .eyebrow{ font-family:var(--fontMono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--clayDeep); margin-bottom:8px; }
  .pageHeader h1{ font-family:var(--fontDisplay); font-size:28px; color:var(--ink); margin:0; }
  .pageHeader p{ font-size:13px; color:var(--inkSoft); margin-top:8px; }

  .layout{ display:flex; gap:28px; align-items:flex-start; }
  .phoneCol{ display:flex; flex-direction:column; align-items:center; gap:14px; }

  .phoneFrame{
    width:360px; height:740px; border-radius:44px; background:var(--ink);
    padding:10px; box-shadow:0 30px 60px rgba(28,27,25,.35), 0 2px 0 rgba(255,255,255,.4) inset;
    position:relative; flex-shrink:0;
  }
  .phoneScreen{
    width:100%; height:100%; border-radius:36px; background:var(--paper);
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .statusBar{
    height:44px; display:flex; align-items:center; justify-content:space-between;
    padding:0 26px; font-family:var(--fontBody); font-size:13px; font-weight:600;
    color:var(--ink); flex-shrink:0; transition:color .2s ease;
  }
  .statusBar.dark{ color:var(--cream); }
  .statusIcons{ display:flex; gap:5px; align-items:center; }
  .screenBody{ flex:1; position:relative; overflow:hidden; }
  .homeIndicatorWrap{ height:18px; display:flex; justify-content:center; align-items:flex-end; padding-bottom:6px; flex-shrink:0; }
  .homeIndicator{ width:120px; height:4px; border-radius:4px; background:rgba(28,27,25,.3); transition:background .2s ease; }
  .homeIndicator.dark{ background:rgba(255,252,246,.5); }

  .screen{
    height:100%; padding:28px; display:flex; flex-direction:column;
    justify-content:flex-start; font-family:var(--fontBody); color:var(--ink);
    box-sizing:border-box; overflow-y:auto; background:var(--paper);
  }
  .screen.justifyBetween{ justify-content:space-between; }
  .screen.justifyCenter{ justify-content:center; }

  .screenLabel{ font-family:var(--fontMono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--inkSoft); margin-bottom:14px; }

  .btn{
    width:100%; padding:16px 20px; border-radius:14px; border:none;
    background:var(--clay); color:var(--cream); font-family:var(--fontBody);
    font-size:15.5px; font-weight:600; cursor:pointer; transition:all .18s ease;
    box-shadow:0 4px 10px rgba(28,27,25,.12);
  }
  .btn:hover{ transform:translateY(-1px); box-shadow:0 8px 18px rgba(184,100,90,.35); }
  .btn:disabled{ opacity:.4; cursor:default; }
  .btn:disabled:hover{ transform:none; box-shadow:0 4px 10px rgba(28,27,25,.12); }
  .btn.dark{ background:var(--ink); }
  .btn.gold{ background:var(--gold); color:var(--navy); }
  .btn.navy{ background:var(--navy); }

  .btnGhost{
    width:100%; padding:14px 20px; border-radius:14px; border:1px solid var(--line);
    background:transparent; color:var(--ink); font-family:var(--fontBody);
    font-size:14.5px; font-weight:600; cursor:pointer;
  }
  .btnGhost:disabled{ opacity:.4; cursor:default; }

  .textLink{
    background:none; border:none; color:var(--inkSoft); font-family:var(--fontBody);
    font-size:13px; cursor:pointer; text-decoration:underline; text-decoration-color:var(--line); padding:0;
  }

  h1.disp{ font-family:var(--fontDisplay); margin:8px 0 18px; line-height:1.2; }
  .bodyMuted{ font-size:13.5px; color:var(--inkSoft); }

  .row{ display:flex; gap:10px; }
  .col{ display:flex; flex-direction:column; gap:10px; }

  input.field{
    padding:15px 16px; border-radius:12px; border:1px solid var(--line);
    background:var(--cream); font-family:var(--fontBody); font-size:14.5px; outline:none; width:100%;
  }

  .trustNote{ margin-top:22px; padding:12px 14px; border-radius:12px; background:var(--paperDeep); font-size:12px; color:var(--inkSoft); line-height:1.5; }

  .otpRow{ display:flex; gap:8px; justify-content:center; }
  .otpBox{
    width:38px; height:48px; border-radius:10px; border:1.5px solid var(--line);
    background:var(--cream); display:flex; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer; color:var(--clay); transition:border-color .15s ease;
  }
  .otpBox.filled{ border-color:var(--clay); }

  .checkRow{ display:flex; align-items:center; gap:12px; }
  .checkDot{
    width:20px; height:20px; border-radius:50%; border:1.5px solid rgba(255,252,246,.3);
    display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--navy);
    flex-shrink:0; transition:all .3s ease;
  }
  .checkDot.done{ background:var(--gold); border-color:var(--gold); }

  .naomiRow{ display:flex; gap:8px; align-items:flex-start; margin-bottom:12px; }
  .naomiAvatar{
    width:28px; height:28px; border-radius:50%; background:var(--navy); color:var(--goldSoft);
    font-family:var(--fontDisplay); font-style:italic; font-size:13px; display:flex;
    align-items:center; justify-content:center; flex-shrink:0;
  }
  .naomiAvatar.onDark{ background:var(--gold); color:var(--navy); width:32px; height:32px; font-size:15px; }
  .naomiBubble{
    background:var(--cream); border:1px solid var(--line); border-radius:4px 16px 16px 16px;
    padding:12px 15px; font-size:14px; line-height:1.5; max-width:78%; font-family:var(--fontDisplay);
  }
  .userRow{ display:flex; justify-content:flex-end; margin-bottom:12px; }
  .userBubble{ background:var(--clay); color:var(--cream); border-radius:16px 4px 16px 16px; padding:11px 16px; font-size:14px; max-width:72%; }

  .trustThread{ display:flex; gap:4px; align-items:center; height:36px; }
  .trustSeg{ width:26px; height:5px; border-radius:4px; background:var(--line); transition:background .3s ease; }
  .trustSeg.done{ background:var(--navy); }
  .trustSeg.doneGold{ background:var(--gold); }
  .trustSeg.current{ background:var(--clay); }

  .dnaCard{ border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; background:var(--cream); }
  .dnaCardTitle{ font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--inkSoft); margin-bottom:10px; }
  .tagRow{ display:flex; flex-wrap:wrap; gap:7px; }
  .tag{ font-size:12.5px; padding:5px 11px; border-radius:20px; background:var(--clayBg); color:var(--clayDeep); }
  .tag.ok{ background:var(--okBg); color:var(--ok); }
  .tag.muted{ background:var(--paperDeep); color:var(--inkSoft); }
  .orderedItem{ display:flex; gap:9px; font-size:13.5px; margin-bottom:7px; }
  .orderedItem .num{ font-family:var(--fontMono); color:var(--clay); font-weight:700; }

  .navyBox{ background:var(--navy); border-radius:16px; padding:18px; color:var(--cream); }
  .navyBoxLabel{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--goldSoft); margin-bottom:12px; }
  .navyBoxItem{ display:flex; gap:10px; font-size:13px; line-height:1.4; margin-bottom:10px; }

  .docBox{
    height:200px; border-radius:16px; border:2px dashed var(--line); background:var(--cream);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; cursor:pointer;
  }
  .docBox.captured{ border-color:var(--ok); background:var(--okBg); }

  .progressTrack{ height:8px; border-radius:6px; background:var(--paperDeep); overflow:hidden; margin-bottom:8px; }
  .progressFill{ height:100%; background:var(--clay); }

  .unlockItem{ display:flex; gap:10px; align-items:center; padding:12px 14px; border-radius:12px; background:var(--clayBg); margin-bottom:9px; }

  .navRow{ display:flex; gap:10px; align-items:center; }
  .backBtn{
    padding:9px 16px; border-radius:10px; border:1px solid var(--line); background:var(--cream);
    font-size:12.5px; cursor:pointer; font-family:var(--fontBody);
  }
  .backBtn:disabled{ opacity:.4; cursor:default; }
  .stepBadge{ font-family:var(--fontMono); font-size:11px; color:var(--inkSoft); padding:9px 14px; border-radius:10px; background:var(--paperDeep); }

  .jumpNav{ width:230px; max-height:740px; overflow-y:auto; background:var(--cream); border:1px solid var(--line); border-radius:18px; padding:16px; }
  .jumpNav .jnTitle{ font-family:var(--fontMono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--inkSoft); margin-bottom:12px; }
  .jnSection{ margin-bottom:10px; }
  .jnSection .jnSecLabel{ font-size:11px; font-weight:700; color:var(--clayDeep); margin-bottom:5px; }
  .jnBtn{
    display:block; width:100%; text-align:left; padding:6px 9px; border-radius:8px; border:none;
    background:transparent; color:var(--ink); font-weight:400; font-size:12px; cursor:pointer; font-family:var(--fontBody);
  }
  .jnBtn.active{ background:var(--clayBg); color:var(--clayDeep); font-weight:700; }

  @media (max-width: 760px){
    .layout{ flex-direction:column; align-items:center; }
    .jumpNav{ width:360px; max-height:260px; }
  }
</style>
</head>
<body>

  <div class="pageHeader">
    <div class="eyebrow">Naomi &middot; Clickable Prototype</div>
    <h1>Awareness &rarr; Onboarding &rarr; Relationship DNA &rarr; Activation</h1>
    <p>Click through the phone like a real user. Matching &amp; first-date flows are out of scope for this pass.</p>
  </div>

  <div class="layout">
    <div class="phoneCol">
      <div class="phoneFrame">
        <div class="phoneScreen">
          <div class="statusBar" id="statusBar">
            <span>9:41</span>
            <div class="statusIcons" id="statusIcons"></div>
          </div>
          <div class="screenBody" id="screenBody"></div>
          <div class="homeIndicatorWrap">
            <div class="homeIndicator" id="homeIndicator"></div>
          </div>
        </div>
      </div>
      <div class="navRow">
        <button class="backBtn" id="backBtn">&larr; Back</button>
        <div class="stepBadge" id="stepBadge">&mdash;</div>
      </div>
    </div>

    <div class="jumpNav">
      <div class="jnTitle">Jump to screen</div>
      <div id="jumpNavContent"></div>
    </div>
  </div>

<script>
/* ============================================================
   NAOMI — Standalone Clickable Prototype (vanilla JS port)
   Mirrors NaomiPrototype.jsx screen-for-screen, no build step.
   ============================================================ */

const $body = document.getElementById('screenBody');
const $statusBar = document.getElementById('statusBar');
const $statusIcons = document.getElementById('statusIcons');
const $homeIndicator = document.getElementById('homeIndicator');
const $backBtn = document.getElementById('backBtn');
const $stepBadge = document.getElementById('stepBadge');
const $jumpNavContent = document.getElementById('jumpNavContent');

let history = ['splash'];
let timers = [];

function clearTimers(){ timers.forEach(t => clearTimeout(t) || clearInterval(t)); timers = []; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const STATUS_ICONS = `
  <svg width="16" height="11" viewBox="0 0 16 11" fill="none"><g class="sigfill">
  <rect x="0" y="7" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="6" rx="0.5"/>
  <rect x="9" y="3" width="3" height="8" rx="0.5"/><rect x="13.5" y="0" width="3" height="11" rx="0.5"/></g></svg>
  <svg width="15" height="11" viewBox="0 0 15 11" fill="none"><g class="sigfill">
  <path d="M7.5 9.8a1.1 1.1 0 110 2.2 1.1 1.1 0 010-2.2z"/><path d="M4.4 7.2a4.4 4.4 0 016.2 0l-1 1a3 3 0 00-4.2 0l-1-1z"/>
  <path d="M1.8 4.6a8 8 0 0111.4 0l-1 1a6.6 6.6 0 00-9.4 0l-1-1z"/></g></svg>
  <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
  <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" class="sigstroke" opacity="0.5"/>
  <rect x="2" y="2" width="17" height="8" rx="1.5" class="sigfill"/>
  <rect x="21.5" y="4" width="1.5" height="4" rx="0.7" class="sigfill" opacity="0.5"/></svg>
`;
$statusIcons.innerHTML = STATUS_ICONS;

function setStatusDark(dark){
  $statusBar.classList.toggle('dark', dark);
  $homeIndicator.classList.toggle('dark', dark);
  document.querySelectorAll('.sigfill').forEach(el => el.setAttribute('fill', dark ? '#FFFCF6' : '#1C1B19'));
  document.querySelectorAll('.sigstroke').forEach(el => el.setAttribute('stroke', dark ? '#FFFCF6' : '#1C1B19'));
}

// ── 3-tier KYC question bank ─────────────────────────────────────────────────
// Tier 1 — Essentials (required, gates first matches, ~3 min)
// Goal: relationship intent + life context. Low-stakes, easy to answer.
const T1_QUESTIONS = [
  { q: "What kind of relationship are you looking for?",         hint: "Marriage, long-term, still figuring it out — all honest answers." },
  { q: "Do you have kids? Do you want kids?",                    hint: "Both questions in one — answer however feels natural." },
  { q: "What do you do for work — in your own words?",          hint: "Not your job title. What you actually do." },
  { q: "How would you describe yourself in a few sentences?",   hint: "Not the dating-profile version. The real one." },
  { q: "What would a perfect day look like for you?",           hint: "From morning to night. Don\'t edit it." },
];

// Tier 2 — High-signal personality layer (~5 min, shown post-T1, deferrable)
// Goal: values, quirks, emotional patterns. Indirect questions reveal the most.
const T2_QUESTIONS = [
  { q: "What do you value most in a friendship?",               hint: "Think of your closest friend. What makes them irreplaceable?" },
  { q: "What are you obsessed about right now?",                hint: "The thing you can\'t stop thinking or talking about." },
  { q: "What do you irrationally hate?",                        hint: "Something small that bothers you more than it should." },
  { q: "Before making a phone call, do you rehearse what to say? Why?",   hint: "No wrong answer — this tells us how your mind works." },
  { q: "Is there something you\'ve dreamt of doing for a long time?",    hint: "And why haven\'t you done it yet?" },
  { q: "How do you define success?",                            hint: "Not the LinkedIn version." },
  { q: "What music gives you goosebumps?",                      hint: "Name a specific song or moment if you can." },
  { q: "What have you made recently?",                          hint: "Cooked, built, written, grown — anything counts." },
];

// Tier 3 — Depth layer (optional, unlocked after first match, shown in-app)
// Goal: vulnerability, emotional range, self-awareness. Never shown during onboarding.
const T3_QUESTIONS = [
  { q: "When did you last cry in front of another person?",     hint: "And were you okay with it?" },
  { q: "What\'s the hardest thing you\'ve ever done?",        hint: "Not necessarily the most dramatic." },
  { q: "If a crystal ball could tell you the truth about anything — what would you ask?", hint: "Take your time." },
  { q: "What would you do if you had no fear?",                 hint: "Be specific." },
  { q: "What\'s your proudest accomplishment?",                hint: "Something only you would think to mention." },
  { q: "What do you wish you were better at saying no to?",     hint: "Be honest." },
  { q: "If you could wake up tomorrow with one new ability — what would it be?", hint: "Not a superpower. Something real." },
  { q: "What makes a house a home?",                            hint: "Objects, people, feelings — go wherever this takes you." },
];

const FLOW_ORDER = [
  "splash","trailer","trust","entry","register","mobileotp",
  "devicetrust","naomiintro",
  "t1intro","t1questions","t1done",
  "t2intro","t2questions","t2deferred",
  "interviewdone","processing","profileready",
  "celebration","dna",
  "badge1intro","badge1doc","badge1bio","badge1age","badge1done",
  "badge2intro","badge2doc","badge2done",
  "badge3intro","badge3wait","badge3done",
  "activation",
  "paywall",
  "photoupload","photocoach",
  "startmatching","matchwaiting",
  "matchnotif","matchreveal","matchdeepdive","whyyoufit","thereveal","mutualmatch",
  "datebriefing","venueengine","dayoftoolkit","postdatecheckin",
  "relationshipbuilding","milestone","successfee","offboarding",
];
const SECTION_LABELS = {
  splash:"Awareness", trailer:"Awareness", trust:"Awareness",
  entry:"Onboarding", register:"Onboarding", mobileotp:"Onboarding", devicetrust:"Onboarding",
  naomiintro:"The Essentials",
  t1intro:"The Essentials", t1questions:"The Essentials", t1done:"The Essentials",
  t2intro:"Who You Really Are", t2questions:"Who You Really Are", t2deferred:"Who You Really Are",
  textintro:"Interview", schedule:"Interview", interviewdone:"Interview",
  processing:"DNA Profile", profileready:"DNA Profile", celebration:"DNA Profile", dna:"DNA Profile",
  badge1intro:"Verification L1", badge1doc:"Verification L1", badge1bio:"Verification L1", badge1age:"Verification L1", badge1done:"Verification L1",
  badge2intro:"Verification L2", badge2doc:"Verification L2", badge2done:"Verification L2",
  badge3intro:"Verification L3", badge3wait:"Verification L3", badge3done:"Verification L3",
  activation:"Activation",
  paywall:"Subscription",
  photoupload:"Photo Setup", photocoach:"Photo Setup",
  startmatching:"Matching", matchwaiting:"Matching",
  matchnotif:"Matching", matchreveal:"Matching", matchdeepdive:"Matching", whyyoufit:"Matching", thereveal:"Matching", mutualmatch:"Matching",
  datebriefing:"First Date", venueengine:"First Date", dayoftoolkit:"First Date", postdatecheckin:"First Date",
  relationshipbuilding:"Relationship & Beyond", milestone:"Relationship & Beyond", successfee:"Relationship & Beyond", offboarding:"Relationship & Beyond",
};
const DARK_STATUS_SCREENS = new Set(["splash","trailer","devicetrust","processing","activation","t1questions","matchwaiting","paywall","thereveal"]);

function go(id){
  if (!RENDERERS[id]) return;
  history.push(id);
  render(id);
}
function jumpTo(id){
  history.push(id);
  render(id);
}
function back(){
  if (history.length < 2) return;
  history.pop();
  render(history[history.length - 1], true);
}

function trustThreadHTML(stage){
  let html = '<div class="trustThread">';
  for (let s = 0; s < 3; s++){
    const done = stage > s, current = stage === s;
    let cls = 'trustSeg';
    if (done) cls += (stage >= 3 ? ' doneGold' : ' done');
    else if (current) cls += ' current';
    html += `<div class="${cls}"></div>`;
  }
  return html + '</div>';
}

/* ============================================================
   RENDERERS — each returns/injects HTML and wires its own events
   ============================================================ */
const RENDERERS = {};

RENDERERS.splash = function(){
  $body.innerHTML = `
    <div class="screen justifyCenter" style="background:var(--navy);align-items:center;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:18px;">
        <div style="width:64px;height:64px;border-radius:50%;border:1.5px solid var(--goldSoft);display:flex;align-items:center;justify-content:center;">
          <span style="font-family:var(--fontDisplay);font-size:28px;color:var(--cream);font-style:italic;">N</span>
        </div>
        <div style="font-family:var(--fontDisplay);font-size:30px;color:var(--cream);letter-spacing:.02em;">naomi</div>
        <div style="font-family:var(--fontMono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--goldSoft);margin-top:4px;">
          the world&rsquo;s first ai matchmaker
        </div>
      </div>
    </div>`;
  timers.push(setTimeout(() => go('trailer'), 2200));
};

RENDERERS.trailer = function(){
  const lines = [
    ["Meet Naomi.", 26],
    ["Not another dating app.", 18],
    ["Not endless swiping.", 18],
    ["She gets to know your values, your goals, your Relationship DNA &mdash;", 18],
    ["then searches for people who genuinely fit it.", 18],
  ];
  $body.innerHTML = `
    <div class="screen justifyBetween" style="background:var(--navy);">
      <div>
        <div class="screenLabel" style="color:var(--goldSoft);">trailer</div>
        <div style="margin-top:30px;display:flex;flex-direction:column;gap:16px;">
          ${lines.map(([t,s]) => `<div style="font-family:var(--fontDisplay);font-size:${s}px;color:var(--cream);line-height:1.3;opacity:.95;">${t}</div>`).join('')}
        </div>
      </div>
      <button class="btn gold" id="goTrust">Continue</button>
    </div>`;
  document.getElementById('goTrust').onclick = () => go('trust');
};

RENDERERS.trust = function(){
  const principles = [
    ["Your privacy comes first.", "We never sell your data or sell you to advertisers."],
    ["We don&rsquo;t optimize for swipes.", "Our algorithm isn&rsquo;t built to keep you scrolling."],
    ["We only succeed when you do.", "Our incentives are tied to outcomes, not screen time."],
    ["Every member is verified.", "Identity and trust checks, before anyone is introduced."],
  ];
  $body.innerHTML = `
    <div class="screen justifyBetween">
      <div>
        <div class="screenLabel">trust manifesto</div>
        <h1 class="disp" style="font-size:30px;line-height:1.15;">Trust comes <span style="font-style:italic;color:var(--clay);">first.</span></h1>
        <div style="display:flex;flex-direction:column;gap:18px;">
          ${principles.map(([t,d]) => `
            <div style="display:flex;gap:12px;align-items:flex-start;">
              <div style="width:6px;height:6px;border-radius:50%;background:var(--clay);margin-top:8px;flex-shrink:0;"></div>
              <div>
                <div style="font-weight:700;font-size:14.5px;">${t}</div>
                <div style="font-size:13px;color:var(--inkSoft);margin-top:2px;">${d}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>

function renderOtp(title, sub, nextId, digits){
  let code = new Array(digits).fill('');
  let seconds = 42;
  $body.innerHTML = `
    <div class="screen justifyBetween">
      <div>
        <div class="screenLabel">${sub}</div>
        <h1 class="disp" style="font-size:24px;margin-bottom:8px;">${title}</h1>
        <p class="bodyMuted" style="margin-bottom:24px;">Enter the ${digits}-digit code we sent you.</p>
        <div class="otpRow" id="otpRow"></div>
        <div style="display:flex;justify-content:space-between;margin-top:18px;">
          <button class="textLink" id="resendLink">Resend in 0:42</button>
          <button class="textLink">Wrong number?</button>
        </div>
      </div>
      <button class="btn" id="verifyBtn" style="opacity:.45;">Verify</button>
    </div>`;
  const $row = document.getElementById('otpRow');
  const $verify = document.getElementById('verifyBtn');
  function paintBoxes(){
    $row.innerHTML = code.map((c,i) => `<div class="otpBox ${c ? 'filled':''}" data-i="${i}">${c}</div>`).join('');
    $row.querySelectorAll('.otpBox').forEach(box => {
      box.onclick = () => {
        const i = +box.dataset.i;
        code[i] = code[i] ? '' : '&bull;';
        paintBoxes();
        const filled = code.filter(Boolean).length;
        $verify.style.opacity = filled === digits ? 1 : .45;
      };
    });
  }
  paintBoxes();
  const $resend = document.getElementById('resendLink');
  const timer = setInterval(() => {
    seconds = seconds > 0 ? seconds - 1 : 0;
    $resend.textContent = seconds > 0 ? `Resend in 0:${String(seconds).padStart(2,'0')}` : 'Resend code';
  }, 1000);
  timers.push(timer);
  $resend.onclick = () => { seconds = 42; };
  $verify.onclick = () => { if (code.filter(Boolean).length === digits) go(nextId); };
}

RENDERERS.t1questions = function(){
  let qi = 0;
  let answers = new Array(T1_QUESTIONS.length).fill('');
  let recording = false;
  let transcriptTimer = null;
  const TRANSCRIPT_SIMS = [
    "I'm looking for something serious, ideally leading to marriage...",
    "I have one daughter, seven years old. I'd love more kids someday...",
    "I work in marketing — brand strategy for a tech company in Manhattan...",
    "People say I'm warm but direct. I care a lot and I move fast when I trust someone...",
    "A perfect day starts with a run, good coffee, then something creative in the afternoon...",
  ];

  function stopRecording(){
    recording = false;
    if (transcriptTimer){ clearInterval(transcriptTimer); transcriptTimer = null; }
  }

  function paint(){
    const q = T1_QUESTIONS[qi];
    const progress = (qi / T1_QUESTIONS.length) * 100;
    const isVoice = kycMode === 'voice';

    $body.innerHTML = `
      <div class="screen justifyBetween" style="padding:22px;background:var(--navy);">
        <div style="flex:1;display:flex;flex-direction:column;">

          <!-- Header: back + progress + mode toggle -->
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
            <button id="t1Back" style="padding:6px 13px;border-radius:9px;border:1px solid rgba(255,252,246,.2);background:transparent;color:var(--goldSoft);font-size:12px;cursor:pointer;">&larr;</button>
            <div style="flex:1;">
              <div style="height:3px;border-radius:3px;background:rgba(255,252,246,.12);overflow:hidden;">
                <div style="height:100%;width:${progress}%;background:var(--gold);border-radius:3px;transition:width .4s ease;"></div>
              </div>
              <div style="font-family:var(--fontMono);font-size:10px;color:rgba(255,252,246,.4);margin-top:5px;letter-spacing:.08em;">${qi+1} of ${T1_QUESTIONS.length} &middot; The Essentials</div>
            </div>
            <button id="toggleMode" style="padding:5px 10px;border-radius:8px;border:1px solid rgba(255,252,246,.2);background:transparent;font-family:var(--fontBody);font-size:11.5px;color:rgba(255,252,246,.55);cursor:pointer;">${isVoice ? '✍️ Text' : '🎤 Voice'}</button>
          </div>

          <!-- Question + hint -->
          <div style="font-family:var(--fontDisplay);font-size:21px;color:var(--cream);line-height:1.4;margin-bottom:8px;">${q.q}</div>
          <div style="font-size:12px;color:rgba(255,252,246,.4);margin-bottom:${isVoice?'20px':'16px'};font-style:italic;">${q.hint}</div>

          ${isVoice ? `
          <!-- VOICE INPUT -->
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
            <!-- Waveform rings (animated when recording) -->
            <div style="position:relative;width:100px;height:100px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
              ${recording ? `
                <div style="position:absolute;width:100px;height:100px;border-radius:50%;border:1.5px solid rgba(201,162,75,.2);animation:ripple1 1.6s ease-out infinite;"></div>
                <div style="position:absolute;width:80px;height:80px;border-radius:50%;border:1.5px solid rgba(201,162,75,.3);animation:ripple1 1.6s ease-out infinite .4s;"></div>` : ''}
              <button id="micBtn" style="width:64px;height:64px;border-radius:50%;border:none;background:${recording?'var(--clay)':'rgba(201,162,75,.2)'};border:2px solid ${recording?'var(--clay)':'var(--gold)'};cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;position:relative;z-index:1;transition:all .2s ease;">
                ${recording ? '⏹' : '🎤'}
              </button>
            </div>

            <!-- Status label -->
            <div style="font-family:var(--fontMono);font-size:11px;letter-spacing:.1em;color:${recording?'var(--gold)':'rgba(255,252,246,.4)'};margin-bottom:14px;">
              ${recording ? 'RECORDING — tap to stop' : answers[qi] ? 'RECORDED — tap to re-record' : 'TAP TO START'}
            </div>

            <!-- Transcript preview -->
            <div style="width:100%;border-radius:12px;border:1px solid rgba(255,252,246,.12);background:rgba(255,252,246,.05);padding:12px 14px;min-height:72px;flex:1;">
              <div style="font-size:11px;font-family:var(--fontMono);color:rgba(255,252,246,.3);letter-spacing:.08em;margin-bottom:6px;">TRANSCRIPT</div>
              <div id="transcriptArea" style="font-size:13.5px;color:${answers[qi]?'rgba(255,252,246,.85)':'rgba(255,252,246,.3)'};line-height:1.55;font-style:${answers[qi]?'normal':'italic'};">
                ${answers[qi] || 'Your words will appear here as you speak...'}
              </div>
            </div>
            <div style="font-size:11px;color:rgba(255,252,246,.3);margin-top:8px;">Only you can see this transcript</div>
          </div>
          ` : `
          <!-- TEXT INPUT -->
          <textarea id="t1Answer" placeholder="Type your answer here…" style="flex:1;min-height:130px;border-radius:14px;border:1px solid rgba(255,252,246,.18);background:rgba(255,252,246,.07);color:var(--cream);font-family:var(--fontBody);font-size:15px;padding:14px 16px;resize:none;outline:none;line-height:1.5;">${answers[qi]}</textarea>
          `}
        </div>

        <!-- CTA -->
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:16px;">
          <button class="btn gold" id="t1Next">${qi < T1_QUESTIONS.length - 1 ? 'Next question' : 'Done — see my results'}</button>
        </div>
      </div>
      <style>
        @keyframes ripple1 { 0%{transform:scale(.85);opacity:.7} 100%{transform:scale(1.4);opacity:0} }
      </style>`;

    // Wire back
    document.getElementById('t1Back').onclick = () => {
      stopRecording();
      if (qi === 0) back(); else { qi--; paint(); }
    };

    // Wire mode toggle
    document.getElementById('toggleMode').onclick = () => {
      stopRecording();
      kycMode = kycMode === 'voice' ? 'text' : 'voice';
      paint();
    };

    // Wire voice mic
    if (isVoice) {
      document.getElementById('micBtn').onclick = () => {
        if (recording) {
          stopRecording();
          if (!answers[qi]) answers[qi] = TRANSCRIPT_SIMS[qi] || 'Answer recorded.';
          paint();
        } else {
          recording = true;
          answers[qi] = '';
          paint();
          // Simulate words appearing character by character
          const sim = TRANSCRIPT_SIMS[qi] || 'Thinking out loud...';
          const $t = document.getElementById('transcriptArea');
          if ($t) {
            $t.style.color = 'rgba(255,252,246,.85)';
            $t.style.fontStyle = 'normal';
            $t.textContent = '';
            let ci = 0;
            transcriptTimer = setInterval(() => {
              if (!$t.isConnected) { stopRecording(); return; }
              if (ci <= sim.length) { $t.textContent = sim.slice(0, ci); ci++; }
              else { stopRecording(); answers[qi] = sim; paint(); }
            }, 38);
            timers.push(transcriptTimer);
          }
        }
      };
    } else {
      const $ta = document.getElementById('t1Answer');
      if ($ta) { $ta.focus(); $ta.oninput = () => { answers[qi] = $ta.value; }; }
    }

    // Wire next
    document.getElementById('t1Next').onclick = () => {
      stopRecording();
      if (!isVoice) {
        const $ta = document.getElementById('t1Answer');
        if ($ta) answers[qi] = $ta.value.trim();
      }
      if (qi < T1_QUESTIONS.length - 1) { qi++; paint(); }
      else go('t1done');
    };
  }
  paint();
};

// ── TIER 2 QUESTIONS — voice + text modes ────────────────────────────────────
RENDERERS.t2questions = function(){
  let qi = 0;
  let answers = new Array(T2_QUESTIONS.length).fill('');
  let skipped = new Array(T2_QUESTIONS.length).fill(false);
  let recording = false;
  let transcriptTimer = null;
  const TRANSCRIPT_SIMS = [
    "My best friend is someone I can call at 2am. That kind of loyalty is everything...",
    "Right now it's urban planning — how cities are designed for people or against them...",
    "I irrationally hate when people don't reply to the last message in a conversation...",
    "Always. I rehearse everything. I think it's about wanting to show up well for people...",
    "I've always wanted to write a book. I keep saying 'not the right time' but honestly I'm scared...",
    "Success is waking up genuinely excited about what I'm doing that day...",
    "Anything with a real build — the moment the piano drops in a song you weren't expecting...",
    "I started baking sourdough last month. First loaf was terrible. Last one was actually good...",
  ];

  function stopRecording(){
    recording = false;
    if (transcriptTimer){ clearInterval(transcriptTimer); transcriptTimer = null; }
  }

  function paint(){
    const q = T2_QUESTIONS[qi];
    const progress = (qi / T2_QUESTIONS.length) * 100;
    const isVoice = kycMode === 'voice';

    $body.innerHTML = `
      <div class="screen justifyBetween" style="padding:22px;">
        <div style="flex:1;display:flex;flex-direction:column;">

          <!-- Header -->
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
            <button id="t2Back" style="padding:6px 13px;border-radius:9px;border:1px solid var(--line);background:var(--cream);color:var(--inkSoft);font-size:12px;cursor:pointer;">&larr;</button>
            <div style="flex:1;">
              <div style="height:3px;border-radius:3px;background:var(--paperDeep);overflow:hidden;">
                <div style="height:100%;width:${progress}%;background:var(--clay);border-radius:3px;transition:width .4s ease;"></div>
              </div>
              <div style="font-family:var(--fontMono);font-size:10px;color:var(--inkSoft);margin-top:5px;letter-spacing:.08em;">${qi+1} of ${T2_QUESTIONS.length} &middot; Who You Really Are</div>
            </div>
            <button id="t2ToggleMode" style="padding:5px 10px;border-radius:8px;border:1px solid var(--line);background:var(--cream);font-family:var(--fontBody);font-size:11.5px;color:var(--inkSoft);cursor:pointer;">${isVoice ? '✍️ Text' : '🎤 Voice'}</button>
          </div>

          <!-- Question + hint -->
          <div style="font-family:var(--fontDisplay);font-size:20px;color:var(--ink);line-height:1.4;margin-bottom:8px;">${q.q}</div>
          <div style="font-size:12px;color:var(--inkSoft);margin-bottom:${isVoice?'18px':'14px'};font-style:italic;">${q.hint}</div>

          ${isVoice ? `
          <!-- VOICE INPUT -->
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;">
            <!-- Mic with rings -->
            <div style="position:relative;width:90px;height:90px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;">
              ${recording ? `
                <div style="position:absolute;width:90px;height:90px;border-radius:50%;border:1.5px solid rgba(184,100,90,.2);animation:ripple1 1.6s ease-out infinite;"></div>
                <div style="position:absolute;width:72px;height:72px;border-radius:50%;border:1.5px solid rgba(184,100,90,.3);animation:ripple1 1.6s ease-out infinite .4s;"></div>` : ''}
              <button id="t2Mic" style="width:58px;height:58px;border-radius:50%;border:none;background:${recording?'var(--clay)':'var(--clayBg)'};border:2px solid ${recording?'var(--clay)':'var(--line)'};cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;z-index:1;transition:all .2s ease;">
                ${recording ? '⏹' : '🎤'}
              </button>
            </div>
            <div style="font-family:var(--fontMono);font-size:10.5px;letter-spacing:.1em;color:${recording?'var(--clay)':'var(--inkSoft)'};margin-bottom:12px;">
              ${recording ? 'RECORDING — tap to stop' : answers[qi] ? 'RECORDED — tap to redo' : 'TAP TO SPEAK'}
            </div>
            <!-- Transcript -->
            <div style="width:100%;border-radius:12px;border:1px solid var(--line);background:var(--cream);padding:12px 14px;min-height:68px;flex:1;">
              <div style="font-size:10.5px;font-family:var(--fontMono);color:var(--inkSoft);letter-spacing:.08em;margin-bottom:5px;">TRANSCRIPT</div>
              <div id="t2Transcript" style="font-size:13.5px;color:${answers[qi]?'var(--ink)':'var(--inkSoft)'};line-height:1.55;font-style:${answers[qi]?'normal':'italic'};">
                ${answers[qi] || 'Your words will appear here as you speak...'}
              </div>
            </div>
            <div style="font-size:11px;color:var(--inkSoft);margin-top:6px;">Only you can see this transcript</div>
          </div>
          ` : `
          <!-- TEXT INPUT -->
          <textarea id="t2Answer" placeholder="Share whatever comes to mind…" style="flex:1;min-height:120px;border-radius:14px;border:1px solid var(--line);background:var(--cream);color:var(--ink);font-family:var(--fontBody);font-size:15px;padding:14px 16px;resize:none;outline:none;line-height:1.5;">${answers[qi]}</textarea>
          `}
        </div>

        <!-- CTAs -->
        <div style="display:flex;flex-direction:column;gap:9px;margin-top:16px;">
          <button class="btn" id="t2Next">${qi < T2_QUESTIONS.length - 1 ? 'Next' : 'Finish'}</button>
          <button id="t2Skip" style="width:100%;background:none;border:none;color:var(--inkSoft);font-family:var(--fontBody);font-size:13px;cursor:pointer;padding:8px;text-decoration:underline;text-decoration-color:var(--line);">Skip this one →</button>
        </div>
      </div>`;

    // Wire back
    document.getElementById('t2Back').onclick = () => {
      stopRecording();
      if (qi === 0) back(); else { qi--; paint(); }
    };

    // Wire mode toggle
    document.getElementById('t2ToggleMode').onclick = () => {
      stopRecording();
      kycMode = kycMode === 'voice' ? 'text' : 'voice';
      paint();
    };

    // Wire voice mic
    if (isVoice) {
      document.getElementById('t2Mic').onclick = () => {
        if (recording) {
          stopRecording();
          if (!answers[qi]) answers[qi] = TRANSCRIPT_SIMS[qi] || 'Answer recorded.';
          paint();
        } else {
          recording = true;
          answers[qi] = '';
          paint();
          const sim = TRANSCRIPT_SIMS[qi] || 'Thinking...';
          const $t = document.getElementById('t2Transcript');
          if ($t) {
            $t.style.color = 'var(--ink)';
            $t.style.fontStyle = 'normal';
            $t.textContent = '';
            let ci = 0;
            transcriptTimer = setInterval(() => {
              if (!$t.isConnected) { stopRecording(); return; }
              if (ci <= sim.length) { $t.textContent = sim.slice(0, ci); ci++; }
              else { stopRecording(); answers[qi] = sim; paint(); }
            }, 38);
            timers.push(transcriptTimer);
          }
        }
      };
    } else {
      const $ta = document.getElementById('t2Answer');
      if ($ta) { $ta.focus(); $ta.oninput = () => { answers[qi] = $ta.value; skipped[qi] = false; }; }
    }

    // Wire next + skip
    const advance = () => {
      if (qi < T2_QUESTIONS.length - 1) { qi++; paint(); }
      else go('interviewdone');
    };
    document.getElementById('t2Next').onclick = () => {
      stopRecording();
      if (!isVoice) {
        const $ta = document.getElementById('t2Answer');
        if ($ta) answers[qi] = $ta.value.trim();
      }
      advance();
    };
    document.getElementById('t2Skip').onclick = () => {
      stopRecording();
      skipped[qi] = true; answers[qi] = '';
      advance();
    };
  }
  paint();
};

/* ============================================================
   Frame orchestration
   ============================================================ */
function render(id, skipPush){
  clearTimers();
  RENDERERS[id]();
  setStatusDark(DARK_STATUS_SCREENS.has(id));
  const idx = FLOW_ORDER.indexOf(id);
  $stepBadge.textContent = `${SECTION_LABELS[id] || '—'} · ${idx >= 0 ? idx + 1 : '?'}/${FLOW_ORDER.length}`;
  $backBtn.disabled = history.length < 2;
  paintJumpNav(id);
}

function paintJumpNav(current){
  const groups = {};
  FLOW_ORDER.forEach(id => {
    const sec = SECTION_LABELS[id] || '—';
    (groups[sec] = groups[sec] || []).push(id);
  });
  $jumpNavContent.innerHTML = Object.entries(groups).map(([sec, ids]) => `
    <div class="jnSection">
      <div class="jnSecLabel">${sec}</div>
      ${ids.map(id => `<button class="jnBtn ${id === current ? 'active' : ''}" data-id="${id}">${id}</button>`).join('')}
    </div>`).join('');
  $jumpNavContent.querySelectorAll('.jnBtn').forEach(b => {
    b.onclick = () => jumpTo(b.dataset.id);
  });
}

$backBtn.onclick = back;

render('splash');
</script>
