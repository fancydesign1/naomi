<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAOMI · Clickable Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
  :root{
    --paper:#FAF6EF; --paperDeep:#F2ECDF; --ink:#1C1B19; --inkSoft:#5B564C;
    --line:#E3DCC9; --clay:#B8645A; --clayDeep:#8F4A42; --clayBg:#FBF1EE;
    --navy:#1F3A35; --gold:#C9A24B; --goldSoft:#E7D9AE; --cream:#FFFCF6;
    --ok:#5F7F5C; --okBg:#EAF1E8;
    --fontDisplay:"Fraunces","Iowan Old Style",Georgia,serif;
    --fontBody:"Inter",-apple-system,"Segoe UI",sans-serif;
    --fontMono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:radial-gradient(circle at 20% 10%, #F5EEDD, var(--paperDeep) 70%);
    display:flex; flex-direction:column; align-items:center;
    padding:40px 16px 60px; font-family:var(--fontBody);
  }
  .pageHeader{ text-align:center; margin-bottom:28px; max-width:480px; }
  .pageHeader .eyebrow{ font-family:var(--fontMono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--clayDeep); margin-bottom:8px; }
  .pageHeader h1{ font-family:var(--fontDisplay); font-size:28px; color:var(--ink); margin:0; }
  .pageHeader p{ font-size:13px; color:var(--inkSoft); margin-top:8px; }

  .layout{ display:flex; gap:28px; align-items:flex-start; }
  .phoneCol{ display:flex; flex-direction:column; align-items:center; gap:14px; }

  .phoneFrame{
    width:360px; height:740px; border-radius:44px; background:var(--ink);
    padding:10px; box-shadow:0 30px 60px rgba(28,27,25,.35), 0 2px 0 rgba(255,255,255,.4) inset;
    position:relative; flex-shrink:0;
  }
  .phoneScreen{
    width:100%; height:100%; border-radius:36px; background:var(--paper);
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .statusBar{
    height:44px; display:flex; align-items:center; justify-content:space-between;
    padding:0 26px; font-family:var(--fontBody); font-size:13px; font-weight:600;
    color:var(--ink); flex-shrink:0; transition:color .2s ease;
  }
  .statusBar.dark{ color:var(--cream); }
  .statusIcons{ display:flex; gap:5px; align-items:center; }
  .screenBody{ flex:1; position:relative; overflow:hidden; }
  .homeIndicatorWrap{ height:18px; display:flex; justify-content:center; align-items:flex-end; padding-bottom:6px; flex-shrink:0; }
  .homeIndicator{ width:120px; height:4px; border-radius:4px; background:rgba(28,27,25,.3); transition:background .2s ease; }
  .homeIndicator.dark{ background:rgba(255,252,246,.5); }

  .screen{
    height:100%; padding:28px; display:flex; flex-direction:column;
    justify-content:flex-start; font-family:var(--fontBody); color:var(--ink);
    box-sizing:border-box; overflow-y:auto; background:var(--paper);
  }
  .screen.justifyBetween{ justify-content:space-between; }
  .screen.justifyCenter{ justify-content:center; }

  .screenLabel{ font-family:var(--fontMono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--inkSoft); margin-bottom:14px; }

  .btn{
    width:100%; padding:16px 20px; border-radius:14px; border:none;
    background:var(--clay); color:var(--cream); font-family:var(--fontBody);
    font-size:15.5px; font-weight:600; cursor:pointer; transition:all .18s ease;
    box-shadow:0 4px 10px rgba(28,27,25,.12);
  }
  .btn:hover{ transform:translateY(-1px); box-shadow:0 8px 18px rgba(184,100,90,.35); }
  .btn:disabled{ opacity:.4; cursor:default; }
  .btn:disabled:hover{ transform:none; box-shadow:0 4px 10px rgba(28,27,25,.12); }
  .btn.dark{ background:var(--ink); }
  .btn.gold{ background:var(--gold); color:var(--navy); }
  .btn.navy{ background:var(--navy); }

  .btnGhost{
    width:100%; padding:14px 20px; border-radius:14px; border:1px solid var(--line);
    background:transparent; color:var(--ink); font-family:var(--fontBody);
    font-size:14.5px; font-weight:600; cursor:pointer;
  }
  .btnGhost:disabled{ opacity:.4; cursor:default; }

  .textLink{
    background:none; border:none; color:var(--inkSoft); font-family:var(--fontBody);
    font-size:13px; cursor:pointer; text-decoration:underline; text-decoration-color:var(--line); padding:0;
  }

  h1.disp{ font-family:var(--fontDisplay); margin:8px 0 18px; line-height:1.2; }
  .bodyMuted{ font-size:13.5px; color:var(--inkSoft); }

  .row{ display:flex; gap:10px; }
  .col{ display:flex; flex-direction:column; gap:10px; }

  input.field{
    padding:15px 16px; border-radius:12px; border:1px solid var(--line);
    background:var(--cream); font-family:var(--fontBody); font-size:14.5px; outline:none; width:100%;
  }

  .trustNote{ margin-top:22px; padding:12px 14px; border-radius:12px; background:var(--paperDeep); font-size:12px; color:var(--inkSoft); line-height:1.5; }

  .otpRow{ display:flex; gap:8px; justify-content:center; }
  .otpBox{
    width:38px; height:48px; border-radius:10px; border:1.5px solid var(--line);
    background:var(--cream); display:flex; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer; color:var(--clay); transition:border-color .15s ease;
  }
  .otpBox.filled{ border-color:var(--clay); }

  .checkRow{ display:flex; align-items:center; gap:12px; }
  .checkDot{
    width:20px; height:20px; border-radius:50%; border:1.5px solid rgba(255,252,246,.3);
    display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--navy);
    flex-shrink:0; transition:all .3s ease;
  }
  .checkDot.done{ background:var(--gold); border-color:var(--gold); }

  .naomiRow{ display:flex; gap:8px; align-items:flex-start; margin-bottom:12px; }
  .naomiAvatar{
    width:28px; height:28px; border-radius:50%; background:var(--navy); color:var(--goldSoft);
    font-family:var(--fontDisplay); font-style:italic; font-size:13px; display:flex;
    align-items:center; justify-content:center; flex-shrink:0;
  }
  .naomiAvatar.onDark{ background:var(--gold); color:var(--navy); width:32px; height:32px; font-size:15px; }
  .naomiBubble{
    background:var(--cream); border:1px solid var(--line); border-radius:4px 16px 16px 16px;
    padding:12px 15px; font-size:14px; line-height:1.5; max-width:78%; font-family:var(--fontDisplay);
  }
  .userRow{ display:flex; justify-content:flex-end; margin-bottom:12px; }
  .userBubble{ background:var(--clay); color:var(--cream); border-radius:16px 4px 16px 16px; padding:11px 16px; font-size:14px; max-width:72%; }

  .trustThread{ display:flex; gap:4px; align-items:center; height:36px; }
  .trustSeg{ width:26px; height:5px; border-radius:4px; background:var(--line); transition:background .3s ease; }
  .trustSeg.done{ background:var(--navy); }
  .trustSeg.doneGold{ background:var(--gold); }
  .trustSeg.current{ background:var(--clay); }

  .dnaCard{ border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; background:var(--cream); }
  .dnaCardTitle{ font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--inkSoft); margin-bottom:10px; }
  .tagRow{ display:flex; flex-wrap:wrap; gap:7px; }
  .tag{ font-size:12.5px; padding:5px 11px; border-radius:20px; background:var(--clayBg); color:var(--clayDeep); }
  .tag.ok{ background:var(--okBg); color:var(--ok); }
  .tag.muted{ background:var(--paperDeep); color:var(--inkSoft); }
  .orderedItem{ display:flex; gap:9px; font-size:13.5px; margin-bottom:7px; }
  .orderedItem .num{ font-family:var(--fontMono); color:var(--clay); font-weight:700; }

  .navyBox{ background:var(--navy); border-radius:16px; padding:18px; color:var(--cream); }
  .navyBoxLabel{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--goldSoft); margin-bottom:12px; }
  .navyBoxItem{ display:flex; gap:10px; font-size:13px; line-height:1.4; margin-bottom:10px; }

  .docBox{
    height:200px; border-radius:16px; border:2px dashed var(--line); background:var(--cream);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; cursor:pointer;
  }
  .docBox.captured{ border-color:var(--ok); background:var(--okBg); }

  .progressTrack{ height:8px; border-radius:6px; background:var(--paperDeep); overflow:hidden; margin-bottom:8px; }
  .progressFill{ height:100%; background:var(--clay); }

  .unlockItem{ display:flex; gap:10px; align-items:center; padding:12px 14px; border-radius:12px; background:var(--clayBg); margin-bottom:9px; }

  .navRow{ display:flex; gap:10px; align-items:center; }
  .backBtn{
    padding:9px 16px; border-radius:10px; border:1px solid var(--line); background:var(--cream);
    font-size:12.5px; cursor:pointer; font-family:var(--fontBody);
  }
  .backBtn:disabled{ opacity:.4; cursor:default; }
  .stepBadge{ font-family:var(--fontMono); font-size:11px; color:var(--inkSoft); padding:9px 14px; border-radius:10px; background:var(--paperDeep); }

  .jumpNav{ width:230px; max-height:740px; overflow-y:auto; background:var(--cream); border:1px solid var(--line); border-radius:18px; padding:16px; }
  .jumpNav .jnTitle{ font-family:var(--fontMono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--inkSoft); margin-bottom:12px; }
  .jnSection{ margin-bottom:10px; }
  .jnSection .jnSecLabel{ font-size:11px; font-weight:700; color:var(--clayDeep); margin-bottom:5px; }
  .jnBtn{
    display:block; width:100%; text-align:left; padding:6px 9px; border-radius:8px; border:none;
    background:transparent; color:var(--ink); font-weight:400; font-size:12px; cursor:pointer; font-family:var(--fontBody);
  }
  .jnBtn.active{ background:var(--clayBg); color:var(--clayDeep); font-weight:700; }

  @media (max-width: 760px){
    .layout{ flex-direction:column; align-items:center; }
    .jumpNav{ width:360px; max-height:260px; }
  }
</style>
</head>
<body>

  <div class="pageHeader">
    <div class="eyebrow">Naomi &middot; Clickable Prototype</div>
  </div>

  <div class="layout">
    <div class="phoneCol">
      <div class="phoneFrame">
        <div class="phoneScreen">
          <div class="statusBar" id="statusBar">
            <span>9:41</span>
            <div class="statusIcons" id="statusIcons"></div>
          </div>
          <div class="screenBody" id="screenBody"></div>
          <div class="homeIndicatorWrap">
            <div class="homeIndicator" id="homeIndicator"></div>
          </div>
        </div>
      </div>
      <div class="navRow">
        <button class="backBtn" id="backBtn">&larr; Back</button>
        <div class="stepBadge" id="stepBadge">&mdash;</div>
      </div>
    </div>

    <div class="jumpNav">
      <div class="jnTitle">Jump to screen</div>
      <div id="jumpNavContent"></div>
    </div>
  </div>

<script>
/* ============================================================
   NAOMI — Standalone Clickable Prototype (vanilla JS port)
   Mirrors NaomiPrototype.jsx screen-for-screen, no build step.
   ============================================================ */

const $body = document.getElementById('screenBody');
const $statusBar = document.getElementById('statusBar');
const $statusIcons = document.getElementById('statusIcons');
const $homeIndicator = document.getElementById('homeIndicator');
const $backBtn = document.getElementById('backBtn');
const $stepBadge = document.getElementById('stepBadge');
const $jumpNavContent = document.getElementById('jumpNavContent');

let history = ['splash'];
let timers = [];

function clearTimers(){ timers.forEach(t => clearTimeout(t) || clearInterval(t)); timers = []; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const STATUS_ICONS = `
  <svg width="16" height="11" viewBox="0 0 16 11" fill="none"><g class="sigfill">
  <rect x="0" y="7" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="6" rx="0.5"/>
  <rect x="9" y="3" width="3" height="8" rx="0.5"/><rect x="13.5" y="0" width="3" height="11" rx="0.5"/></g></svg>
  <svg width="15" height="11" viewBox="0 0 15 11" fill="none"><g class="sigfill">
  <path d="M7.5 9.8a1.1 1.1 0 110 2.2 1.1 1.1 0 010-2.2z"/><path d="M4.4 7.2a4.4 4.4 0 016.2 0l-1 1a3 3 0 00-4.2 0l-1-1z"/>
  <path d="M1.8 4.6a8 8 0 0111.4 0l-1 1a6.6 6.6 0 00-9.4 0l-1-1z"/></g></svg>
  <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
  <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" class="sigstroke" opacity="0.5"/>
  <rect x="2" y="2" width="17" height="8" rx="1.5" class="sigfill"/>
  <rect x="21.5" y="4" width="1.5" height="4" rx="0.7" class="sigfill" opacity="0.5"/></svg>
`;
$statusIcons.innerHTML = STATUS_ICONS;

function setStatusDark(dark){
  $statusBar.classList.toggle('dark', dark);
  $homeIndicator.classList.toggle('dark', dark);
  document.querySelectorAll('.sigfill').forEach(el => el.setAttribute('fill', dark ? '#FFFCF6' : '#1C1B19'));
  document.querySelectorAll('.sigstroke').forEach(el => el.setAttribute('stroke', dark ? '#FFFCF6' : '#1C1B19'));
}

// ── MODULE STATE ──────────────────────────────────────────────────────────────
let kycMode = 'voice';
let userGender = null;
let scheduledTime = null;

// ── FLOW CONFIG ───────────────────────────────────────────────────────────────
const FLOW_ORDER = [
  "splash","trailer","trust","register","signup","login",
  "forgotpassword","forgotpasswordsent",
  "phoneinput","mobileotp",
  "naomiintro","kycquestions","kycverification","dnaprofile","deepquestions","paywall","matchmaking","matchreveal","schedule",
];
const SECTION_LABELS = {
  splash:"Awareness", trailer:"Awareness", trust:"Awareness",
  register:"Onboarding", signup:"Onboarding", login:"Onboarding",
  forgotpassword:"Onboarding", forgotpasswordsent:"Onboarding",
  phoneinput:"Onboarding", mobileotp:"Onboarding",
  naomiintro:"Onboarding flow", kycquestions:"Onboarding flow",
  kycverification:"KYC flow", schedule:"Onboarding flow",
};
const DARK_STATUS_SCREENS = new Set(["splash","trailer","kycquestions"]);

// ── SHARED HELPERS ────────────────────────────────────────────────────────────

function renderOtp(title, sub, nextId, digits){
  $body.innerHTML = `
    <div class="screen justifyBetween">
      <div>
        <h1 class="disp" style="font-size:24px;margin-bottom:8px;">${title}</h1>
        <p class="bodyMuted" style="font-size:13px;margin-bottom:24px;">Enter the ${digits}-digit code we sent you.</p>
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:18px;">
          ${Array.from({length:digits},(_,i)=>`<div class="otpBox" data-i="${i}" style="width:${digits===6?42:50}px;height:52px;border-radius:11px;border:1.5px solid var(--line);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--clay);cursor:pointer;transition:border-color .15s;"></div>`).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <button id="resendBtn" style="background:none;border:none;font-family:var(--fontBody);font-size:13px;color:var(--inkSoft);cursor:pointer;text-decoration:underline;text-decoration-color:var(--line);">Resend in 0:42</button>
          <button id="backLink" style="background:none;border:none;font-family:var(--fontBody);font-size:13px;color:var(--inkSoft);cursor:pointer;">&larr; Back</button>
        </div>
      </div>
      <button class="btn" id="verifyBtn" style="opacity:.4;">Verify</button>
    </div>`;
  let filled = new Array(digits).fill('');
  let secs = 42;
  const $btn = document.getElementById('verifyBtn');
  const timer = setInterval(()=>{ secs--; const r=document.getElementById('resendBtn'); if(r) r.textContent=secs>0?`Resend in 0:${String(secs).padStart(2,'0')}`:'Resend code'; if(secs<=0) clearInterval(timer); },1000);
  timers.push(timer);
  document.querySelectorAll('.otpBox').forEach(box=>{
    box.onclick=()=>{
      const i=+box.dataset.i; filled[i]=filled[i]?'':'•';
      box.textContent=filled[i]; box.style.borderColor=filled[i]?'var(--clay)':'var(--line)';
      const done=filled.every(Boolean); $btn.style.opacity=done?'1':'.4';
    };
  });
  $btn.onclick=()=>{ if(filled.every(Boolean)) go(nextId); };
  document.getElementById('backLink').onclick=()=>back();
}

function renderBottomNav(){ return ""; }

function wireBottomNav(){ }

const RENDERERS = {};

// ── SPLASH ────────────────────────────────────────────────────────────────────
RENDERERS.splash = function(){
  let frame=0;
  const frames=['','naomi','The world\'s first AI matchmaker'];
  function tick(){
    const ring=document.getElementById('splashRing');
    const word=document.getElementById('splashWord');
    const tag=document.getElementById('splashTag');
    if(frame===1&&ring){ring.style.strokeDashoffset='0';word.style.opacity='1';word.style.transform='translateY(0)';}
    if(frame===2&&tag){tag.style.opacity='1';}
    frame++;
  }
  $body.innerHTML=`
    <div class="screen justifyCenter" style="background:var(--navy);text-align:center;padding:0;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:18px;">
        <svg width="68" height="68" viewBox="0 0 68 68"><circle cx="34" cy="34" r="30" fill="none" stroke="rgba(231,217,174,.3)" stroke-width="1.5"/>
          <circle id="splashRing" cx="34" cy="34" r="30" fill="none" stroke="var(--goldSoft)" stroke-width="1.5" stroke-dasharray="188.5" stroke-dashoffset="188.5" style="transition:stroke-dashoffset 1.2s ease;transform-origin:center;transform:rotate(-90deg);"/>
          <text x="34" y="40" text-anchor="middle" font-family="Fraunces,Georgia,serif" font-size="22" fill="var(--cream)" font-style="italic">N</text>
        </svg>
        <div id="splashWord" style="font-family:var(--fontDisplay);font-size:30px;color:var(--cream);letter-spacing:.02em;opacity:0;transform:translateY(8px);transition:all .7s ease .3s;">naomi</div>
        <div id="splashTag" style="font-family:var(--fontMono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--goldSoft);opacity:0;transition:opacity .6s ease .4s;">the world's first AI matchmaker</div>
      </div>
    </div>`;
  timers.push(setTimeout(tick,300));
  timers.push(setTimeout(tick,600));
  timers.push(setTimeout(()=>go('trailer'),2800));
};

// ── TRAILER ───────────────────────────────────────────────────────────────────
RENDERERS.trailer = function(){
  const lines=["Meet Naomi.","Not another dating app.","Not endless swiping.","She gets to know your values, your goals, your Relationship DNA —","then searches for people who genuinely fit it."];
  let li=0;
  function reveal(){
    const el=document.getElementById('tl'+li);
    if(el){el.style.opacity='1';el.style.transform='translateY(0)';}
    li++;
    if(li<lines.length) timers.push(setTimeout(reveal,1400));
    else timers.push(setTimeout(()=>go('trust'),1600));
  }
  $body.innerHTML=`
    <div class="screen justifyBetween" style="background:var(--navy);padding:28px;">
      <div>
        ${lines.map((l,i)=>`<div id="tl${i}" style="font-family:var(--fontDisplay);font-size:${i===0?'26px':'18px'};color:var(--cream);line-height:1.35;margin-bottom:${i===0?'24px':'14px'};opacity:0;transform:translateY(10px);transition:all .6s ease;">${l}</div>`).join('')}
      </div>
      <button class="btnGhost" id="trailerSkip" style="border-color:rgba(255,252,246,.2);color:rgba(255,252,246,.5);font-size:14px;">Skip</button>
    </div>`;
  timers.push(setTimeout(reveal,400));
  document.getElementById('trailerSkip').onclick=()=>go('trust');
};

// ── TRUST ─────────────────────────────────────────────────────────────────────
RENDERERS.trust = function(){
  $body.innerHTML=`
    <div class="screen justifyBetween">
      <div>
        <h1 class="disp" style="font-size:28px;margin-bottom:6px;">Trust comes <em style="color:var(--clay);font-style:italic;">first.</em></h1>
        <p class="bodyMuted" style="margin-bottom:26px;font-size:13.5px;">Before you share anything, here's what we commit to.</p>
        <div style="display:flex;flex-direction:column;gap:16px;">
          ${[
            ['🔒','Your privacy comes first.','We never sell your data or show you ads.'],
            ['❤️','We don\'t optimize for swipes.','Our algorithm isn\'t built to keep you scrolling.'],
            ['🤝','We only succeed when you do.','Our incentives are tied to outcomes, not screen time.'],
            ['🛡','Every member is verified.','Identity and trust checks, before anyone is introduced.'],
          ].map(([e,t,d])=>`
            <div style="display:flex;gap:14px;align-items:flex-start;">
              <div style="font-size:20px;flex-shrink:0;margin-top:2px;">${e}</div>
              <div>
                <div style="font-weight:700;font-size:14.5px;margin-bottom:2px;">${t}</div>
                <div style="font-size:12.5px;color:var(--inkSoft);line-height:1.5;">${d}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>
      <button class="btn" id="trustGo">Ready to get started</button>
    </div>`;
  document.getElementById('trustGo').onclick=()=>go('register');
};

// ── REGISTER ──────────────────────────────────────────────────────────────────
// ── SCHEDULE ICON — top-right corner for onboarding screens ──────────────────
function renderSchedIcon(){
  const hasSched = !!scheduledTime;
  return `
    <button id="schedIcon" title="Schedule" style="position:absolute;top:14px;right:16px;z-index:30;width:38px;height:38px;border-radius:50%;border:1px solid ${hasSched?'rgba(184,100,90,.35)':'var(--line)'};background:${hasSched?'var(--clayBg)':'var(--cream)'};display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;">

function wireSchedIcon(currentScreen){
  const btn = document.getElementById('schedIcon');
  if(!btn) return;
  btn.onclick = () => {
    if(scheduledTime){
      let ov = document.getElementById('schedOverlay');
      if(ov){ ov.remove(); return; }
      ov = document.createElement('div');
      ov.id = 'schedOverlay';
      ov.style.cssText = 'position:fixed;top:60px;right:12px;z-index:50;width:260px;';
      ov.innerHTML = `
        <div style="background:var(--cream);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:0 8px 28px rgba(0,0,0,.12);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--inkSoft);">Scheduled</div>
            <button id="ovClose" style="background:none;border:none;font-size:18px;color:var(--inkSoft);cursor:pointer;line-height:1;">&times;</button>
          </div>
          <div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;">${scheduledTime.label}</div>
          <div style="font-size:12px;color:var(--inkSoft);margin-bottom:14px;">Reminder 1h before</div>
          <div style="display:flex;gap:8px;">
            <button id="ovEdit" style="flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--line);background:transparent;font-family:var(--fontBody);font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;">Edit</button>
            <button id="ovCancel" style="flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--line);background:transparent;font-family:var(--fontBody);font-size:12.5px;color:var(--inkSoft);cursor:pointer;">Cancel</button>
          </div>
        </div>`;
      document.body.appendChild(ov);
      document.getElementById('ovClose').onclick  = () => ov.remove();
      document.getElementById('ovEdit').onclick   = () => { ov.remove(); go('schedule'); };
      document.getElementById('ovCancel').onclick = () => { scheduledTime = null; ov.remove(); btn.style.background='var(--cream)'; btn.style.borderColor='var(--line)'; };
    } else {
      go('schedule');
    }
  };
}

// ── Adaptive question picker ──────────────────────────────────────────────────
function pickAdaptiveQuestions(answers){
  const used = new Set(Object.keys(answers));
  const allText = Object.values(answers).join(' ').toLowerCase();

  // Score each adaptive question by keyword matches
  const scored = P1_ADAPTIVE_POOL
    .filter(q => !used.has(q.id))
    .map(q => {
      const triggers = q.trigger || [];
      const score = triggers.filter(t => allText.includes(t)).length;
      return { ...q, score };
    })
    .sort((a,b) => b.score - a.score);

  // Take top 5, ensuring variety (at least 1 fallback)
  const triggered = scored.filter(q => q.score > 0).slice(0, 4);
  const fallbacks = scored.filter(q => q.score === 0 && q.id.startsWith('p1_f'));
  const picked = [...triggered, ...fallbacks].slice(0, 5);

  // Shuffle slightly for naturalness
  return picked.sort(() => Math.random() - 0.5).slice(0, 5);
}

            <div style="display:flex;justify-content:flex-end;">
              <div style="background:var(--navy);border-radius:14px 14px 3px 14px;padding:10px 13px;max-width:76%;font-size:13.5px;line-height:1.45;color:var(--cream);">${answers[pq.id]}</div>

            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
              <button id="micBtn" style="width:34px;height:34px;border-radius:50%;border:none;background:${recording?'var(--clay)':'var(--paperDeep)'};cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;transition:background .2s;">
                ${recording?`<div style="position:absolute;inset:-4px;border-radius:50%;border:1.5px solid rgba(184,100,90,.4);animation:ripple1 1.4s ease-out infinite;"></div><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>`:

      };
    }

    // Back
    document.getElementById('qBack').onclick = () => {
      stopRecording();
      if (qIdx > 0){ qIdx--; paint(); }
      else if (phase > 1){ phase--; qIdx=getSequence().length-1; paint(); }
      else back();
    };

    // Mic
    document.getElementById('micBtn').onclick = () => {
      if (recording){
        // Stop recording — fill answer if empty, then repaint
        stopRecording();
        if (!answers[q.id] || !answers[q.id].trim()){
          answers[q.id] = TRANSCRIPT_SIMS[q.id] || GENERIC_SIM;
        }
        paint();
      } else {
        // Start recording — update button and waveform IN-PLACE, no full repaint
        recording = true;
        answers[q.id] = '';

        // Swap mic button to stop state
        const $mic = document.getElementById('micBtn');
        if ($mic){
          $mic.style.background = 'var(--clay)';
          $mic.innerHTML = `<div style="position:absolute;inset:-4px;border-radius:50%;border:1.5px solid rgba(184,100,90,.4);animation:ripple1 1.4s ease-out infinite;"></div><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>`;
        }

        // Show waveform above textarea if not present
        const $bar = document.getElementById('kycAnswer')?.parentElement;
        if ($bar && !$bar.querySelector('#waveRow')){
          const waveRow = document.createElement('div');
          waveRow.id = 'waveRow';
          waveRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--line);';
          waveRow.innerHTML = `<div style="display:flex;gap:3px;align-items:flex-end;height:14px;">${[1,2,3,4,3,2,1].map((h,i)=>`<div style="width:3px;height:${h*4}px;border-radius:2px;background:var(--clay);animation:wave 0.8s ease-in-out infinite;animation-delay:${i*.1}s;"></div>`).join('')}</div><span style="font-family:var(--fontMono);font-size:10px;color:var(--clay);letter-spacing:.1em;">LISTENING</span>`;
          $bar.insertBefore(waveRow, $bar.firstChild);
        }

        // Update border color
        if ($bar) $bar.style.borderColor = 'var(--clay)';

        // Clear textarea
        const $inp = document.getElementById('kycAnswer');
        if ($inp){ $inp.value = ''; $inp.placeholder = ''; }

        // Stream transcript
        const sim = TRANSCRIPT_SIMS[q.id] || GENERIC_SIM;
        let ci = 0;
        transcriptTimer = setInterval(() => {
          const $t = document.getElementById('kycAnswer');
          if (!$t || !$t.isConnected){ stopRecording(); return; }
          if (ci <= sim.length){
            const chunk = sim.slice(0, ci);
            $t.value = chunk;
            answers[q.id] = chunk;
            $t.style.height = 'auto';
            $t.style.height = Math.min($t.scrollHeight, 80) + 'px';
            // Activate send button
            const $n = document.getElementById('nextBtn');
            if ($n && chunk.length > 0){
              $n.style.background = 'var(--clay)';
              $n.style.color = 'var(--cream)';
            }
            ci++;
          } else {
            stopRecording();
            answers[q.id] = sim;
            paint(); // full repaint only when done streaming
          }
        }, 32);
        timers.push(transcriptTimer);
      }
    };

    // Advance
    function advance(){
      stopRecording();
      const $t = document.getElementById('kycAnswer');
      if ($t) answers[q.id] = $t.value.trim();
      save();

      qIdx++;
      const nextSeq = getSequence();

      if (qIdx >= nextSeq.length){
        phase++; qIdx = 0;
        if (phase > 4){ startVerification(); return; }
        save();
        showPhaseTransition(phase); // fires startVerification after Q5
      } else {
        paint();
      }
    }

    document.getElementById('nextBtn').onclick = () => {
      const $t=document.getElementById('kycAnswer');
      if($t) answers[q.id]=$t.value.trim();
      if (!isOpt && !answers[q.id]) return;
      advance();
    };

    const $skip=document.getElementById('skipBtn');
    if($skip) $skip.onclick=()=>{ stopRecording(); answers[q.id]=''; advance(); };
  }

  // Resume prompt if saved progress exists
  paint();
};

RENDERERS.deepquestions = function(){
  const saved = loadProgress();
  let answers = saved ? (saved.answers || {}) : {};
  let recording = false;
  let transcriptTimer = null;
  const DEEP_QS = [
    { id:'p2_4', q:'What do you value most in a friendship?',              hint:'Think of your closest friend. What makes them irreplaceable?' },
    { id:'p2_5', q:'What are you obsessed with right now?',               hint:'The thing you can\u2019t stop thinking or talking about.' },
    { id:'p2_6', q:'What do you irrationally hate?',                      hint:'Something small that bothers you more than it should.' },
    { id:'p3_1', q:'What qualities matter most to you in a partner?',     hint:'Not a checklist \u2014 the things that genuinely move you.' },
    { id:'p3_2', q:'What is absolutely unacceptable in a relationship?',  hint:'The things you know, not just the things you think.' },
    { id:'p3_4', q:'What does a healthy relationship look like, day to day?', hint:'The ordinary Tuesday, not just the big moments.' },
  ];
  const DEEP_SIMS = {
    p2_4:"Loyalty and honesty. Someone who shows up without being asked.",
    p2_5:"Urban design and walkable cities. I can\u2019t stop reading about it.",
    p2_6:"Slow walkers in narrow hallways. Unreasonably so.",
    p3_1:"Emotional honesty, curiosity, and someone who actually shows up.",
    p3_2:"Dishonesty. And indifference to other people\u2019s experience.",
    p3_4:"Two people who are happy to be home together. Not performing. Just existing well.",
  };
  let qi = 0;
  function stopRec(){ recording=false; if(transcriptTimer){clearInterval(transcriptTimer);transcriptTimer=null;} }
  function paint(){
    if(qi>=DEEP_QS.length){ go('matchmaking'); return; }
    const q=DEEP_QS[qi]; const hasAns=answers[q.id]&&answers[q.id].trim().length>0;
    const prev=DEEP_QS.slice(0,qi);
    $body.innerHTML=`
      <div style="height:100%;display:flex;flex-direction:column;background:var(--paperDeep);">
        <div style="padding:12px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--cream);">
          <button id="dqBack" style="width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--paperDeep);color:var(--inkSoft);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;">&larr;</button>
          <div style="width:34px;height:34px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <span style="font-family:var(--fontDisplay);font-style:italic;font-size:14px;color:var(--goldSoft);">N</span>
          </div>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:14px;color:var(--ink);margin-bottom:4px;">Naomi</div>
            <div style="height:3px;border-radius:2px;background:var(--paperDeep);overflow:hidden;"><div style="height:100%;width:${Math.round(((qi+1)/DEEP_QS.length)*100)}%;background:var(--clay);border-radius:2px;transition:width .4s;"></div></div>
            <div style="font-family:var(--fontMono);font-size:9px;color:var(--inkSoft);letter-spacing:.04em;margin-top:3px;">${qi+1} of ${DEEP_QS.length}</div>
          </div>
        </div>
        <div style="flex:1;overflow-y:auto;padding:16px 14px 8px;display:flex;flex-direction:column;gap:12px;" id="dqLog">
          ${prev.map(pq=>`
            <div style="display:flex;gap:8px;align-items:flex-end;"><div style="width:24px;height:24px;border-radius:50%;background:var(--navy);flex-shrink:0;display:flex;align-items:center;justify-content:center;"><span style="font-family:var(--fontDisplay);font-style:italic;font-size:10px;color:var(--goldSoft);">N</span></div><div style="background:var(--cream);border:1px solid var(--line);border-radius:14px 14px 14px 3px;padding:10px 13px;max-width:76%;font-size:13.5px;line-height:1.45;color:var(--ink);">${pq.q}</div></div>
            <div style="display:flex;justify-content:flex-end;"><div style="background:var(--navy);border-radius:14px 14px 3px 14px;padding:10px 13px;max-width:76%;font-size:13.5px;line-height:1.45;color:var(--cream);">${answers[pq.id]||'<em style="opacity:.5">Skipped</em>'}</div></div>`).join('')}
          <div style="display:flex;gap:8px;align-items:flex-end;"><div style="width:24px;height:24px;border-radius:50%;background:var(--navy);flex-shrink:0;display:flex;align-items:center;justify-content:center;"><span style="font-family:var(--fontDisplay);font-style:italic;font-size:10px;color:var(--goldSoft);">N</span></div>
          <div><div style="background:var(--cream);border:1px solid var(--line);border-radius:14px 14px 14px 3px;padding:10px 13px;max-width:76%;font-size:13.5px;line-height:1.45;color:var(--ink);">${q.q}</div>${q.hint?`<div style="font-size:11px;color:var(--inkSoft);padding:4px 6px 0;font-style:italic;">${q.hint}</div>`:''}</div></div>
        </div>
        <div style="padding:10px 12px;border-top:1px solid var(--line);background:var(--cream);flex-shrink:0;">
          <div style="border-radius:14px;border:1.5px solid ${recording?'var(--clay)':'var(--line)'};background:var(--paperDeep);padding:10px 12px;">
            ${recording?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--line);"><div style="display:flex;gap:3px;align-items:flex-end;height:14px;">${[1,2,3,4,3,2,1].map((h,i)=>`<div style="width:3px;height:${h*4}px;border-radius:2px;background:var(--clay);animation:wave 0.8s ease-in-out infinite;animation-delay:${i*.1}s;"></div>`).join('')}</div><span style="font-family:var(--fontMono);font-size:10px;color:var(--clay);letter-spacing:.1em;">LISTENING</span></div>`:''}
            <textarea id="dqAns" placeholder="Type your answer\u2026" rows="1" style="width:100%;border:none;background:transparent;color:var(--ink);font-family:var(--fontBody);font-size:14.5px;line-height:1.5;resize:none;outline:none;min-height:22px;max-height:80px;overflow-y:auto;display:block;">${answers[q.id]||''}</textarea>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
              <button id="dqMic" style="width:34px;height:34px;border-radius:50%;border:none;background:${recording?'var(--clay)':'var(--paperDeep)'};cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;">
                ${recording?`<div style="position:absolute;inset:-4px;border-radius:50%;border:1.5px solid rgba(184,100,90,.4);animation:ripple1 1.4s ease-out infinite;"></div><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>`:`<svg width="14" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--inkSoft)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>`}
              </button>
              <div style="display:flex;gap:8px;">
                <button id="dqSkip" style="background:none;border:none;color:var(--inkSoft);font-family:var(--fontBody);font-size:13px;cursor:pointer;text-decoration:underline;">Skip</button>
                <button id="dqSend" style="padding:7px 16px;border-radius:12px;border:none;background:${hasAns?'var(--clay)':'var(--paperDeep)'};color:${hasAns?'var(--cream)':'var(--inkSoft)'};font-family:var(--fontBody);font-size:13px;font-weight:700;cursor:pointer;">Send &rarr;</button>
              </div>
            </div>
          </div>
        </div>
        <style>@keyframes ripple1{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.7);opacity:0}}@keyframes wave{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}</style>
      </div>`;
    setTimeout(()=>{const l=document.getElementById('dqLog');if(l)l.scrollTop=l.scrollHeight;},40);
    const $ta=document.getElementById('dqAns');
    if($ta) $ta.oninput=()=>{ $ta.style.height='auto'; $ta.style.height=Math.min($ta.scrollHeight,80)+'px'; const $s=document.getElementById('dqSend'); if($s){const has=$ta.value.trim().length>0;$s.style.background=has?'var(--clay)':'var(--paperDeep)';$s.style.color=has?'var(--cream)':'var(--inkSoft)';} };
    document.getElementById('dqBack').onclick=()=>{stopRec();if(qi>0){qi--;paint();}else back();};
    document.getElementById('dqMic').onclick=()=>{
      if(recording){stopRec();if(!answers[q.id])answers[q.id]=DEEP_SIMS[q.id]||GENERIC_SIM;paint();}
      else{recording=true;const $inp=document.getElementById('dqAns');if($inp)$inp.value='';answers[q.id]='';
        const sim=DEEP_SIMS[q.id]||GENERIC_SIM;let ci=0;
        transcriptTimer=setInterval(()=>{const $t=document.getElementById('dqAns');if(!$t||!$t.isConnected){stopRec();return;}if(ci<=sim.length){$t.value=sim.slice(0,ci);answers[q.id]=$t.value;$t.style.height='auto';$t.style.height=Math.min($t.scrollHeight,80)+'px';ci++;}else{stopRec();answers[q.id]=sim;paint();}},32);timers.push(transcriptTimer);}
    };
    document.getElementById('dqSend').onclick=()=>{stopRec();const $t=document.getElementById('dqAns');if($t)answers[q.id]=$t.value.trim();saveProgress({answers,phase:2,qIdx:qi,p1Adaptive:[]});qi++;paint();};
    document.getElementById('dqSkip').onclick=()=>{stopRec();answers[q.id]='';qi++;paint();};
  }
  paint();
};

// ── MATCHMAKING SUCCESS — animated progress before results ────────────────────
RENDERERS.matchmaking = function(){
  const steps = [
    { label:"Analysing your Relationship DNA",   duration: 1600 },
    { label:"Scanning compatibility patterns",    duration: 1800 },
    { label:"Filtering by values & dealbreakers", duration: 1500 },
    { label:"Ranking top candidates",             duration: 1400 },
    { label:"Preparing your introductions",       duration: 1200 },
  ];
  let current = 0;
  let progress = 0;
  let progressTimer = null;

  function paint(){
    const doneSteps = steps.slice(0, current);
    const activeStep = steps[current];

    $body.innerHTML = `
      <div style="height:100%;display:flex;flex-direction:column;background:var(--navy);padding:36px 28px 40px;">

        <!-- Header -->
        <div style="text-align:center;margin-bottom:40px;">
          <div style="width:56px;height:56px;border-radius:50%;background:rgba(201,162,75,.15);border:1.5px solid rgba(201,162,75,.4);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <span style="font-family:var(--fontDisplay);font-style:italic;font-size:24px;color:var(--goldSoft);">N</span>
          </div>
          <h2 style="font-family:var(--fontDisplay);font-size:22px;color:var(--cream);margin-bottom:6px;line-height:1.3;">Finding your matches.</h2>
          <p style="font-size:13px;color:rgba(255,252,246,.45);line-height:1.6;">Naomi is going through everyone to find the people who genuinely fit.</p>
        </div>

        <!-- Step list -->
        <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:36px;flex:1;">
          ${steps.map((s, i) => {
            const isDone   = i < current;
            const isActive = i === current;
            return `<div style="display:flex;align-items:center;gap:14px;opacity:${isDone||isActive?1:0.3};transition:opacity .4s;">
              <div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;
                background:${isDone?"var(--ok)":isActive?"rgba(201,162,75,.2)":"rgba(255,252,246,.06)"};
                border:1.5px solid ${isDone?"var(--ok)":isActive?"var(--gold)":"rgba(255,252,246,.12)"};
                display:flex;align-items:center;justify-content:center;transition:all .4s;">
                ${isDone
                  ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`
                  : isActive
                  ? `<div style="width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 1s ease-in-out infinite;"></div>`
                  : `<div style="width:6px;height:6px;border-radius:50%;background:rgba(255,252,246,.2);"></div>`}
              </div>
              <span style="font-size:14px;color:${isDone?"rgba(255,252,246,.6)":isActive?"var(--cream)":"rgba(255,252,246,.4)"};font-weight:${isActive?600:400};transition:all .3s;">${s.label}</span>
            </div>`;
          }).join("")}
        </div>

        <!-- Progress bar -->
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-family:var(--fontMono);font-size:10px;letter-spacing:.1em;color:rgba(255,252,246,.35);text-transform:uppercase;">Matching progress</span>
            <span id="pctLabel" style="font-family:var(--fontMono);font-size:11px;color:var(--goldSoft);">${progress}%</span>
          </div>
          <div style="height:4px;border-radius:4px;background:rgba(255,252,246,.1);overflow:hidden;">
            <div id="progBar" style="height:100%;width:${progress}%;background:linear-gradient(90deg,var(--clay),var(--gold));border-radius:4px;transition:width .3s ease;"></div>
          </div>
          <div style="margin-top:12px;font-size:12px;color:rgba(255,252,246,.3);text-align:center;line-height:1.5;">
            ${current < steps.length ? "This usually takes less than a minute." : "Matches ready."}
          </div>
        </div>
      </div>
      <style>@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.6}}</style>`;
  }

  function runStep(){
    if (current >= steps.length){
      clearInterval(progressTimer);
      setTimeout(() => go("matchreveal"), 600);
      return;
    }
    paint();

    // Smoothly increment progress bar over the step duration
    const stepProgress = 100 / steps.length;
    const startPct     = current * stepProgress;
    const endPct       = startPct + stepProgress;
    const stepMs       = steps[current].duration;
    const tickMs       = 40;
    const ticks        = stepMs / tickMs;
    let tick           = 0;

    progressTimer = setInterval(() => {
      tick++;
      progress = Math.round(startPct + (endPct - startPct) * (tick / ticks));
      const $bar = document.getElementById("progBar");
      const $pct = document.getElementById("pctLabel");
      if ($bar) $bar.style.width = progress + "%";
      if ($pct) $pct.textContent = Math.min(progress, 99) + "%";
      if (tick >= ticks){
        clearInterval(progressTimer);
        current++;
        setTimeout(runStep, 200);
      }
    }, tickMs);
    timers.push(progressTimer);
  }

  runStep();
};

RENDERERS.schedule = function(){
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const SLOTS  = ['9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM','6:00 PM','7:00 PM','8:00 PM'];

  const today  = new Date();
  today.setHours(0,0,0,0);

  // Restore from saved scheduledTime or start fresh
  let viewYear  = scheduledTime ? scheduledTime.year  : today.getFullYear();
  let viewMonth = scheduledTime ? scheduledTime.month : today.getMonth();
  let selDate   = scheduledTime ? new Date(scheduledTime.year, scheduledTime.month, scheduledTime.date) : null;
  let selTime   = scheduledTime ? scheduledTime.time  : null;
  let confirmed = false;

  function buildCalendar(){
    const first = new Date(viewYear, viewMonth, 1).getDay();
    const days  = new Date(viewYear, viewMonth + 1, 0).getDate();
    let cells = '';
    for(let i = 0; i < first; i++)
      cells += `<div></div>`;
    for(let d = 1; d <= days; d++){
      const date    = new Date(viewYear, viewMonth, d);
      const isPast  = date < today;
      const isSat   = date.getDay() === 0;
      const isSun   = date.getDay() === 6;
      const isWkend = isSat || isSun;
      const isToday = date.getTime() === today.getTime();
      const isSel   = selDate && date.getTime() === selDate.getTime();
      const disabled= isPast || isWkend;

      cells += `<div class="calDay" data-d="${d}"
        style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;
        border-radius:50%;font-size:13.5px;font-weight:${isToday?700:400};cursor:${disabled?'default':'pointer'};
        color:${isSel?'var(--cream)':disabled?'rgba(26,26,26,.25)':'var(--ink)'};
        background:${isSel?'var(--clay)':isToday&&!isSel?'transparent':'transparent'};
        border:${isToday&&!isSel?'1.5px solid var(--clay)':'1.5px solid transparent'};
        transition:background .15s;">${d}</div>`;
    }
    return cells;
  }

    if(confirmed){
      const label = `${MONTHS[selDate.getMonth()]} ${selDate.getDate()} · ${selTime}`;

              <button id="editSched" style="background:none;border:none;font-family:var(--fontBody);font-size:13.5px;color:var(--clay);cursor:pointer;text-decoration:underline;text-decoration-color:rgba(184,100,90,.35);">✏️ Edit date or time</button>
            </div>
            <p class="bodyMuted" style="font-size:13.5px;line-height:1.65;max-width:260px;margin:0 auto;">Naomi will be ready when you are. You&rsquo;ll get a reminder 1 hour before.</p>

        </div>
      </div>`;

    // Back
    document.getElementById('schedBack').onclick = () => back();

    // Month nav
    document.getElementById('prevMonth').onclick = () => {
      viewMonth--; if(viewMonth < 0){ viewMonth=11; viewYear--; } paint();
    };
    document.getElementById('nextMonth').onclick = () => {
      viewMonth++; if(viewMonth > 11){ viewMonth=0; viewYear++; } paint();
    };

    // Day clicks
    document.getElementById('calGrid').querySelectorAll('.calDay').forEach(el => {
      const d   = +el.dataset.d;
      const date = new Date(viewYear, viewMonth, d);
      const disabled = date < today || date.getDay() === 0 || date.getDay() === 6;
      if(disabled) return;
      el.onmouseenter = () => { if(!el.style.background.includes('clay')) el.style.background='var(--paperDeep)'; };
      el.onmouseleave = () => { if(!el.style.background.includes('clay')) el.style.background='transparent'; };
      el.onclick = () => { selDate = date; selTime = null; paint(); };
    });

    // Time slot clicks
    document.querySelectorAll('.slotBtn').forEach(el => {
      el.onclick = () => { selTime = el.dataset.t; paint(); };
    });

    // Confirm
    document.getElementById('confirmSched').onclick = () => {
      if(selTime) { confirmed = true; paint(); }
    };
  }

  paint();
};




function go(id){
  history.push(id);
  render(id);
}

function back(){
  if (history.length < 2) return;
  history.pop();
  const id = history[history.length - 1];
  render(id, true);
}

function jumpTo(id){
  history.push(id);
  render(id);
}

function render(id, skipPush){
  clearTimers();
  RENDERERS[id]();
  setStatusDark(DARK_STATUS_SCREENS.has(id));
  const idx = FLOW_ORDER.indexOf(id);
  $stepBadge.textContent = `${SECTION_LABELS[id] || '—'} · ${idx >= 0 ? idx + 1 : '?'}/${FLOW_ORDER.length}`;
  $backBtn.disabled = history.length < 2;
  paintJumpNav(id);
}

function paintJumpNav(current){
  const groups = {};
  FLOW_ORDER.forEach(id => {
    const sec = SECTION_LABELS[id] || '—';
    (groups[sec] = groups[sec] || []).push(id);
  });
  $jumpNavContent.innerHTML = Object.entries(groups).map(([sec, ids]) => `
    <div class="jnSection">
      <div class="jnSecLabel">${sec}</div>
      ${ids.map(id => `<button class="jnBtn ${id === current ? 'active' : ''}" data-id="${id}">${id}</button>`).join('')}
    </div>`).join('');
  $jumpNavContent.querySelectorAll('.jnBtn').forEach(b => {
    b.onclick = () => jumpTo(b.dataset.id);
  });
}

$backBtn.onclick = back;

render('splash');
</script>
</body>
