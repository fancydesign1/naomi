<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAOMI · Clickable Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
  :root{
    --paper:#FAF6EF; --paperDeep:#F2ECDF; --ink:#1C1B19; --inkSoft:#5B564C;
    --line:#E3DCC9; --clay:#B8645A; --clayDeep:#8F4A42; --clayBg:#FBF1EE;
    --navy:#1F3A35; --gold:#C9A24B; --goldSoft:#E7D9AE; --cream:#FFFCF6;
    --ok:#5F7F5C; --okBg:#EAF1E8;
    --fontDisplay:"Fraunces","Iowan Old Style",Georgia,serif;
    --fontBody:"Inter",-apple-system,"Segoe UI",sans-serif;
    --fontMono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:radial-gradient(circle at 20% 10%, #F5EEDD, var(--paperDeep) 70%);
    display:flex; flex-direction:column; align-items:center;
    padding:40px 16px 60px; font-family:var(--fontBody);
  }
  .pageHeader{ text-align:center; margin-bottom:28px; max-width:480px; }
  .pageHeader .eyebrow{ font-family:var(--fontMono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--clayDeep); margin-bottom:8px; }
  .pageHeader h1{ font-family:var(--fontDisplay); font-size:28px; color:var(--ink); margin:0; }
  .pageHeader p{ font-size:13px; color:var(--inkSoft); margin-top:8px; }

  .layout{ display:flex; gap:28px; align-items:flex-start; }
  .phoneCol{ display:flex; flex-direction:column; align-items:center; gap:14px; }

  .phoneFrame{
    width:360px; height:740px; border-radius:44px; background:var(--ink);
    padding:10px; box-shadow:0 30px 60px rgba(28,27,25,.35), 0 2px 0 rgba(255,255,255,.4) inset;
    position:relative; flex-shrink:0;
  }
  .phoneScreen{
    width:100%; height:100%; border-radius:36px; background:var(--paper);
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .statusBar{
    height:44px; display:flex; align-items:center; justify-content:space-between;
    padding:0 26px; font-family:var(--fontBody); font-size:13px; font-weight:600;
    color:var(--ink); flex-shrink:0; transition:color .2s ease;
  }
  .statusBar.dark{ color:var(--cream); }
  .statusIcons{ display:flex; gap:5px; align-items:center; }
  .screenBody{ flex:1; position:relative; overflow:hidden; }
  .homeIndicatorWrap{ height:18px; display:flex; justify-content:center; align-items:flex-end; padding-bottom:6px; flex-shrink:0; }
  .homeIndicator{ width:120px; height:4px; border-radius:4px; background:rgba(28,27,25,.3); transition:background .2s ease; }
  .homeIndicator.dark{ background:rgba(255,252,246,.5); }

  .screen{
    height:100%; padding:28px; display:flex; flex-direction:column;
    justify-content:flex-start; font-family:var(--fontBody); color:var(--ink);
    box-sizing:border-box; overflow-y:auto; background:var(--paper);
  }
  .screen.justifyBetween{ justify-content:space-between; }
  .screen.justifyCenter{ justify-content:center; }

  .screenLabel{ font-family:var(--fontMono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--inkSoft); margin-bottom:14px; }

  .btn{
    width:100%; padding:16px 20px; border-radius:14px; border:none;
    background:var(--clay); color:var(--cream); font-family:var(--fontBody);
    font-size:15.5px; font-weight:600; cursor:pointer; transition:all .18s ease;
    box-shadow:0 4px 10px rgba(28,27,25,.12);
  }
  .btn:hover{ transform:translateY(-1px); box-shadow:0 8px 18px rgba(184,100,90,.35); }
  .btn:disabled{ opacity:.4; cursor:default; }
  .btn:disabled:hover{ transform:none; box-shadow:0 4px 10px rgba(28,27,25,.12); }
  .btn.dark{ background:var(--ink); }
  .btn.gold{ background:var(--gold); color:var(--navy); }
  .btn.navy{ background:var(--navy); }

  .btnGhost{
    width:100%; padding:14px 20px; border-radius:14px; border:1px solid var(--line);
    background:transparent; color:var(--ink); font-family:var(--fontBody);
    font-size:14.5px; font-weight:600; cursor:pointer;
  }
  .btnGhost:disabled{ opacity:.4; cursor:default; }

  .textLink{
    background:none; border:none; color:var(--inkSoft); font-family:var(--fontBody);
    font-size:13px; cursor:pointer; text-decoration:underline; text-decoration-color:var(--line); padding:0;
  }

  h1.disp{ font-family:var(--fontDisplay); margin:8px 0 18px; line-height:1.2; }
  .bodyMuted{ font-size:13.5px; color:var(--inkSoft); }

  .row{ display:flex; gap:10px; }
  .col{ display:flex; flex-direction:column; gap:10px; }

  input.field{
    padding:15px 16px; border-radius:12px; border:1px solid var(--line);
    background:var(--cream); font-family:var(--fontBody); font-size:14.5px; outline:none; width:100%;
  }

  .trustNote{ margin-top:22px; padding:12px 14px; border-radius:12px; background:var(--paperDeep); font-size:12px; color:var(--inkSoft); line-height:1.5; }

  .otpRow{ display:flex; gap:8px; justify-content:center; }
  .otpBox{
    width:38px; height:48px; border-radius:10px; border:1.5px solid var(--line);
    background:var(--cream); display:flex; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer; color:var(--clay); transition:border-color .15s ease;
  }
  .otpBox.filled{ border-color:var(--clay); }

  .checkRow{ display:flex; align-items:center; gap:12px; }
  .checkDot{
    width:20px; height:20px; border-radius:50%; border:1.5px solid rgba(255,252,246,.3);
    display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--navy);
    flex-shrink:0; transition:all .3s ease;
  }
  .checkDot.done{ background:var(--gold); border-color:var(--gold); }

  .naomiRow{ display:flex; gap:8px; align-items:flex-start; margin-bottom:12px; }
  .naomiAvatar{
    width:28px; height:28px; border-radius:50%; background:var(--navy); color:var(--goldSoft);
    font-family:var(--fontDisplay); font-style:italic; font-size:13px; display:flex;
    align-items:center; justify-content:center; flex-shrink:0;
  }
  .naomiAvatar.onDark{ background:var(--gold); color:var(--navy); width:32px; height:32px; font-size:15px; }
  .naomiBubble{
    background:var(--cream); border:1px solid var(--line); border-radius:4px 16px 16px 16px;
    padding:12px 15px; font-size:14px; line-height:1.5; max-width:78%; font-family:var(--fontDisplay);
  }
  .userRow{ display:flex; justify-content:flex-end; margin-bottom:12px; }
  .userBubble{ background:var(--clay); color:var(--cream); border-radius:16px 4px 16px 16px; padding:11px 16px; font-size:14px; max-width:72%; }

  .trustThread{ display:flex; gap:4px; align-items:center; height:36px; }
  .trustSeg{ width:26px; height:5px; border-radius:4px; background:var(--line); transition:background .3s ease; }
  .trustSeg.done{ background:var(--navy); }
  .trustSeg.doneGold{ background:var(--gold); }
  .trustSeg.current{ background:var(--clay); }

  .dnaCard{ border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; background:var(--cream); }
  .dnaCardTitle{ font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--inkSoft); margin-bottom:10px; }
  .tagRow{ display:flex; flex-wrap:wrap; gap:7px; }
  .tag{ font-size:12.5px; padding:5px 11px; border-radius:20px; background:var(--clayBg); color:var(--clayDeep); }
  .tag.ok{ background:var(--okBg); color:var(--ok); }
  .tag.muted{ background:var(--paperDeep); color:var(--inkSoft); }
  .orderedItem{ display:flex; gap:9px; font-size:13.5px; margin-bottom:7px; }
  .orderedItem .num{ font-family:var(--fontMono); color:var(--clay); font-weight:700; }

  .navyBox{ background:var(--navy); border-radius:16px; padding:18px; color:var(--cream); }
  .navyBoxLabel{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--goldSoft); margin-bottom:12px; }
  .navyBoxItem{ display:flex; gap:10px; font-size:13px; line-height:1.4; margin-bottom:10px; }

  .docBox{
    height:200px; border-radius:16px; border:2px dashed var(--line); background:var(--cream);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; cursor:pointer;
  }
  .docBox.captured{ border-color:var(--ok); background:var(--okBg); }

  .progressTrack{ height:8px; border-radius:6px; background:var(--paperDeep); overflow:hidden; margin-bottom:8px; }
  .progressFill{ height:100%; background:var(--clay); }

  .unlockItem{ display:flex; gap:10px; align-items:center; padding:12px 14px; border-radius:12px; background:var(--clayBg); margin-bottom:9px; }

  .navRow{ display:flex; gap:10px; align-items:center; }
  .backBtn{
    padding:9px 16px; border-radius:10px; border:1px solid var(--line); background:var(--cream);
    font-size:12.5px; cursor:pointer; font-family:var(--fontBody);
  }
  .backBtn:disabled{ opacity:.4; cursor:default; }
  .stepBadge{ font-family:var(--fontMono); font-size:11px; color:var(--inkSoft); padding:9px 14px; border-radius:10px; background:var(--paperDeep); }

  .jumpNav{ width:230px; max-height:740px; overflow-y:auto; background:var(--cream); border:1px solid var(--line); border-radius:18px; padding:16px; }
  .jumpNav .jnTitle{ font-family:var(--fontMono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--inkSoft); margin-bottom:12px; }
  .jnSection{ margin-bottom:10px; }
  .jnSection .jnSecLabel{ font-size:11px; font-weight:700; color:var(--clayDeep); margin-bottom:5px; }
  .jnBtn{
    display:block; width:100%; text-align:left; padding:6px 9px; border-radius:8px; border:none;
    background:transparent; color:var(--ink); font-weight:400; font-size:12px; cursor:pointer; font-family:var(--fontBody);
  }
  .jnBtn.active{ background:var(--clayBg); color:var(--clayDeep); font-weight:700; }

  @media (max-width: 760px){
    .layout{ flex-direction:column; align-items:center; }
    .jumpNav{ width:360px; max-height:260px; }
  }
</style>
</head>
<body>

  <div class="pageHeader">
    <div class="eyebrow">Naomi &middot; Clickable Prototype</div>
  </div>

  <div class="layout">
    <div class="phoneCol">
      <div class="phoneFrame">
        <div class="phoneScreen">
          <div class="statusBar" id="statusBar">
            <span>9:41</span>
            <div class="statusIcons" id="statusIcons"></div>
          </div>
          <div class="screenBody" id="screenBody"></div>
          <div class="homeIndicatorWrap">
            <div class="homeIndicator" id="homeIndicator"></div>
          </div>
        </div>
      </div>
      <div class="navRow">
        <button class="backBtn" id="backBtn">&larr; Back</button>
        <div class="stepBadge" id="stepBadge">&mdash;</div>
      </div>
    </div>

    <div class="jumpNav">
      <div class="jnTitle">Jump to screen</div>
      <div id="jumpNavContent"></div>
    </div>
  </div>

<script>
/* ============================================================
   NAOMI — Standalone Clickable Prototype (vanilla JS port)
   Mirrors NaomiPrototype.jsx screen-for-screen, no build step.
   ============================================================ */

const $body = document.getElementById('screenBody');
const $statusBar = document.getElementById('statusBar');
const $statusIcons = document.getElementById('statusIcons');
const $homeIndicator = document.getElementById('homeIndicator');
const $backBtn = document.getElementById('backBtn');
const $stepBadge = document.getElementById('stepBadge');
const $jumpNavContent = document.getElementById('jumpNavContent');

let history = ['splash'];
let timers = [];

function clearTimers(){ timers.forEach(t => clearTimeout(t) || clearInterval(t)); timers = []; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const STATUS_ICONS = `
  <svg width="16" height="11" viewBox="0 0 16 11" fill="none"><g class="sigfill">
  <rect x="0" y="7" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="6" rx="0.5"/>
  <rect x="9" y="3" width="3" height="8" rx="0.5"/><rect x="13.5" y="0" width="3" height="11" rx="0.5"/></g></svg>
  <svg width="15" height="11" viewBox="0 0 15 11" fill="none"><g class="sigfill">
  <path d="M7.5 9.8a1.1 1.1 0 110 2.2 1.1 1.1 0 010-2.2z"/><path d="M4.4 7.2a4.4 4.4 0 016.2 0l-1 1a3 3 0 00-4.2 0l-1-1z"/>
  <path d="M1.8 4.6a8 8 0 0111.4 0l-1 1a6.6 6.6 0 00-9.4 0l-1-1z"/></g></svg>
  <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
  <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" class="sigstroke" opacity="0.5"/>
  <rect x="2" y="2" width="17" height="8" rx="1.5" class="sigfill"/>
  <rect x="21.5" y="4" width="1.5" height="4" rx="0.7" class="sigfill" opacity="0.5"/></svg>
`;
$statusIcons.innerHTML = STATUS_ICONS;

function setStatusDark(dark){
  $statusBar.classList.toggle('dark', dark);
  $homeIndicator.classList.toggle('dark', dark);
  document.querySelectorAll('.sigfill').forEach(el => el.setAttribute('fill', dark ? '#FFFCF6' : '#1C1B19'));
  document.querySelectorAll('.sigstroke').forEach(el => el.setAttribute('stroke', dark ? '#FFFCF6' : '#1C1B19'));
}

// ── MODULE STATE ──────────────────────────────────────────────────────────────
let kycMode = 'voice';
let userGender = null;
let scheduledTime = null;

// ── FLOW CONFIG ───────────────────────────────────────────────────────────────
const FLOW_ORDER = [
  "splash","trailer","register","signup","login",
  "forgotpassword","forgotpasswordsent",
  "phoneinput","mobileotp","trust",
  "naomiintro","kycquestions","kycflow","kycphotoupload","kycverification","dnaprofile","deepquestions","vcomplete","paywall","matchmaking","matchreveal","schedule",
];
const SECTION_LABELS = {
  splash:"Awareness", trailer:"Awareness", trust:"Awareness",
  register:"Onboarding", signup:"Onboarding", login:"Onboarding",
  forgotpassword:"Onboarding", forgotpasswordsent:"Onboarding",
  phoneinput:"Onboarding", mobileotp:"Onboarding",
  naomiintro:"Onboarding flow", kycquestions:"Onboarding flow",
  kycverification:"KYC flow", kycflow:"KYC flow", schedule:"Onboarding flow",
};
const DARK_STATUS_SCREENS = new Set(["splash","trailer","kycquestions"]);

// ── SHARED HELPERS ────────────────────────────────────────────────────────────

function renderOtp(title, sub, nextId, digits){
  $body.innerHTML = `
    <div class="screen justifyBetween">
      <div>
        <h1 class="disp" style="font-size:24px;margin-bottom:8px;">${title}</h1>
        <p class="bodyMuted" style="font-size:13px;margin-bottom:24px;">Enter the ${digits}-digit code we sent you.</p>
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px;">
          ${Array.from({length:digits},(_,i)=>`<div class="otpBox" data-i="${i}" style="width:${digits===6?42:50}px;height:52px;border-radius:11px;border:1.5px solid var(--line);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--clay);cursor:pointer;transition:border-color .15s;"></div>`).join('')}
        </div>
        <!-- Autofill shortcut -->
        <div style="text-align:center;margin-bottom:16px;">
          <button id="autofillBtn" style="background:none;border:1px solid var(--clay);border-radius:20px;padding:6px 16px;font-family:var(--fontBody);font-size:12.5px;color:var(--clay);cursor:pointer;">
            ✦ Autofill code
          </button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <button id="resendBtn" style="background:none;border:none;font-family:var(--fontBody);font-size:13px;color:var(--inkSoft);cursor:pointer;text-decoration:underline;text-decoration-color:var(--line);">Resend in 0:42</button>
          <button id="backLink" style="background:none;border:none;font-family:var(--fontBody);font-size:13px;color:var(--inkSoft);cursor:pointer;">&larr; Back</button>
        </div>
      </div>
      <button class="btn" id="verifyBtn" style="opacity:.4;">Verify</button>
    </div>`;
  let filled = new Array(digits).fill('');
  let secs = 42;
  const $btn = document.getElementById('verifyBtn');
  const timer = setInterval(()=>{ secs--; const r=document.getElementById('resendBtn'); if(r) r.textContent=secs>0?`Resend in 0:${String(secs).padStart(2,'0')}`:'Resend code'; if(secs<=0) clearInterval(timer); },1000);
  timers.push(timer);

  function fillBox(i, val){
    const box = document.querySelector(`.otpBox[data-i="${i}"]`);
    if(!box) return;
    filled[i] = val;
    box.textContent = val;
    box.style.borderColor = val ? 'var(--clay)' : 'var(--line)';
  }

  document.querySelectorAll('.otpBox').forEach(box=>{
    box.onclick=()=>{
      const i=+box.dataset.i; filled[i]=filled[i]?'':'•';
      box.textContent=filled[i]; box.style.borderColor=filled[i]?'var(--clay)':'var(--line)';
      const done=filled.every(Boolean); $btn.style.opacity=done?'1':'.4';
    };
  });

  // Autofill — fills all boxes instantly on one tap
  document.getElementById('autofillBtn').onclick = () => {
    for(let i=0;i<digits;i++) fillBox(i,'•');
    $btn.style.opacity='1';
  };

  $btn.onclick=()=>{ if(filled.every(Boolean)) go(nextId); };
  document.getElementById('backLink').onclick=()=>back();
}

function renderBottomNav(){ return ""; }

function wireBottomNav(){ }

// ── MODULE-LEVEL CONSTANTS ─────────────────────────────────────────────────────

// Progress persistence (session only — no cross-session storage)
const SAVE_KEY = 'naomi_onboarding_v2';
function saveProgress(data){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify({...data, ts:Date.now()})); }catch(e){} }
function loadProgress(){ try{ const d=localStorage.getItem(SAVE_KEY); return d?JSON.parse(d):null; }catch(e){return null;} }
function clearProgress(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }

// Question bank — Phase 1 (12 questions, show first 6)
const P1_CORE = [
  { id:"p1_01", q:"What brings you here today?",                              hint:"Reveals emotional state and readiness \u2014 sets the whole tone." },
  { id:"p1_02", q:"What kind of relationship are you looking for?",            hint:"Serious, marriage, open, not sure yet \u2014 no wrong answer." },
  { id:"p1_03", q:"Tell me about the last person you loved. What made it work \u2014 and what didn\u2019t?", hint:"Take your time. This one matters." },
  { id:"p1_04", q:"What does a typical week look like for you? Walk me through it.", hint:"Not what you aspire to \u2014 what actually happens." },
  { id:"p1_05", q:"Do you have children? And how do you feel about having them in the future?", hint:"There\u2019s no right answer \u2014 just an honest one." },
  { id:"p1_06", q:"Where are you living now, and how rooted are you there?",   hint:"Would you move for the right person?" },
  { id:"p1_07", q:"How would your closest friends describe you \u2014 and would you agree?", hint:"The gap between the two is the interesting part." },
  { id:"p1_08", q:"What do you do for work \u2014 and how much of you does it take up?", hint:"Not a career question. A question about identity." },
  { id:"p1_09", q:"What are you non-negotiable about in a partner?",           hint:"Be specific. Vague answers don\u2019t help you." },
  { id:"p1_10", q:"What values are most important to you in a relationship?",  hint:"Not a list \u2014 tell Naomi what you actually live by." },
  { id:"p1_11", q:"One word \u2014 just one \u2014 that describes you right now.", hint:"The first word that comes is usually the truest." },
  { id:"p1_12", q:"What would a successful match with Naomi look like for you, one year from now?", hint:"Be concrete. It helps Naomi understand what you\u2019re really hoping for." },
];

// Adaptive follow-up pool
const P1_ADAPTIVE_POOL = [
  { id:"p1_a1", trigger:["work","office","startup","build","design","code","busy"], q:"How much does work shape your identity \u2014 are you your job, or do you have a job?", hint:"Most people lean strongly one way." },
  { id:"p1_a2", trigger:["run","gym","yoga","fitness","sport","workout","hike"], q:"Is staying active something you\u2019d want to share with a partner, or is it your solo time?", hint:"Either is fine." },
  { id:"p1_a3", trigger:["cook","food","restaurant","eat","kitchen","bake"], q:"What does a perfect dinner look like to you?", hint:"At home, out, or somewhere in between?" },
  { id:"p1_a4", trigger:["travel","trip","country","city","abroad","explore"], q:"What\u2019s the trip that changed how you see the world?", hint:"Even a short one counts." },
  { id:"p1_a5", trigger:["read","book","podcast","learn","curious","study"], q:"What are you most curious about right now?", hint:"The topic you keep going back to." },
  { id:"p1_a6", trigger:["kids","children","daughter","son","parent","family"], q:"What does the idea of family mean to you right now?", hint:"However you define it." },
  { id:"p1_a7", trigger:["marriage","serious","long-term","commit","settle"], q:"What does building a life with someone actually look like in your mind?", hint:"The ordinary Tuesday, not the wedding." },
  { id:"p1_f1", q:"What motivates you most in life right now?", hint:"Recognition, growth, freedom, connection \u2014 or something else?" },
  { id:"p1_f2", q:"How would you describe your relationship with solitude?", hint:"Do you need it, avoid it, or somewhere between?" },
  { id:"p1_f3", q:"What\u2019s something most people wouldn\u2019t guess about you?", hint:"A surprise. Could be anything." },
];

function pickAdaptiveQuestions(answers){
  const used = new Set(Object.keys(answers));
  const allText = Object.values(answers).join(' ').toLowerCase();
  const scored = P1_ADAPTIVE_POOL.filter(q=>!used.has(q.id)).map(q=>{
    const triggers = q.trigger||[];
    return {...q, score: triggers.filter(t=>allText.includes(t)).length};
  }).sort((a,b)=>b.score-a.score);
  const triggered = scored.filter(q=>q.score>0).slice(0,4);
  const fallbacks = scored.filter(q=>q.score===0&&q.id.startsWith('p1_f'));
  return [...triggered,...fallbacks].sort(()=>Math.random()-0.5).slice(0,5);
}

// Transcript simulations
const TRANSCRIPT_SIMS = {

    }
  };

// ── NAOMI INTRO ───────────────────────────────────────────────────────────────
RENDERERS.naomiintro = function(){
  // ── Unified Naomi intro + 6 questions in one continuous chat ─────────────────
  clearProgress();

  // Chat state
  const messages = [{from:'naomi', text:'Hi, I\u2019m Naomi. \u2014 How should I call you?'}];
  let nameEntered   = false;
  let questionMode  = false; // true after user chooses to start
  let recording     = false;
  let transcriptTimer = null;
  const NAME_SIM    = 'Naya';

  // Question state (mirrors kycquestions)
  let answers     = {};
  let phase       = 1;
  let qIdx        = 0;
  let p1Adaptive  = pickAdaptiveQuestions({});

  function getSequence(){ return P1_CORE.slice(0, 6); }
  function save(){ /* session only */ }

  function stopRecording(){
    recording = false;
    if(transcriptTimer){ clearInterval(transcriptTimer); transcriptTimer = null; }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function chatBubbleNaomi(text){
    return `<div style="display:flex;gap:10px;align-items:flex-end;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span style="font-family:var(--fontDisplay);font-style:italic;font-size:12px;color:var(--goldSoft);">N</span></div>
      <div style="background:var(--cream);border:1px solid var(--line);border-radius:18px 18px 18px 4px;padding:12px 16px;max-width:78%;font-size:15px;line-height:1.5;color:var(--ink);">${text}</div>
    </div>`;
  }
  function chatBubbleUser(text){
    return `<div style="display:flex;justify-content:flex-end;">
      <div style="background:var(--navy);border-radius:18px 18px 4px 18px;padding:12px 16px;max-width:78%;font-size:15px;line-height:1.5;color:var(--cream);">${text}</div>
    </div>`;
  }
  function appendMsg(html){
    const log = document.getElementById('chatLog');
    if(!log) return;
    const div = document.createElement('div');
    div.innerHTML = html;
    while(div.firstChild) log.appendChild(div.firstChild);
    log.scrollTop = log.scrollHeight;
  }

  // ── Input bar HTML ─────────────────────────────────────────────────────────
  function inputBarHTML(placeholder, id, hasVal){
    return `
      <div style="padding:10px 12px;border-top:1px solid var(--line);background:var(--cream);flex-shrink:0;" id="chatInputBar">
        <div style="border-radius:14px;border:1.5px solid var(--line);background:var(--paperDeep);padding:10px 12px;">
          <textarea id="${id}" placeholder="${placeholder}" rows="1"
            style="width:100%;border:none;background:transparent;color:var(--ink);font-family:var(--fontBody);font-size:14.5px;line-height:1.5;resize:none;outline:none;min-height:22px;max-height:80px;overflow-y:auto;display:block;"></textarea>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
            <button id="chatMic" style="width:34px;height:34px;border-radius:50%;border:none;background:var(--paperDeep);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg width="14" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--inkSoft)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <button id="chatSend" style="padding:7px 16px;border-radius:12px;border:none;background:${hasVal?'var(--clay)':'var(--paperDeep)'};color:${hasVal?'var(--cream)':'var(--inkSoft)'};font-family:var(--fontBody);font-size:13px;font-weight:700;cursor:pointer;">Send &rarr;</button>
          </div>
        </div>
      </div>`;
  }

  // ── Progress bar ───────────────────────────────────────────────────────────
  function progressHTML(){
    if(!questionMode) return '';
    const seq   = getSequence();
    const total = seq.length;
    const pct   = Math.round(((qIdx+1)/total)*100);
    return `<div style="padding:8px 16px 0;flex-shrink:0;">
      <div style="height:3px;border-radius:2px;background:var(--paperDeep);overflow:hidden;">
        <div id="kycProgBar" style="height:100%;width:${pct}%;background:var(--clay);border-radius:2px;transition:width .4s;"></div>
      </div>
      <div id="kycHeaderSub" style="font-family:var(--fontMono);font-size:9px;color:var(--inkSoft);letter-spacing:.06em;margin-top:3px;text-align:right;">${qIdx+1} of ${total}</div>
    </div>`;
  }

  // ── Full screen paint ──────────────────────────────────────────────────────
  function paint(){
    const seq     = getSequence();
    const q       = questionMode ? seq[qIdx] : null;
    const hasVal  = false; // textarea always empty on paint

    $body.innerHTML = `
      <div style="height:100%;display:flex;flex-direction:column;background:var(--paperDeep);">

        <!-- Header -->
        <div style="padding:18px 20px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);flex-shrink:0;position:relative;">
          ${renderSchedIcon()}
          <div style="width:40px;height:40px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <span style="font-family:var(--fontDisplay);font-style:italic;font-size:17px;color:var(--goldSoft);">N</span>
          </div>
          <div>
            <div style="font-weight:700;font-size:15px;">Naomi</div>
            <div style="font-size:11.5px;color:var(--inkSoft);">${questionMode?'Getting to know you':'Your AI matchmaker \u2022 online'}</div>
          </div>
        </div>

        ${progressHTML()}

        <!-- Chat log (all messages persist here) -->
        <div style="flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:14px;" id="chatLog">
          ${messages.map(m => m.from==='naomi' ? chatBubbleNaomi(m.text) : chatBubbleUser(m.text)).join('')}
        </div>

        <!-- Input bar or action chips -->
        ${q ? inputBarHTML(q.hint || 'Type your answer\u2026', 'chatAnswer', false) :
          !nameEntered ? inputBarHTML('Type your name\u2026', 'chatAnswer', false) :
          !questionMode ? `` : ``}

      </div>
      <style>
        @keyframes ripple1{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.7);opacity:0}}
        @keyframes wave{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
      </style>`;

    const log = document.getElementById('chatLog');
    if(log) setTimeout(()=>{ log.scrollTop = log.scrollHeight; }, 50);
    wireSchedIcon('naomiintro');

    // Voice nav autofill
    const $navV = document.getElementById('navVoice');
    if($navV && !nameEntered) $navV.onclick = () => {
      const $inp = document.getElementById('chatAnswer');
      if($inp){ $inp.value = NAME_SIM; const $s=document.getElementById('chatSend'); if($s){$s.style.background='var(--clay)';$s.style.color='var(--cream)';} $inp.focus(); }
    };

    wireInputBar();
  }

  // ── Wire input bar ─────────────────────────────────────────────────────────
  function wireInputBar(){
    const $ta   = document.getElementById('chatAnswer');
    const $send = document.getElementById('chatSend');
    const $mic  = document.getElementById('chatMic');
    if(!$ta) return;

    $ta.oninput = () => {
      $ta.style.height='auto'; $ta.style.height=Math.min($ta.scrollHeight,80)+'px';
      if($send){ const has=$ta.value.trim().length>0; $send.style.background=has?'var(--clay)':'var(--paperDeep)'; $send.style.color=has?'var(--cream)':'var(--inkSoft)'; }
    };

    if($mic) $mic.onclick = () => {
      // Autofill simulation
      const seq = getSequence();
      const q   = questionMode && seq[qIdx] ? seq[qIdx] : null;
      const sim = q ? (TRANSCRIPT_SIMS[q.id] || GENERIC_SIM) : NAME_SIM;
      if($ta){ $ta.value=sim; $ta.style.height='auto'; $ta.style.height=Math.min($ta.scrollHeight,80)+'px'; if($send){$send.style.background='var(--clay)';$send.style.color='var(--cream)';} }
    };

    if($send) $send.onclick = () => handleSend($ta ? $ta.value.trim() : '');
    $ta.onkeydown = (e) => { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); handleSend($ta.value.trim()); } };
  }

  // ── Handle send ────────────────────────────────────────────────────────────
  function handleSend(value){
    stopRecording();
    if(!value) return;

    if(!nameEntered){
      // Name phase
      const name = value || NAME_SIM;
      messages.push({from:'user', text:name});
      const greet = scheduledTime
        ? `Great to meet you, ${name}! I see we have a session scheduled for ${scheduledTime.label}. Ready when you are.`
        : `Great to meet you, ${name}! I\u2019d love to get to know you a little \u2014 just 6 questions. Let\u2019s start.`;
      messages.push({from:'naomi', text:greet});
      nameEntered = true;

      // Show action cards below in chat
      paint();
      setTimeout(() => {
        const log = document.getElementById('chatLog');
        if(!log) return;
        const area = document.createElement('div');
        area.style.cssText = 'display:flex;flex-direction:column;gap:10px;margin-top:8px;';
        area.innerHTML = `
          <button class="chatOpt" data-id="start" style="width:100%;padding:18px 20px;border-radius:18px;border:1.5px solid var(--line);background:var(--cream);cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);">
            <div style="width:40px;height:40px;border-radius:12px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--goldSoft)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
            <div><div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:2px;">${scheduledTime?'I\u2019m ready \u2014 let\u2019s begin':'Let\u2019s start now'}</div><div style="font-size:12.5px;color:var(--inkSoft);">Takes about 5 minutes</div></div>
            <svg style="margin-left:auto;flex-shrink:0;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--inkSoft)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <button class="chatOpt" data-id="sched" style="width:100%;padding:18px 20px;border-radius:18px;border:1.5px solid var(--line);background:var(--paperDeep);cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;">
            <div style="width:40px;height:40px;border-radius:12px;background:var(--paperDeep);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--inkSoft)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
            <div><div style="font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px;">${scheduledTime?'\u270f\ufe0f Edit my scheduled time':'Schedule for later'}</div><div style="font-size:12.5px;color:var(--inkSoft);">${scheduledTime?scheduledTime.label:'Pick a time that works for you'}</div></div>
            <svg style="margin-left:auto;flex-shrink:0;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--inkSoft)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>`;
        log.appendChild(area);
        log.scrollTop = log.scrollHeight;
        area.querySelectorAll('.chatOpt').forEach(el => {
          el.onclick = () => {
            if(el.dataset.id === 'sched'){ go('schedule'); return; }
            // Start questions — remove chips, add first question
            area.remove();
            questionMode = true;
            qIdx = 0;
            appendToFirstQuestion();
          };
        });
      }, 100);
      return;
    }

    if(questionMode){
      // Question phase — answer the current question
      const seq = getSequence();
      const q   = seq[qIdx];
      if(!q) return;

      answers[q.id] = value;
      const reaction = getNaomiReaction(q.id);

      // Append user bubble
      const log = document.getElementById('chatLog');
      if(log){
        const ub = document.createElement('div');
        ub.style.cssText = 'display:flex;justify-content:flex-end;';
        ub.innerHTML = `<div style="background:var(--navy);border-radius:18px 18px 4px 18px;padding:12px 16px;max-width:78%;font-size:15px;line-height:1.5;color:var(--cream);">${value}</div>`;
        log.appendChild(ub);
        log.scrollTop = log.scrollHeight;

        // Clear input immediately
        const $ta=document.getElementById('chatAnswer');
        if($ta){ $ta.value=''; $ta.style.height='22px'; }
        const $send=document.getElementById('chatSend');
        if($send){ $send.style.background='var(--paperDeep)'; $send.style.color='var(--inkSoft)'; }

        // Naomi reaction
        setTimeout(()=>{
          const rb = document.createElement('div');
          rb.style.cssText = 'display:flex;gap:8px;align-items:flex-end;';
          rb.innerHTML = `<div style="width:28px;height:28px;border-radius:50%;background:var(--navy);flex-shrink:0;display:flex;align-items:center;justify-content:center;"><span style="font-family:var(--fontDisplay);font-style:italic;font-size:12px;color:var(--goldSoft);">N</span></div>
            <div style="background:var(--cream);border:1px solid var(--line);border-radius:18px 18px 18px 4px;padding:10px 14px;max-width:78%;font-size:14px;line-height:1.45;color:var(--ink);font-style:italic;">${reaction}</div>`;
          log.appendChild(rb);
          log.scrollTop = log.scrollHeight;

          // Advance to next question
          setTimeout(()=>{
            qIdx++;
            const seq2 = getSequence();
            if(qIdx >= seq2.length){
              // Done — trigger verification
              startVerification();
            } else {
              // Append next question bubble
              const nextQ = seq2[qIdx];
              const nb = document.createElement('div');
              nb.style.cssText = 'display:flex;gap:10px;align-items:flex-end;';
              nb.innerHTML = `<div style="width:28px;height:28px;border-radius:50%;background:var(--navy);flex-shrink:0;display:flex;align-items:center;justify-content:center;"><span style="font-family:var(--fontDisplay);font-style:italic;font-size:12px;color:var(--goldSoft);">N</span></div>
                <div><div style="background:var(--cream);border:1px solid var(--line);border-radius:18px 18px 18px 4px;padding:12px 16px;max-width:78%;font-size:15px;line-height:1.5;color:var(--ink);">${nextQ.q}</div>${nextQ.hint?`<div style="font-size:11.5px;color:var(--inkSoft);padding:4px 8px 0;font-style:italic;">${nextQ.hint}</div>`:''}</div>`;
              log.appendChild(nb);
              log.scrollTop = log.scrollHeight;

              // Update progress bar
              const total = getSequence().length;
              const $bar = document.getElementById('kycProgBar');
              const $sub = document.getElementById('kycHeaderSub');
              if($bar) $bar.style.width = `${Math.round(((qIdx+1)/total)*100)}%`;
              if($sub) $sub.textContent = `${qIdx+1} of ${total}`;
            }
          }, 900);
        }, 500);
      }
    }
  }

  function appendToFirstQuestion(){
    // Show progress bar
    const $header = document.querySelector('[style*="padding:18px 20px 12px"]');
    const $chat   = document.getElementById('chatLog');
    if(!$chat) return;

    // Add progress bar above chat log by inserting into DOM
    const progDiv = document.createElement('div');
    progDiv.style.cssText = 'padding:8px 16px 0;flex-shrink:0;';
    progDiv.innerHTML = `
      <div style="height:3px;border-radius:2px;background:var(--paperDeep);overflow:hidden;">
        <div id="kycProgBar" style="height:100%;width:${Math.round((1/6)*100)}%;background:var(--clay);border-radius:2px;transition:width .4s;"></div>
      </div>
      <div id="kycHeaderSub" style="font-family:var(--fontMono);font-size:9px;color:var(--inkSoft);letter-spacing:.06em;margin-top:3px;text-align:right;">1 of 6</div>`;
    $chat.parentNode.insertBefore(progDiv, $chat);

    // Add question bubble and input bar
    const seq  = getSequence();
    const q    = seq[0];
    const nb   = document.createElement('div');

// ── MATCHMAKING SUCCESS — animated progress before results ────────────────────
RENDERERS.matchmaking = function(){
  const steps = [
    { label:"Analysing your Relationship DNA",   duration: 1600 },
    { label:"Scanning compatibility patterns",    duration: 1800 },
    { label:"Filtering by values & dealbreakers", duration: 1500 },
    { label:"Ranking top candidates",             duration: 1400 },
    { label:"Preparing your introductions",       duration: 1200 },
  ];
  let current = 0;
  let progress = 0;
  let progressTimer = null;

  function paint(){
    const doneSteps = steps.slice(0, current);
    const activeStep = steps[current];

    $body.innerHTML = `
      <div style="height:100%;display:flex;flex-direction:column;background:var(--navy);padding:36px 28px 40px;">

        <!-- Header -->
        <div style="text-align:center;margin-bottom:40px;">
          <div style="width:56px;height:56px;border-radius:50%;background:rgba(201,162,75,.15);border:1.5px solid rgba(201,162,75,.4);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <span style="font-family:var(--fontDisplay);font-style:italic;font-size:24px;color:var(--goldSoft);">N</span>
          </div>
          <h2 style="font-family:var(--fontDisplay);font-size:22px;color:var(--cream);margin-bottom:6px;line-height:1.3;">Finding your matches.</h2>
          <p style="font-size:13px;color:rgba(255,252,246,.45);line-height:1.6;">Naomi is going through everyone to find the people who genuinely fit.</p>
        </div>

        <!-- Step list -->
        <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:36px;flex:1;">
          ${steps.map((s, i) => {
            const isDone   = i < current;
            const isActive = i === current;
            return `<div style="display:flex;align-items:center;gap:14px;opacity:${isDone||isActive?1:0.3};transition:opacity .4s;">
              <div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;
                background:${isDone?"var(--ok)":isActive?"rgba(201,162,75,.2)":"rgba(255,252,246,.06)"};
                border:1.5px solid ${isDone?"var(--ok)":isActive?"var(--gold)":"rgba(255,252,246,.12)"};
                display:flex;align-items:center;justify-content:center;transition:all .4s;">
                ${isDone
                  ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`
                  : isActive
                  ? `<div style="width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 1s ease-in-out infinite;"></div>`
                  : `<div style="width:6px;height:6px;border-radius:50%;background:rgba(255,252,246,.2);"></div>`}
              </div>
              <span style="font-size:14px;color:${isDone?"rgba(255,252,246,.6)":isActive?"var(--cream)":"rgba(255,252,246,.4)"};font-weight:${isActive?600:400};transition:all .3s;">${s.label}</span>
            </div>`;
          }).join("")}
        </div>

        <!-- Progress bar -->
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-family:var(--fontMono);font-size:10px;letter-spacing:.1em;color:rgba(255,252,246,.35);text-transform:uppercase;">Matching progress</span>
            <span id="pctLabel" style="font-family:var(--fontMono);font-size:11px;color:var(--goldSoft);">${progress}%</span>
          </div>
          <div style="height:4px;border-radius:4px;background:rgba(255,252,246,.1);overflow:hidden;">
            <div id="progBar" style="height:100%;width:${progress}%;background:linear-gradient(90deg,var(--clay),var(--gold));border-radius:4px;transition:width .3s ease;"></div>
          </div>
          <div style="margin-top:12px;font-size:12px;color:rgba(255,252,246,.3);text-align:center;line-height:1.5;">
            ${current < steps.length ? "This usually takes less than a minute." : "Matches ready."}
          </div>
        </div>
      </div>
      <style>@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.6}}</style>`;
  }

  function runStep(){
    if (current >= steps.length){
      clearInterval(progressTimer);
      setTimeout(() => go("matchreveal"), 600);
      return;
    }
    paint();

    // Smoothly increment progress bar over the step duration
    const stepProgress = 100 / steps.length;
    const startPct     = current * stepProgress;
    const endPct       = startPct + stepProgress;
    const stepMs       = steps[current].duration;
    const tickMs       = 40;
    const ticks        = stepMs / tickMs;
    let tick           = 0;

    progressTimer = setInterval(() => {
      tick++;
      progress = Math.round(startPct + (endPct - startPct) * (tick / ticks));
      const $bar = document.getElementById("progBar");
      const $pct = document.getElementById("pctLabel");
      if ($bar) $bar.style.width = progress + "%";
      if ($pct) $pct.textContent = Math.min(progress, 99) + "%";
      if (tick >= ticks){
        clearInterval(progressTimer);
        current++;
        setTimeout(runStep, 200);
      }
    }, tickMs);
    timers.push(progressTimer);
  }

  runStep();
};

          <button id="kfCont" class="btn" style="font-size:15px;">${isLast ? 'Complete verification' : 'Continue \u2014 ' + STAGES[step+1].title}</button>

        </div>
      </div>`;

    // Step counter dots
    document.getElementById('kfBack').onclick = () => {
      if(step > 0){ step--; paint(); }
      else back();
    };
    document.getElementById('kfCont').onclick = () => {
      if(step < STAGES.length - 1){ step++; paint(); }
      else go('kycphotoupload');
    };
  }
  paint();
};

          <!-- Rules -->
          <div style="background:var(--paperDeep);border-radius:12px;padding:12px 14px;border:1px solid var(--line);">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--inkSoft);margin-bottom:8px;">Face visibility rules</div>
            ${['Face must be clearly visible in every photo','No sunglasses, masks or heavy filters','At least one photo looking directly at the camera','Photos must be within the last 2 years'].map(r=>`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;"><div style="width:4px;height:4px;border-radius:50%;background:var(--clay);flex-shrink:0;margin-top:5px;"></div><span style="font-size:12px;color:var(--inkSoft);line-height:1.45;">${r}</span></div>`).join('')}

        slot.querySelector('.ppRemove').onclick=(e)=>{ e.stopPropagation(); localPhotos.splice(i,1); paint(); };
      }
    });
  }
  paint();
};

RENDERERS.schedule = function(){
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const SLOTS  = ['9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM','6:00 PM','7:00 PM','8:00 PM'];

  const today  = new Date();
  today.setHours(0,0,0,0);

  // Restore from saved scheduledTime or start fresh
  let viewYear  = scheduledTime ? scheduledTime.year  : today.getFullYear();
  let viewMonth = scheduledTime ? scheduledTime.month : today.getMonth();
  let selDate   = scheduledTime ? new Date(scheduledTime.year, scheduledTime.month, scheduledTime.date) : null;
  let selTime   = scheduledTime ? scheduledTime.time  : null;
  let confirmed = false;

  function buildCalendar(){
    const first = new Date(viewYear, viewMonth, 1).getDay();
    const days  = new Date(viewYear, viewMonth + 1, 0).getDate();
    let cells = '';
    for(let i = 0; i < first; i++)
      cells += `<div></div>`;
    for(let d = 1; d <= days; d++){
      const date    = new Date(viewYear, viewMonth, d);
      const isPast  = date < today;
      const isSat   = date.getDay() === 0;
      const isSun   = date.getDay() === 6;
      const isWkend = isSat || isSun;
      const isToday = date.getTime() === today.getTime();
      const isSel   = selDate && date.getTime() === selDate.getTime();
      const disabled= isPast || isWkend;

      cells += `<div class="calDay" data-d="${d}"
        style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;
        border-radius:50%;font-size:13.5px;font-weight:${isToday?700:400};cursor:${disabled?'default':'pointer'};
        color:${isSel?'var(--cream)':disabled?'rgba(26,26,26,.25)':'var(--ink)'};
        background:${isSel?'var(--clay)':isToday&&!isSel?'transparent':'transparent'};
        border:${isToday&&!isSel?'1.5px solid var(--clay)':'1.5px solid transparent'};
        transition:background .15s;">${d}</div>`;
    }
    return cells;
  }

  function paint(){
    if(confirmed){
      const label = `${MONTHS[selDate.getMonth()]} ${selDate.getDate()} · ${selTime}`;
      scheduledTime = { label, year: selDate.getFullYear(), month: selDate.getMonth(), date: selDate.getDate(), time: selTime };

      $body.innerHTML = `
        <div class="screen justifyBetween" style="padding:28px 24px;">
          <div style="text-align:center;padding-top:32px;">
            <div style="width:60px;height:60px;border-radius:50%;background:var(--okBg);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h2 class="disp" style="font-size:22px;margin-bottom:12px;">You&rsquo;re scheduled.</h2>
            <div style="display:inline-block;padding:13px 24px;border-radius:14px;background:var(--paperDeep);border:1px solid var(--line);margin-bottom:8px;">
              <div style="font-family:var(--fontMono);font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.04em;">${label}</div>
            </div>
            <div style="margin-bottom:24px;">
              <button id="editSched" style="background:none;border:none;font-family:var(--fontBody);font-size:13.5px;color:var(--clay);cursor:pointer;text-decoration:underline;text-decoration-color:rgba(184,100,90,.35);">✏️ Edit date or time</button>
            </div>
            <p class="bodyMuted" style="font-size:13.5px;line-height:1.65;max-width:260px;margin:0 auto;">Naomi will be ready when you are. You&rsquo;ll get a reminder 1 hour before.</p>
          </div>
          <button class="btn" id="backNaomi">Back to Naomi</button>
        </div>`;

      document.getElementById('editSched').onclick = () => { confirmed = false; paint(); };
      document.getElementById('backNaomi').onclick = () => go('naomiintro');
      return;
    }

    const hasSlots = !!selDate;
    $body.innerHTML = `
      <div style="height:100%;display:flex;flex-direction:column;background:var(--paper);">

        <!-- Header -->
        <div style="padding:16px 20px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);flex-shrink:0;">
          <button id="schedBack" style="width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--cream);color:var(--inkSoft);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;">&larr;</button>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:15px;color:var(--ink);">Schedule your session</div>
            <div style="font-size:11.5px;color:var(--inkSoft);">Pick a date and time that works</div>
          </div>
        </div>

        <!-- Scrollable body -->
        <div style="flex:1;overflow-y:auto;padding:20px 20px 8px;">

          <!-- Month nav -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <button id="prevMonth" style="width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--cream);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--inkSoft);">‹</button>
            <div style="font-weight:700;font-size:15px;color:var(--ink);">${MONTHS[viewMonth]} ${viewYear}</div>
            <button id="nextMonth" style="width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--cream);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--ink);">›</button>
          </div>

          <!-- Day labels -->
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;">
            ${DAYS.map(d=>`<div style="text-align:center;font-family:var(--fontMono);font-size:10px;color:var(--inkSoft);letter-spacing:.06em;padding:4px 0;">${d}</div>`).join('')}
          </div>

          <!-- Calendar grid -->
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:22px;" id="calGrid">
            ${buildCalendar()}
          </div>

          <!-- Time slots -->
          ${hasSlots ? `
          <div style="margin-bottom:8px;">
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--inkSoft);margin-bottom:12px;">Available times</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              ${SLOTS.map(t => {
                const isSel = t === selTime;
                return `<button class="slotBtn" data-t="${t}" style="padding:11px 0;border-radius:12px;border:1.5px solid ${isSel?'var(--clay)':'var(--line)'};background:${isSel?'var(--clayBg)':'var(--cream)'};font-family:var(--fontBody);font-size:13.5px;font-weight:${isSel?700:400};color:${isSel?'var(--clay)':'var(--ink)'};cursor:pointer;transition:all .15s;">${t}</button>`;
              }).join('')}
            </div>
          </div>` : `
          <div style="display:flex;align-items:center;justify-content:center;padding:24px 0;">
            <p style="font-size:13.5px;color:var(--inkSoft);text-align:center;line-height:1.6;">Select a date above<br>to see available times.</p>
          </div>`}
        </div>

        <!-- Confirm footer -->
        <div style="padding:12px 20px 20px;border-top:1px solid var(--line);flex-shrink:0;">
          <button id="confirmSched" class="btn" style="opacity:${selTime?1:.38};">
            ${selTime ? `Confirm — ${MONTHS[selDate.getMonth()]} ${selDate.getDate()} · ${selTime}` : 'Select a date and time'}
          </button>
        </div>
      </div>`;

    // Back
    document.getElementById('schedBack').onclick = () => back();

    // Month nav
    document.getElementById('prevMonth').onclick = () => {
      viewMonth--; if(viewMonth < 0){ viewMonth=11; viewYear--; } paint();
    };
    document.getElementById('nextMonth').onclick = () => {
      viewMonth++; if(viewMonth > 11){ viewMonth=0; viewYear++; } paint();
    };

    // Day clicks
    document.getElementById('calGrid').querySelectorAll('.calDay').forEach(el => {
      const d   = +el.dataset.d;
      const date = new Date(viewYear, viewMonth, d);
      const disabled = date < today || date.getDay() === 0 || date.getDay() === 6;
      if(disabled) return;
      el.onmouseenter = () => { if(!el.style.background.includes('clay')) el.style.background='var(--paperDeep)'; };
      el.onmouseleave = () => { if(!el.style.background.includes('clay')) el.style.background='transparent'; };
      el.onclick = () => { selDate = date; selTime = null; paint(); };
    });

    // Time slot clicks
    document.querySelectorAll('.slotBtn').forEach(el => {
      el.onclick = () => { selTime = el.dataset.t; paint(); };
    });

    // Confirm
    document.getElementById('confirmSched').onclick = () => {
      if(selTime) { confirmed = true; paint(); }
    };
  }

  paint();
};




function go(id){
  history.push(id);
  render(id);
}

function back(){
  if (history.length < 2) return;
  history.pop();
  const id = history[history.length - 1];
  render(id, true);
}

function jumpTo(id){
  history.push(id);
  render(id);
}

function render(id, skipPush){
  clearTimers();
  RENDERERS[id]();
  setStatusDark(DARK_STATUS_SCREENS.has(id));
  const idx = FLOW_ORDER.indexOf(id);
  $stepBadge.textContent = `${SECTION_LABELS[id] || '—'} · ${idx >= 0 ? idx + 1 : '?'}/${FLOW_ORDER.length}`;
  $backBtn.disabled = history.length < 2;
  paintJumpNav(id);
}

function paintJumpNav(current){
  const groups = {};
  FLOW_ORDER.forEach(id => {
    const sec = SECTION_LABELS[id] || '—';
    (groups[sec] = groups[sec] || []).push(id);
  });
  $jumpNavContent.innerHTML = Object.entries(groups).map(([sec, ids]) => `
    <div class="jnSection">
      <div class="jnSecLabel">${sec}</div>
      ${ids.map(id => `<button class="jnBtn ${id === current ? 'active' : ''}" data-id="${id}">${id}</button>`).join('')}
    </div>`).join('');
  $jumpNavContent.querySelectorAll('.jnBtn').forEach(b => {
    b.onclick = () => jumpTo(b.dataset.id);
  });
}

$backBtn.onclick = back;

render('splash');
</script>
</body>
