RENDERERS.schedule = function(){
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const SLOTS  = ['9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM','6:00 PM','7:00 PM','8:00 PM'];

  const today  = new Date();
  today.setHours(0,0,0,0);

  // Restore from saved scheduledTime or start fresh
  let viewYear  = scheduledTime ? scheduledTime.year  : today.getFullYear();
  let viewMonth = scheduledTime ? scheduledTime.month : today.getMonth();
  let selDate   = scheduledTime ? new Date(scheduledTime.year, scheduledTime.month, scheduledTime.date) : null;
  let selTime   = scheduledTime ? scheduledTime.time  : null;
  let confirmed = false;

  function buildCalendar(){
    const first = new Date(viewYear, viewMonth, 1).getDay();
    const days  = new Date(viewYear, viewMonth + 1, 0).getDate();
    let cells = '';
    for(let i = 0; i < first; i++)
      cells += `<div></div>`;
    for(let d = 1; d <= days; d++){
      const date    = new Date(viewYear, viewMonth, d);
      const isPast  = date < today;
      const isSat   = date.getDay() === 0;
      const isSun   = date.getDay() === 6;
      const isWkend = isSat || isSun;
      const isToday = date.getTime() === today.getTime();
      const isSel   = selDate && date.getTime() === selDate.getTime();
      const disabled= isPast || isWkend;

      cells += `<div class="calDay" data-d="${d}"
        style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;
        border-radius:50%;font-size:13.5px;font-weight:${isToday?700:400};cursor:${disabled?'default':'pointer'};
        color:${isSel?'var(--cream)':disabled?'rgba(26,26,26,.25)':'var(--ink)'};
        background:${isSel?'var(--clay)':isToday&&!isSel?'transparent':'transparent'};
        border:${isToday&&!isSel?'1.5px solid var(--clay)':'1.5px solid transparent'};
        transition:background .15s;">${d}</div>`;
    }
    return cells;
  }

  function paint(){
    if(confirmed){
      const label = `${MONTHS[selDate.getMonth()]} ${selDate.getDate()} · ${selTime}`;
      scheduledTime = { label, year: selDate.getFullYear(), month: selDate.getMonth(), date: selDate.getDate(), time: selTime };

      $body.innerHTML = `
        <div class="screen justifyBetween" style="padding:28px 24px;">
          <div style="text-align:center;padding-top:32px;">
            <div style="width:60px;height:60px;border-radius:50%;background:var(--okBg);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h2 class="disp" style="font-size:22px;margin-bottom:12px;">You&rsquo;re scheduled.</h2>
            <div style="display:inline-block;padding:13px 24px;border-radius:14px;background:var(--paperDeep);border:1px solid var(--line);margin-bottom:8px;">
              <div style="font-family:var(--fontMono);font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.04em;">${label}</div>
            </div>
            <div style="margin-bottom:24px;">
              <button id="editSched" style="background:none;border:none;font-family:var(--fontBody);font-size:13.5px;color:var(--clay);cursor:pointer;text-decoration:underline;text-decoration-color:rgba(184,100,90,.35);">✏️ Edit date or time</button>
            </div>
            <p class="bodyMuted" style="font-size:13.5px;line-height:1.65;max-width:260px;margin:0 auto;">Naomi will be ready when you are. You&rsquo;ll get a reminder 1 hour before.</p>
          </div>
          <button class="btn" id="backNaomi">Back to Naomi</button>
        </div>`;

      document.getElementById('editSched').onclick = () => { confirmed = false; paint(); };
      document.getElementById('backNaomi').onclick = () => go('naomiintro');
      return;
    }

    const hasSlots = !!selDate;
    $body.innerHTML = `
      <div style="height:100%;display:flex;flex-direction:column;background:var(--paper);">

        <!-- Header -->
        <div style="padding:16px 20px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);flex-shrink:0;">
          <button id="schedBack" style="width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--cream);color:var(--inkSoft);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;">&larr;</button>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:15px;color:var(--ink);">Schedule your session</div>
            <div style="font-size:11.5px;color:var(--inkSoft);">Pick a date and time that works</div>
          </div>
        </div>

        <!-- Scrollable body -->
        <div style="flex:1;overflow-y:auto;padding:20px 20px 8px;">

          <!-- Month nav -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <button id="prevMonth" style="width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--cream);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--inkSoft);">‹</button>
            <div style="font-weight:700;font-size:15px;color:var(--ink);">${MONTHS[viewMonth]} ${viewYear}</div>
            <button id="nextMonth" style="width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--cream);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--ink);">›</button>
          </div>

          <!-- Day labels -->
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;">
            ${DAYS.map(d=>`<div style="text-align:center;font-family:var(--fontMono);font-size:10px;color:var(--inkSoft);letter-spacing:.06em;padding:4px 0;">${d}</div>`).join('')}
          </div>

          <!-- Calendar grid -->
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:22px;" id="calGrid">
            ${buildCalendar()}
          </div>

          <!-- Time slots -->
          ${hasSlots ? `
          <div style="margin-bottom:8px;">
            <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--inkSoft);margin-bottom:12px;">Available times</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              ${SLOTS.map(t => {
                const isSel = t === selTime;
                return `<button class="slotBtn" data-t="${t}" style="padding:11px 0;border-radius:12px;border:1.5px solid ${isSel?'var(--clay)':'var(--line)'};background:${isSel?'var(--clayBg)':'var(--cream)'};font-family:var(--fontBody);font-size:13.5px;font-weight:${isSel?700:400};color:${isSel?'var(--clay)':'var(--ink)'};cursor:pointer;transition:all .15s;">${t}</button>`;
              }).join('')}
            </div>
          </div>` : `
          <div style="display:flex;align-items:center;justify-content:center;padding:24px 0;">
            <p style="font-size:13.5px;color:var(--inkSoft);text-align:center;line-height:1.6;">Select a date above<br>to see available times.</p>
          </div>`}
        </div>

        <!-- Confirm footer -->
        <div style="padding:12px 20px 20px;border-top:1px solid var(--line);flex-shrink:0;">
          <button id="confirmSched" class="btn" style="opacity:${selTime?1:.38};">
            ${selTime ? `Confirm — ${MONTHS[selDate.getMonth()]} ${selDate.getDate()} · ${selTime}` : 'Select a date and time'}
          </button>
        </div>
      </div>`;

    // Back
    document.getElementById('schedBack').onclick = () => back();

    // Month nav
    document.getElementById('prevMonth').onclick = () => {
      viewMonth--; if(viewMonth < 0){ viewMonth=11; viewYear--; } paint();
    };
    document.getElementById('nextMonth').onclick = () => {
      viewMonth++; if(viewMonth > 11){ viewMonth=0; viewYear++; } paint();
    };

    // Day clicks
    document.getElementById('calGrid').querySelectorAll('.calDay').forEach(el => {
      const d   = +el.dataset.d;
      const date = new Date(viewYear, viewMonth, d);
      const disabled = date < today || date.getDay() === 0 || date.getDay() === 6;
      if(disabled) return;
      el.onmouseenter = () => { if(!el.style.background.includes('clay')) el.style.background='var(--paperDeep)'; };
      el.onmouseleave = () => { if(!el.style.background.includes('clay')) el.style.background='transparent'; };
      el.onclick = () => { selDate = date; selTime = null; paint(); };
    });

    // Time slot clicks
    document.querySelectorAll('.slotBtn').forEach(el => {
      el.onclick = () => { selTime = el.dataset.t; paint(); };
    });

    // Confirm
    document.getElementById('confirmSched').onclick = () => {
      if(selTime) { confirmed = true; paint(); }
    };
  }

  paint();
};




function go(id){
  history.push(id);
  render(id);
}

function back(){
  if (history.length < 2) return;
  history.pop();
  const id = history[history.length - 1];
  render(id, true);
}

function jumpTo(id){
  history.push(id);
  render(id);
}

function render(id, skipPush){
  clearTimers();
  RENDERERS[id]();
  setStatusDark(DARK_STATUS_SCREENS.has(id));
  const idx = FLOW_ORDER.indexOf(id);
  $stepBadge.textContent = `${SECTION_LABELS[id] || '—'} · ${idx >= 0 ? idx + 1 : '?'}/${FLOW_ORDER.length}`;
  $backBtn.disabled = history.length < 2;
  paintJumpNav(id);
}

function paintJumpNav(current){
  const groups = {};
  FLOW_ORDER.forEach(id => {
    const sec = SECTION_LABELS[id] || '—';
    (groups[sec] = groups[sec] || []).push(id);
  });
  $jumpNavContent.innerHTML = Object.entries(groups).map(([sec, ids]) => `
    <div class="jnSection">
      <div class="jnSecLabel">${sec}</div>
      ${ids.map(id => `<button class="jnBtn ${id === current ? 'active' : ''}" data-id="${id}">${id}</button>`).join('')}
    </div>`).join('');
  $jumpNavContent.querySelectorAll('.jnBtn').forEach(b => {
    b.onclick = () => jumpTo(b.dataset.id);
  });
}

$backBtn.onclick = back;

render('splash');
</script>
</body>
</html>
