<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAOMI · Clickable Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
  :root{
    --paper:#FAF6EF; --paperDeep:#F2ECDF; --ink:#1C1B19; --inkSoft:#5B564C;
    --line:#E3DCC9; --clay:#B8645A; --clayDeep:#8F4A42; --clayBg:#FBF1EE;
    --navy:#1F3A35; --gold:#C9A24B; --goldSoft:#E7D9AE; --cream:#FFFCF6;
    --ok:#5F7F5C; --okBg:#EAF1E8;
    --fontDisplay:"Fraunces","Iowan Old Style",Georgia,serif;
    --fontBody:"Inter",-apple-system,"Segoe UI",sans-serif;
    --fontMono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:radial-gradient(circle at 20% 10%, #F5EEDD, var(--paperDeep) 70%);
    display:flex; flex-direction:column; align-items:center;
    padding:40px 16px 60px; font-family:var(--fontBody);
  }
  .pageHeader{ text-align:center; margin-bottom:28px; max-width:480px; }
  .pageHeader .eyebrow{ font-family:var(--fontMono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--clayDeep); margin-bottom:8px; }
  .pageHeader h1{ font-family:var(--fontDisplay); font-size:28px; color:var(--ink); margin:0; }
  .pageHeader p{ font-size:13px; color:var(--inkSoft); margin-top:8px; }

  .layout{ display:flex; gap:28px; align-items:flex-start; }
  .phoneCol{ display:flex; flex-direction:column; align-items:center; gap:14px; }

  .phoneFrame{
    width:360px; height:740px; border-radius:44px; background:var(--ink);
    padding:10px; box-shadow:0 30px 60px rgba(28,27,25,.35), 0 2px 0 rgba(255,255,255,.4) inset;
    position:relative; flex-shrink:0;
  }
  .phoneScreen{
    width:100%; height:100%; border-radius:36px; background:var(--paper);
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .statusBar{
    height:44px; display:flex; align-items:center; justify-content:space-between;
    padding:0 26px; font-family:var(--fontBody); font-size:13px; font-weight:600;
    color:var(--ink); flex-shrink:0; transition:color .2s ease;
  }
  .statusBar.dark{ color:var(--cream); }
  .statusIcons{ display:flex; gap:5px; align-items:center; }
  .screenBody{ flex:1; position:relative; overflow:hidden; }
  .homeIndicatorWrap{ height:18px; display:flex; justify-content:center; align-items:flex-end; padding-bottom:6px; flex-shrink:0; }
  .homeIndicator{ width:120px; height:4px; border-radius:4px; background:rgba(28,27,25,.3); transition:background .2s ease; }
  .homeIndicator.dark{ background:rgba(255,252,246,.5); }

  .screen{
    height:100%; padding:28px; display:flex; flex-direction:column;
    justify-content:flex-start; font-family:var(--fontBody); color:var(--ink);
    box-sizing:border-box; overflow-y:auto; background:var(--paper);
  }
  .screen.justifyBetween{ justify-content:space-between; }
  .screen.justifyCenter{ justify-content:center; }

  .screenLabel{ font-family:var(--fontMono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--inkSoft); margin-bottom:14px; }

  .btn{
    width:100%; padding:16px 20px; border-radius:14px; border:none;
    background:var(--clay); color:var(--cream); font-family:var(--fontBody);
    font-size:15.5px; font-weight:600; cursor:pointer; transition:all .18s ease;
    box-shadow:0 4px 10px rgba(28,27,25,.12);
  }
  .btn:hover{ transform:translateY(-1px); box-shadow:0 8px 18px rgba(184,100,90,.35); }
  .btn:disabled{ opacity:.4; cursor:default; }
  .btn:disabled:hover{ transform:none; box-shadow:0 4px 10px rgba(28,27,25,.12); }
  .btn.dark{ background:var(--ink); }
  .btn.gold{ background:var(--gold); color:var(--navy); }
  .btn.navy{ background:var(--navy); }

  .btnGhost{
    width:100%; padding:14px 20px; border-radius:14px; border:1px solid var(--line);
    background:transparent; color:var(--ink); font-family:var(--fontBody);
    font-size:14.5px; font-weight:600; cursor:pointer;
  }
  .btnGhost:disabled{ opacity:.4; cursor:default; }

  .textLink{
    background:none; border:none; color:var(--inkSoft); font-family:var(--fontBody);
    font-size:13px; cursor:pointer; text-decoration:underline; text-decoration-color:var(--line); padding:0;
  }

  h1.disp{ font-family:var(--fontDisplay); margin:8px 0 18px; line-height:1.2; }
  .bodyMuted{ font-size:13.5px; color:var(--inkSoft); }

  .row{ display:flex; gap:10px; }
  .col{ display:flex; flex-direction:column; gap:10px; }

  input.field{
    padding:15px 16px; border-radius:12px; border:1px solid var(--line);
    background:var(--cream); font-family:var(--fontBody); font-size:14.5px; outline:none; width:100%;
  }

  .trustNote{ margin-top:22px; padding:12px 14px; border-radius:12px; background:var(--paperDeep); font-size:12px; color:var(--inkSoft); line-height:1.5; }

  .otpRow{ display:flex; gap:8px; justify-content:center; }
  .otpBox{
    width:38px; height:48px; border-radius:10px; border:1.5px solid var(--line);
    background:var(--cream); display:flex; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer; color:var(--clay); transition:border-color .15s ease;
  }
  .otpBox.filled{ border-color:var(--clay); }

  .checkRow{ display:flex; align-items:center; gap:12px; }
  .checkDot{
    width:20px; height:20px; border-radius:50%; border:1.5px solid rgba(255,252,246,.3);
    display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--navy);
    flex-shrink:0; transition:all .3s ease;
  }
  .checkDot.done{ background:var(--gold); border-color:var(--gold); }

  .naomiRow{ display:flex; gap:8px; align-items:flex-start; margin-bottom:12px; }
  .naomiAvatar{
    width:28px; height:28px; border-radius:50%; background:var(--navy); color:var(--goldSoft);
    font-family:var(--fontDisplay); font-style:italic; font-size:13px; display:flex;
    align-items:center; justify-content:center; flex-shrink:0;
  }
  .naomiAvatar.onDark{ background:var(--gold); color:var(--navy); width:32px; height:32px; font-size:15px; }
  .naomiBubble{
    background:var(--cream); border:1px solid var(--line); border-radius:4px 16px 16px 16px;
    padding:12px 15px; font-size:14px; line-height:1.5; max-width:78%; font-family:var(--fontDisplay);
  }
  .userRow{ display:flex; justify-content:flex-end; margin-bottom:12px; }
  .userBubble{ background:var(--clay); color:var(--cream); border-radius:16px 4px 16px 16px; padding:11px 16px; font-size:14px; max-width:72%; }

  .trustThread{ display:flex; gap:4px; align-items:center; height:36px; }
  .trustSeg{ width:26px; height:5px; border-radius:4px; background:var(--line); transition:background .3s ease; }
  .trustSeg.done{ background:var(--navy); }
  .trustSeg.doneGold{ background:var(--gold); }
  .trustSeg.current{ background:var(--clay); }

  .dnaCard{ border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; background:var(--cream); }
  .dnaCardTitle{ font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--inkSoft); margin-bottom:10px; }
  .tagRow{ display:flex; flex-wrap:wrap; gap:7px; }
  .tag{ font-size:12.5px; padding:5px 11px; border-radius:20px; background:var(--clayBg); color:var(--clayDeep); }
  .tag.ok{ background:var(--okBg); color:var(--ok); }
  .tag.muted{ background:var(--paperDeep); color:var(--inkSoft); }
  .orderedItem{ display:flex; gap:9px; font-size:13.5px; margin-bottom:7px; }
  .orderedItem .num{ font-family:var(--fontMono); color:var(--clay); font-weight:700; }

  .navyBox{ background:var(--navy); border-radius:16px; padding:18px; color:var(--cream); }
  .navyBoxLabel{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--goldSoft); margin-bottom:12px; }
  .navyBoxItem{ display:flex; gap:10px; font-size:13px; line-height:1.4; margin-bottom:10px; }

  .docBox{
    height:200px; border-radius:16px; border:2px dashed var(--line); background:var(--cream);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; cursor:pointer;
  }
  .docBox.captured{ border-color:var(--ok); background:var(--okBg); }

  .progressTrack{ height:8px; border-radius:6px; background:var(--paperDeep); overflow:hidden; margin-bottom:8px; }
  .progressFill{ height:100%; background:var(--clay); }

  .unlockItem{ display:flex; gap:10px; align-items:center; padding:12px 14px; border-radius:12px; background:var(--clayBg); margin-bottom:9px; }

  .navRow{ display:flex; gap:10px; align-items:center; }
  .backBtn{
    padding:9px 16px; border-radius:10px; border:1px solid var(--line); background:var(--cream);
    font-size:12.5px; cursor:pointer; font-family:var(--fontBody);
  }
  .backBtn:disabled{ opacity:.4; cursor:default; }
  .stepBadge{ font-family:var(--fontMono); font-size:11px; color:var(--inkSoft); padding:9px 14px; border-radius:10px; background:var(--paperDeep); }

  .jumpNav{ width:230px; max-height:740px; overflow-y:auto; background:var(--cream); border:1px solid var(--line); border-radius:18px; padding:16px; }
  .jumpNav .jnTitle{ font-family:var(--fontMono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--inkSoft); margin-bottom:12px; }
  .jnSection{ margin-bottom:10px; }
  .jnSection .jnSecLabel{ font-size:11px; font-weight:700; color:var(--clayDeep); margin-bottom:5px; }
  .jnBtn{
    display:block; width:100%; text-align:left; padding:6px 9px; border-radius:8px; border:none;
    background:transparent; color:var(--ink); font-weight:400; font-size:12px; cursor:pointer; font-family:var(--fontBody);
  }
  .jnBtn.active{ background:var(--clayBg); color:var(--clayDeep); font-weight:700; }

  @media (max-width: 760px){
    .layout{ flex-direction:column; align-items:center; }
    .jumpNav{ width:360px; max-height:260px; }
  }
</style>
</head>
<body>

  <div class="pageHeader">
    <div class="eyebrow">Naomi &middot; Clickable Prototype</div>
  </div>

  <div class="layout">
    <div class="phoneCol">
      <div class="phoneFrame">
        <div class="phoneScreen">
          <div class="statusBar" id="statusBar">
            <span>9:41</span>
            <div class="statusIcons" id="statusIcons"></div>
          </div>
          <div class="screenBody" id="screenBody"></div>
          <div class="homeIndicatorWrap">
            <div class="homeIndicator" id="homeIndicator"></div>
          </div>
        </div>
      </div>
      <div class="navRow">
        <button class="backBtn" id="backBtn">&larr; Back</button>
        <div class="stepBadge" id="stepBadge">&mdash;</div>
      </div>
    </div>

    <div class="jumpNav">
      <div class="jnTitle">Jump to screen</div>
      <div id="jumpNavContent"></div>
    </div>
  </div>

<script>
/* ============================================================
   NAOMI — Standalone Clickable Prototype (vanilla JS port)
   Mirrors NaomiPrototype.jsx screen-for-screen, no build step.
   ============================================================ */

const $body = document.getElementById('screenBody');
const $statusBar = document.getElementById('statusBar');
const $statusIcons = document.getElementById('statusIcons');
const $homeIndicator = document.getElementById('homeIndicator');
const $backBtn = document.getElementById('backBtn');
const $stepBadge = document.getElementById('stepBadge');
const $jumpNavContent = document.getElementById('jumpNavContent');

let history = ['splash'];
let timers = [];

function clearTimers(){ timers.forEach(t => clearTimeout(t) || clearInterval(t)); timers = []; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const STATUS_ICONS = `
  <svg width="16" height="11" viewBox="0 0 16 11" fill="none"><g class="sigfill">
  <rect x="0" y="7" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="6" rx="0.5"/>
  <rect x="9" y="3" width="3" height="8" rx="0.5"/><rect x="13.5" y="0" width="3" height="11" rx="0.5"/></g></svg>
  <svg width="15" height="11" viewBox="0 0 15 11" fill="none"><g class="sigfill">
  <path d="M7.5 9.8a1.1 1.1 0 110 2.2 1.1 1.1 0 010-2.2z"/><path d="M4.4 7.2a4.4 4.4 0 016.2 0l-1 1a3 3 0 00-4.2 0l-1-1z"/>
  <path d="M1.8 4.6a8 8 0 0111.4 0l-1 1a6.6 6.6 0 00-9.4 0l-1-1z"/></g></svg>
  <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
  <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" class="sigstroke" opacity="0.5"/>
  <rect x="2" y="2" width="17" height="8" rx="1.5" class="sigfill"/>
  <rect x="21.5" y="4" width="1.5" height="4" rx="0.7" class="sigfill" opacity="0.5"/></svg>
`;
$statusIcons.innerHTML = STATUS_ICONS;

function setStatusDark(dark){
  $statusBar.classList.toggle('dark', dark);
  $homeIndicator.classList.toggle('dark', dark);
  document.querySelectorAll('.sigfill').forEach(el => el.setAttribute('fill', dark ? '#FFFCF6' : '#1C1B19'));
  document.querySelectorAll('.sigstroke').forEach(el => el.setAttribute('stroke', dark ? '#FFFCF6' : '#1C1B19'));
}

// -- MODULE STATE --------------------------------------------------------------
let kycMode = 'voice';
let userGender = null;
let scheduledTime = null;
let naomiPostVerification = false; // set to true after KYC, so naomiintro shows post-verification actions
let kycStartStep = 0;               // set to 1 when step-0 (face scan) shown inline

// -- FLOW CONFIG ---------------------------------------------------------------
const FLOW_ORDER = [
  "splash","trailer","register","phoneinput","mobileotp","trust",
  "naomiintro","kycquestions","kycflow","dashboard","matches","kycphotoupload","kycverification","dnaprofile","deepquestions","vcomplete","paywall","matchmaking","matchreveal","schedule",

  splash:"Awareness", trailer:"Awareness", trust:"Awareness",
  register:"Onboarding", phoneinput:"Onboarding", mobileotp:"Onboarding",
  naomiintro:"Onboarding flow", kycquestions:"Onboarding flow", dashboard:"App", matches:"App",
  kycverification:"KYC flow", kycflow:"KYC flow", schedule:"Onboarding flow",
};
const DARK_STATUS_SCREENS = new Set(["splash","trailer","kycquestions"]);

// -- SHARED HELPERS ------------------------------------------------------------

function renderOtp(title, sub, nextId, digits){
  $body.innerHTML = `
    <div class="screen justifyBetween">
      <div>
        <h1 class="disp" style="font-size:24px;margin-bottom:8px;">${title}</h1>
        <p class="bodyMuted" style="font-size:13px;margin-bottom:24px;">Enter the ${digits}-digit code we sent you.</p>
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px;">
          ${Array.from({length:digits},(_,i)=>`<div class="otpBox" data-i="${i}" style="width:${digits===6?42:50}px;height:52px;border-radius:11px;border:1.5px solid var(--line);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--clay);cursor:pointer;transition:border-color .15s;"></div>`).join('')}
        </div>
        <!-- Autofill shortcut -->
        <div style="text-align:center;margin-bottom:16px;">
          <button id="autofillBtn" style="background:none;border:1px solid var(--clay);border-radius:20px;padding:6px 16px;font-family:var(--fontBody);font-size:12.5px;color:var(--clay);cursor:pointer;">
            ✦ Autofill code
          </button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <button id="resendBtn" style="background:none;border:none;font-family:var(--fontBody);font-size:13px;color:var(--inkSoft);cursor:pointer;text-decoration:underline;text-decoration-color:var(--line);">Resend in 0:42</button>
          <button id="backLink" style="background:none;border:none;font-family:var(--fontBody);font-size:13px;color:var(--inkSoft);cursor:pointer;">&larr; Back</button>
        </div>
      </div>
      <button class="btn" id="verifyBtn" style="opacity:.4;">Verify</button>
    </div>`;
  let filled = new Array(digits).fill('');
  let secs = 42;
  const $btn = document.getElementById('verifyBtn');
  const timer = setInterval(()=>{ secs--; const r=document.getElementById('resendBtn'); if(r) r.textContent=secs>0?`Resend in 0:${String(secs).padStart(2,'0')}`:'Resend code'; if(secs<=0) clearInterval(timer); },1000);
  timers.push(timer);

  function fillBox(i, val){
    const box = document.querySelector(`.otpBox[data-i="${i}"]`);
    if(!box) return;
    filled[i] = val;
    box.textContent = val;
    box.style.borderColor = val ? 'var(--clay)' : 'var(--line)';
  }

  document.querySelectorAll('.otpBox').forEach(box=>{
    box.onclick=()=>{
      const i=+box.dataset.i; filled[i]=filled[i]?'':'•';
      box.textContent=filled[i]; box.style.borderColor=filled[i]?'var(--clay)':'var(--line)';
      const done=filled.every(Boolean); $btn.style.opacity=done?'1':'.4';
    };
  });

  // Autofill - fills all boxes instantly on one tap
  document.getElementById('autofillBtn').onclick = () => {
    for(let i=0;i<digits;i++) fillBox(i,'•');
    $btn.style.opacity='1';
  };

  $btn.onclick=()=>{ if(filled.every(Boolean)) go(nextId); };
  document.getElementById('backLink').onclick=()=>back();
}

function saveProgress(data){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify({...data, ts:Date.now()})); }catch(e){} }

function clearProgress(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }

// -- NAOMI INTRO ---------------------------------------------------------------
RENDERERS.naomiintro = function(){
  // Do NOT clearProgress()/reset here — naomiSession persists across
  // navigation to/from the schedule screen. Only resetNaomiSession() (called
  // from the trust screen) gives a true fresh start.

  const NAME_SIM = 'Naya';

  // -- Helpers --------------------------------------------------------------------
  function appendToLog(html){
    const log = document.getElementById('chatLog');
    if(!log) return;
    const wrap = document.createElement('div');
    wrap.innerHTML = html;
    while(wrap.firstChild) log.appendChild(wrap.firstChild);
    setTimeout(()=>{ log.scrollTop = log.scrollHeight; }, 40);
  }

  function naomiBubble(text){
    return `<div style="display:flex;gap:10px;align-items:flex-end;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="font-family:var(--fontDisplay);font-style:italic;font-size:12px;color:var(--goldSoft);">N</span>
      </div>
      <div style="background:var(--cream);border:1px solid var(--line);border-radius:18px 18px 18px 4px;padding:12px 16px;max-width:82%;font-size:15px;line-height:1.5;color:var(--ink);">${text}</div>
    </div>`;
  }

  function userBubble(text){
    return `<div style="display:flex;justify-content:flex-end;">
      <div style="background:var(--navy);border-radius:18px 18px 4px 18px;padding:12px 16px;max-width:82%;font-size:15px;line-height:1.5;color:var(--cream);">${text}</div>
    </div>`;
  }

  // -- Action area (Start questionnaire / Schedule for later) ---------------------
  function actionAreaHTML(){
    const name = naomiSession.userName;
    return `
      <button id="startBtn" style="width:100%;padding:18px 20px;border-radius:18px;border:1.5px solid var(--line);background:var(--cream);cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);">
        <div style="width:40px;height:40px;border-radius:12px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--goldSoft)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
        <div><div style="font-size:15px;font-weight:700;color:var(--ink);margin-bottom:2px;">${scheduledTime?'I\u2019m ready \u2014 let\u2019s begin':'Start questionnaire'}</div><div style="font-size:12.5px;color:var(--inkSoft);">10 questions \u00b7 about 5 minutes</div></div>
        <svg style="margin-left:auto;flex-shrink:0;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--inkSoft)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button id="schedBtn" style="width:100%;padding:18px 20px;border-radius:18px;border:1.5px solid var(--line);background:var(--paperDeep);cursor:pointer;text-align:left;display:flex;align-items:center;gap:14px;">
        <div style="width:40px;height:40px;border-radius:12px;background:var(--paperDeep);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--inkSoft)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div><div style="font-size:15px;font-weight:600;color:var(--ink);margin-bottom:2px;">${scheduledTime?'\u270f\ufe0f Edit my scheduled time':'Schedule for later'}</div><div style="font-size:12.5px;color:var(--inkSoft);">${scheduledTime?scheduledTime.label:'Pick a time that works for you'}</div></div>
        <svg style="margin-left:auto;flex-shrink:0;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--inkSoft)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>`;
  }

  function wireActionArea(area){
    document.getElementById('startBtn').onclick = () => { area.remove(); startSections(); };
    document.getElementById('schedBtn').onclick = () => go('schedule');
  }

  function appendActionArea(){
    const log = document.getElementById('chatLog');
    if(!log) return;
    const area = document.createElement('div');
    area.id = 'actionArea';
    area.style.cssText = 'display:flex;flex-direction:column;gap:10px;margin-top:8px;';
    area.innerHTML = actionAreaHTML();
    log.appendChild(area);
    log.scrollTop = log.scrollHeight;
    wireActionArea(area);
  }

  // -- Chat field-by-field rendering -----------------------------------------------
  let fieldQueue   = [];
  let pendingField = null;

  function buildFieldQueue(){
    fieldQueue = [];
    PORTRAIT_SECTIONS.forEach((s)=>{
      s.fields.forEach((f, fi)=>{
        fieldQueue.push({ section:s, field:f, isFirstOfSection: fi===0 });
      });
    });
  }

  function askNextField(){
    if(naomiSession.fieldIdx >= fieldQueue.length){
      const $ib = document.getElementById('chatInputBar');
      if($ib) $ib.remove();
      setTimeout(()=>{
        appendToLog(naomiBubble("That\u2019s everything I need. \u2714\ufe0f You\u2019ve built your Relationship DNA \u2014 Naomi is ready to find your matches."));
        setTimeout(()=>{
          appendToLog(naomiBubble("Based on everything you\u2019ve told me, I sketched out three possible directions. Let me know what feels right \u2014 and what doesn\u2019t."));
          setTimeout(()=>startMatchPortraits(), 500);
        }, 800);
      }, 300);
      return;
    }
    const { section:s, field:f, isFirstOfSection } = fieldQueue[naomiSession.fieldIdx];
    pendingField = f;

    // Progress
    const pct = Math.round((naomiSession.fieldIdx / fieldQueue.length)*100);
    const $bar = document.getElementById('kycProgBar');
    const $sub = document.getElementById('kycHeaderSub');
    if($bar) $bar.style.width = pct+'%';
    if($sub) $sub.textContent = `${naomiSession.fieldIdx+1} of ${fieldQueue.length}`;

    // Question bubble
    const prefix = isFirstOfSection && s.subtitle ? `<span style="display:block;font-size:12.5px;color:var(--inkSoft);margin-bottom:6px;">${s.subtitle}</span>` : '';
    const qText = prefix + f.label;
    setTimeout(()=>{
      appendToLog(naomiBubble(qText));
      if(f.type==='select') showChipOptions(f);
      else if(f.type==='multiselect') showMultiChipOptions(f);
      else showInputBar(f);
    }, 200);
  }

  function showChipOptions(f){
    const log = document.getElementById('chatLog');
    if(!log) return;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;padding:2px 0;';
    wrap.id = 'chipRow';
    f.options.forEach(opt=>{
      const btn = document.createElement('button');
      btn.textContent = opt;
      btn.style.cssText = 'padding:9px 16px;border-radius:20px;border:1.5px solid var(--line);background:var(--cream);font-family:var(--fontBody);font-size:14px;color:var(--ink);cursor:pointer;transition:all .15s;';
      btn.onmouseenter = ()=>{ btn.style.borderColor='var(--clay)'; btn.style.background='var(--clayBg)'; };
      btn.onmouseleave = ()=>{ if(!btn.dataset.sel){ btn.style.borderColor='var(--line)'; btn.style.background='var(--cream)'; } };
      btn.onclick = ()=>{
        wrap.querySelectorAll('button').forEach(b=>{ b.style.cssText=b.style.cssText.replace('var(--clay)','var(--line)').replace('var(--cream)','var(--ink)'); delete b.dataset.sel; });
        btn.style.borderColor='var(--clay)'; btn.style.background='var(--clay)'; btn.style.color='var(--cream)'; btn.dataset.sel='1';
        setTimeout(()=>{ wrap.remove(); submitAnswer(opt); }, 220);
      };
      wrap.appendChild(btn);
    });
    if(f.optional){
      const skip=document.createElement('button');
      skip.textContent='Skip'; skip.style.cssText='padding:9px 16px;border-radius:20px;border:1.5px solid var(--line);background:transparent;font-family:var(--fontBody);font-size:13px;color:var(--inkSoft);cursor:pointer;';
      skip.onclick=()=>{ wrap.remove(); submitAnswer(null); };
      wrap.appendChild(skip);
    }
    log.appendChild(wrap);
    log.scrollTop=log.scrollHeight;
  }

  function showMultiChipOptions(f){
    const log = document.getElementById('chatLog');
    if(!log) return;
    const selected = new Set();
    const custom   = new Set();

    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:10px;padding:2px 0;';
    wrap.id = 'multiChipRow';

    // ── Preset chips ──────────────────────────────────────────────────────
    const chipRow = document.createElement('div');
    chipRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;';

    function applyChipStyle(btn, isSel){
      btn.style.borderColor = isSel ? 'var(--clay)' : 'var(--line)';
      btn.style.background  = isSel ? 'var(--clay)' : 'var(--cream)';
      btn.style.color       = isSel ? 'var(--cream)' : 'var(--ink)';
    }

    f.options.forEach(opt=>{
      const btn = document.createElement('button');
      btn.textContent = opt;
      btn.style.cssText = 'padding:9px 16px;border-radius:20px;border:1.5px solid var(--line);background:var(--cream);font-family:var(--fontBody);font-size:14px;color:var(--ink);cursor:pointer;transition:all .15s;';
      btn.onmouseenter = ()=>{ if(!selected.has(opt)){ btn.style.borderColor='var(--clay)'; btn.style.background='var(--clayBg)'; } };
      btn.onmouseleave = ()=>{ if(!selected.has(opt)) applyChipStyle(btn, false); };
      btn.onclick = ()=>{
        if(opt.toLowerCase().includes('no preference')){
          selected.clear(); custom.clear();
          selected.add(opt);
          chipRow.querySelectorAll('button').forEach(b=>applyChipStyle(b, b.textContent===opt));
          renderCustomChips();
        } else {
          selected.delete([...selected].find(s=>s&&s.toLowerCase().includes('no preference')));
          if(selected.has(opt)) selected.delete(opt); else selected.add(opt);
          applyChipStyle(btn, selected.has(opt));
        }
        updateContinueState();
      };
      chipRow.appendChild(btn);
    });
    wrap.appendChild(chipRow);

    // ── Custom chips row (user-typed values shown here) ───────────────────
    const customChipRow = document.createElement('div');
    customChipRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:7px;';

    function renderCustomChips(){
      customChipRow.innerHTML = '';
      custom.forEach(val=>{
        const chip = document.createElement('div');
        chip.style.cssText = 'display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;border:1.5px solid var(--clay);background:var(--clayBg);font-size:13.5px;color:var(--ink);';
        chip.innerHTML = `<span>${val}</span><button style="background:none;border:none;cursor:pointer;color:var(--clay);font-size:15px;line-height:1;padding:0 0 0 2px;">&times;</button>`;
        chip.querySelector('button').onclick = ()=>{ custom.delete(val); renderCustomChips(); updateContinueState(); };
        customChipRow.appendChild(chip);
      });
      if(custom.size) wrap.insertBefore(customChipRow, actionRow);
      else if(customChipRow.parentNode) customChipRow.parentNode.removeChild(customChipRow);
    }

    // ── Continue / Skip row ───────────────────────────────────────────────
    const actionRow = document.createElement('div');
    actionRow.style.cssText = 'display:flex;gap:8px;align-items:center;';

    const continueBtn = document.createElement('button');
    continueBtn.textContent = 'Continue \u2192';
    continueBtn.style.cssText = 'padding:9px 18px;border-radius:20px;border:none;background:var(--paperDeep);color:var(--inkSoft);font-family:var(--fontBody);font-size:13.5px;font-weight:700;cursor:not-allowed;opacity:.45;transition:all .15s;';
    continueBtn.disabled = true;
    continueBtn.onclick = ()=>{
      const all = [...selected, ...custom].filter(Boolean);
      if(!all.length) return;
      restoreInputBar();
      wrap.remove();
      submitAnswer(all.join(', '));
    };
    actionRow.appendChild(continueBtn);

    function updateContinueState(){
      const has = selected.size > 0 || custom.size > 0;
      continueBtn.disabled = !has;
      continueBtn.style.background = has ? 'var(--clay)' : 'var(--paperDeep)';
      continueBtn.style.color      = has ? 'var(--cream)' : 'var(--inkSoft)';
      continueBtn.style.cursor     = has ? 'pointer' : 'not-allowed';
      continueBtn.style.opacity    = has ? '1' : '.45';
    }

    if(f.optional){
      const skip = document.createElement('button');
      skip.textContent = 'Skip';
      skip.style.cssText = 'padding:9px 16px;border-radius:20px;border:1.5px solid var(--line);background:transparent;font-family:var(--fontBody);font-size:13px;color:var(--inkSoft);cursor:pointer;';
      skip.onclick = ()=>{ restoreInputBar(); wrap.remove(); submitAnswer(null); };
      actionRow.appendChild(skip);
    }
    wrap.appendChild(actionRow);

    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;

    // ── Repurpose the existing chat input bar ─────────────────────────────
    // Show/create it with "Add to answer" placeholder, Send adds a chip
    let $ib = document.getElementById('chatInputBar');
    if(!$ib){
      $ib = document.createElement('div');
      $ib.id = 'chatInputBar';
      $ib.style.cssText = 'padding:10px 12px;border-top:1px solid var(--line);background:var(--cream);flex-shrink:0;';
      const $screen = document.getElementById('chatLog')?.parentElement;
      if($screen) $screen.appendChild($ib);
    }

    $ib.innerHTML = `
      <div style="border-radius:14px;border:1.5px solid var(--line);background:var(--paperDeep);padding:10px 12px;">
        <input id="chatAnswer" type="text" placeholder="Or type your own answer\u2026"
          style="width:100%;border:none;background:transparent;color:var(--ink);font-family:var(--fontBody);font-size:14.5px;line-height:1.5;outline:none;display:block;" />
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
          <div style="font-size:12px;color:var(--inkSoft);">Type anything not in the list above</div>
          <button id="chatSend" style="padding:7px 16px;border-radius:12px;border:none;background:var(--paperDeep);color:var(--inkSoft);font-family:var(--fontBody);font-size:13px;font-weight:700;cursor:pointer;">Add +</button>
        </div>
      </div>`;

    const $ta   = $ib.querySelector('#chatAnswer');
    const $send = $ib.querySelector('#chatSend');

    $ta.oninput = ()=>{
      const has = $ta.value.trim().length > 0;
      $send.style.background = has ? 'var(--clay)' : 'var(--paperDeep)';
      $send.style.color      = has ? 'var(--cream)' : 'var(--inkSoft)';
    };
    $ta.onkeydown = e=>{
      if(e.key === 'Enter'){ e.preventDefault(); doAdd(); }
    };
    $send.onclick = doAdd;

    function doAdd(){
      const val = $ta.value.trim();
      if(!val) return;
      selected.delete([...selected].find(s=>s&&s.toLowerCase().includes('no preference')));
      chipRow.querySelectorAll('button').forEach(b=>{ if(b.textContent.toLowerCase().includes('no preference')) applyChipStyle(b,false); });
      custom.add(val);
      $ta.value = '';
      $send.style.background = 'var(--paperDeep)';
      $send.style.color = 'var(--inkSoft)';
      renderCustomChips();
      updateContinueState();
      $ta.focus();
    }

    function restoreInputBar(){
      // Remove the multiselect-mode input bar — askNextField will recreate it
      // correctly for the next question
      const $old = document.getElementById('chatInputBar');
      if($old) $old.remove();
    }
  }

  function showInputBar(f){
    let $ib = document.getElementById('chatInputBar');
    if(!$ib){
      $ib = document.createElement('div');
      $ib.id = 'chatInputBar';
      $ib.style.cssText = 'padding:10px 12px;border-top:1px solid var(--line);background:var(--cream);flex-shrink:0;';
      const $screen = document.getElementById('chatLog')?.parentElement;
      if($screen) $screen.appendChild($ib);
    }
    $ib.innerHTML = `
      <div style="border-radius:14px;border:1.5px solid var(--line);background:var(--paperDeep);padding:10px 12px;">
        ${f.type==='textarea'
          ? `<textarea id="chatAnswer" placeholder="${f.placeholder||'Type here\u2026'}" rows="2" style="width:100%;border:none;background:transparent;color:var(--ink);font-family:var(--fontBody);font-size:14.5px;line-height:1.5;resize:none;outline:none;min-height:44px;max-height:100px;overflow-y:auto;display:block;"></textarea>`
          : `<input id="chatAnswer" type="${f.type==='number'?'number':'text'}" placeholder="${f.placeholder||'Type here\u2026'}" style="width:100%;border:none;background:transparent;color:var(--ink);font-family:var(--fontBody);font-size:14.5px;line-height:1.5;outline:none;display:block;" />`}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;">
          <button id="chatMic" style="width:34px;height:34px;border-radius:50%;border:none;background:var(--paperDeep);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="14" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--inkSoft)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <div style="display:flex;gap:8px;align-items:center;">
            ${f.optional?'<button id="chatSkip" style="background:none;border:none;font-family:var(--fontBody);font-size:13px;color:var(--inkSoft);cursor:pointer;text-decoration:underline;">Skip</button>':''}
            <button id="chatSend" style="padding:7px 16px;border-radius:12px;border:none;background:var(--paperDeep);color:var(--inkSoft);font-family:var(--fontBody);font-size:13px;font-weight:700;cursor:pointer;">Send &rarr;</button>
          </div>
        </div>
      </div>`;

    const $ta=$ib.querySelector('#chatAnswer'), $send=$ib.querySelector('#chatSend'), $mic=$ib.querySelector('#chatMic'), $skip=$ib.querySelector('#chatSkip');
    if($ta) $ta.oninput=()=>{ if($ta.tagName==='TEXTAREA'){$ta.style.height='auto';$ta.style.height=Math.min($ta.scrollHeight,100)+'px';} const has=$ta.value.trim().length>0; if($send){$send.style.background=has?'var(--clay)':'var(--paperDeep)';$send.style.color=has?'var(--cream)':'var(--inkSoft)';} };
    if($send) $send.onclick=()=>{ const val=$ta?$ta.value.trim():''; if(!val&&!f.optional) return; submitAnswer(val||null); };
    if($skip) $skip.onclick=()=>submitAnswer(null);
    if($mic) $mic.onclick=()=>{
      const sim=SECTION_SIMS[fieldQueue[naomiSession.fieldIdx]?.section?.id]||{};
      const v=sim[f.id]||'';
      if($ta&&v){$ta.value=v;if($send){$send.style.background='var(--clay)';$send.style.color='var(--cream)';}}
    };
    if($ta) setTimeout(()=>$ta.focus(),100);
  }

  function submitAnswer(value){
    if(value) naomiSession.answers[pendingField.id]=value;
    if(value) appendToLog(userBubble(value));
    naomiSession.fieldIdx++;
    askNextField();
  }

  function autofillSection(s){
    const sim=SECTION_SIMS[s.id]||{};
    const $ta=document.getElementById('chatAnswer');
    if($ta&&pendingField&&sim[pendingField.id]){$ta.value=sim[pendingField.id];const $s=document.getElementById('chatSend');if($s){$s.style.background='var(--clay)';$s.style.color='var(--cream)';}}
  }

  function insertProgressBar(){
    const $chat=document.getElementById('chatLog');
    if($chat&&$chat.parentNode && !document.getElementById('kycProgBar')){
      const p=document.createElement('div');
      p.style.cssText='padding:8px 16px 0;flex-shrink:0;';
      const pct = Math.round((naomiSession.fieldIdx / fieldQueue.length)*100);
      p.innerHTML=`<div style="height:3px;border-radius:2px;background:var(--paperDeep);overflow:hidden;"><div id="kycProgBar" style="height:100%;width:${pct}%;background:var(--clay);border-radius:2px;transition:width .4s;"></div></div><div id="kycHeaderSub" style="font-family:var(--fontMono);font-size:9px;color:var(--inkSoft);letter-spacing:.06em;margin-top:3px;text-align:right;">${naomiSession.fieldIdx+1} of ${fieldQueue.length}</div>`;
      $chat.parentNode.insertBefore(p,$chat);
    }
  }

  function startSections(){
    naomiSession.sectionMode = true;
    buildFieldQueue();
    naomiSession.fieldIdx = 0;
    insertProgressBar();
    askNextField();
  }

  // -- Rebuild chat history from saved answers (on return from schedule) ----------
  function rebuildHistory(){
    // Naomi's opening line + user's name
    let html = naomiBubble('Hi, I\u2019m Naomi. \u2014 How should I call you?');
    html += userBubble(naomiSession.userName);
    const greet = `Great to meet you, ${naomiSession.userName}! I\u2019d love to get to know who you\u2019re looking for. It takes about 5 minutes.`;
    html += naomiBubble(greet);
    return html;
  }

  // -- Match portraits (inline in chat, after questionnaire) -----------------------
  const PORTRAIT_MAX_REGENS = 3;

  function portraitBaseTraits(){
    const a = naomiSession.answers || {};
    const bits = [];
    if(a.pref_age)      bits.push(`around ${a.pref_age}`);
    if(a.pref_body)     bits.push(a.pref_body.toLowerCase());
    if(a.pref_hair)     bits.push(a.pref_hair.toLowerCase());
    if(a.pref_style)    bits.push(a.pref_style.toLowerCase());
    if(a.pref_features) bits.push(a.pref_features.toLowerCase());
    return bits;
  }

  const PORTRAIT_VARIANTS = [
    { name:'James',  mood:'warm, easy smile, relaxed posture',        setting:'soft daylight, neutral background' },
    { name:'Daniel', mood:'quiet confidence, thoughtful expression',  setting:'golden hour light, blurred city street' },
    { name:'Marc',   mood:'calm, grounded presence, gentle eyes',     setting:'natural light, simple stone wall backdrop' },
    { name:'Eli',    mood:'a little more playful, genuine laugh',     setting:'late afternoon light, soft greenery behind' },
    { name:'Theo',   mood:'composed, steady, classic features',       setting:'studio-soft lighting, plain backdrop' },
    { name:'Adam',   mood:'open, approachable, kind eyes',            setting:'natural window light, cosy interior' },
  ];

  function portraitDescribe(seed){
    const a = naomiSession.answers || {};
    const traits = portraitBaseTraits();
    const traitStr = traits.length ? traits.join(', ') : 'features matching your description';
    const portraitDetail = a.ideal_partner ? ` ${a.ideal_partner}` : '';
    return `${seed.mood} \u2014 ${traitStr}. ${seed.setting}.${portraitDetail ? ' Based on what you described:' + portraitDetail : ''}`;
  }

  // Each portrait: { variantIdx, liked: null|true|false, why:'', whyStage: false }
  let matchPortraits = [0,1,2].map(i => ({ variantIdx:i, liked:null, why:'', whyStage:false }));
  let portraitRegenCount = 0; // shared across all 3 portraits

  function portraitCardHTML(p, idx){
    const seed = PORTRAIT_VARIANTS[p.variantIdx % PORTRAIT_VARIANTS.length];
    const desc = portraitDescribe(seed);
    const decided = p.liked !== null;

    return `
      <div id="portraitCard_${idx}" style="border:1.5px solid ${decided ? (p.liked?'var(--ok)':'var(--line)') : 'var(--line)'};border-radius:20px;background:var(--cream);overflow:hidden;${decided && !p.liked ? 'opacity:.8;' : ''}">

        <!-- Portrait image area -->
        <div style="height:200px;background:linear-gradient(145deg,var(--navy) 0%,#2d5048 100%);position:relative;display:flex;align-items:center;justify-content:center;">
          <span style="font-family:var(--fontDisplay);font-style:italic;font-size:54px;color:rgba(255,252,246,.25);">${seed.name[0]}</span>
          <div style="position:absolute;top:12px;left:12px;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);border-radius:20px;padding:4px 11px;">
            <span style="font-family:var(--fontMono);font-size:10.5px;color:rgba(255,255,255,.8);letter-spacing:.05em;">Portrait ${idx+1} of 3</span>
          </div>
          ${portraitRegenCount>0 ? `<div style="position:absolute;top:12px;right:12px;background:rgba(255,252,246,.18);backdrop-filter:blur(6px);border-radius:20px;padding:4px 11px;">
            <span style="font-family:var(--fontMono);font-size:10.5px;color:var(--cream);">Regenerated ${portraitRegenCount}/${PORTRAIT_MAX_REGENS}</span>
          </div>` : ''}
          ${decided ? `<div style="position:absolute;bottom:12px;right:12px;width:32px;height:32px;border-radius:50%;background:${p.liked?'var(--ok)':'rgba(0,0,0,.5)'};display:flex;align-items:center;justify-content:center;">
            ${p.liked
              ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`
              : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`}
          </div>` : ''}
        </div>

        <!-- Body -->
        <div style="padding:12px 16px 14px;">

          ${!decided ? `
          <div style="display:flex;gap:10px;">
            <button class="portraitLikeBtn" data-idx="${idx}" data-val="1" style="flex:1;padding:12px;border-radius:13px;border:1.5px solid var(--line);background:var(--cream);font-family:var(--fontBody);font-size:14px;font-weight:700;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/></svg>
              Like
            </button>
            <button class="portraitLikeBtn" data-idx="${idx}" data-val="0" style="flex:1;padding:12px;border-radius:13px;border:1.5px solid var(--line);background:var(--cream);font-family:var(--fontBody);font-size:14px;font-weight:700;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--clay)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/></svg>
              Dislike
            </button>
          </div>
          ` : `
          <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:11px;background:${p.liked?'var(--okBg)':'var(--paperDeep)'};">
            <span style="font-size:13px;font-weight:600;color:${p.liked?'var(--ok)':'var(--inkSoft)'};">${p.liked?'You liked this one':'Not a match for you'}</span>
            <button class="portraitUndoBtn" data-idx="${idx}" style="margin-left:auto;background:none;border:none;font-size:11.5px;color:var(--inkSoft);text-decoration:underline;cursor:pointer;">Change</button>
          </div>
          ${!p.liked ? `
          <div style="margin-top:10px;">
            ${p.why ? `
            <div style="background:var(--paperDeep);border-radius:11px;padding:10px 12px;">
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--inkSoft);margin-bottom:4px;">Why not</div>
              <div style="font-size:13px;color:var(--ink);">${p.why}</div>
            </div>` : p.whyStage ? `
            <textarea id="portraitWhyInput_${idx}" rows="2" placeholder="What didn\u2019t feel right about this one? (optional)"
              style="width:100%;border:1.5px solid var(--line);border-radius:11px;background:var(--paperDeep);padding:9px 11px;font-family:var(--fontBody);font-size:13px;color:var(--ink);outline:none;resize:none;margin-bottom:8px;"></textarea>
            <button id="portraitWhySubmit_${idx}" style="width:100%;padding:9px;border-radius:11px;border:none;background:var(--clay);color:var(--cream);font-family:var(--fontBody);font-size:12.5px;font-weight:700;cursor:pointer;">Send</button>
            ` : `
            <button class="portraitWhyBtn" data-idx="${idx}" style="width:100%;padding:10px;border-radius:11px;border:1.5px solid var(--line);background:transparent;font-family:var(--fontBody);font-size:12.5px;color:var(--inkSoft);cursor:pointer;">
              Tell Naomi why (optional)
            </button>`}
          </div>` : ''}
          `}
        </div>
      </div>`;
  }

  function portraitRerenderAll(){
    matchPortraits.forEach((p, idx) => {
      const $card = document.getElementById(`portraitCard_${idx}`);
      if(!$card) return;
      const wrap = document.createElement('div');
      wrap.innerHTML = portraitCardHTML(p, idx);
      $card.replaceWith(wrap.firstElementChild);
      portraitWireCard(idx);
    });
  }

  function portraitRerenderCard(idx){
    const $card = document.getElementById(`portraitCard_${idx}`);
    if(!$card) return;
    const wrap = document.createElement('div');
    wrap.innerHTML = portraitCardHTML(matchPortraits[idx], idx);
    $card.replaceWith(wrap.firstElementChild);
    portraitWireCard(idx);
  }

  function portraitWireCard(idx){
    const p = matchPortraits[idx];

    document.querySelectorAll(`.portraitLikeBtn[data-idx="${idx}"]`).forEach(btn=>{
      btn.onclick = () => {
        p.liked = btn.dataset.val === '1';
        portraitRerenderCard(idx);
      };
    });

    const $undo = document.querySelector(`.portraitUndoBtn[data-idx="${idx}"]`);
    if($undo) $undo.onclick = () => { p.liked = null; p.why=''; p.whyStage=false; portraitRerenderCard(idx); };

    const $whyBtn = document.querySelector(`.portraitWhyBtn[data-idx="${idx}"]`);
    if($whyBtn) $whyBtn.onclick = () => { p.whyStage = true; portraitRerenderCard(idx); };

    const $whySubmit = document.getElementById(`portraitWhySubmit_${idx}`);
    if($whySubmit) $whySubmit.onclick = () => {
      const $ta = document.getElementById(`portraitWhyInput_${idx}`);
      p.why = ($ta && $ta.value.trim()) || 'No specific reason given';
      portraitRerenderCard(idx);
    };
  }

  function portraitShowProgressAndContinue(){
    const log = document.getElementById('chatLog');
    if(!log) return;

    // Remove the regenerate action row
    const $actions = document.getElementById('portraitActions');
    if($actions) $actions.remove();

    // Progress component
    const progWrap = document.createElement('div');
    progWrap.id = 'portraitProgress';
    progWrap.style.cssText = 'border:1.5px solid var(--line);border-radius:16px;background:var(--cream);padding:18px 20px;';
    progWrap.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div style="width:24px;height:24px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-family:var(--fontDisplay);font-style:italic;font-size:10px;color:var(--goldSoft);">N</span>
        </div>
        <div style="font-size:13.5px;font-weight:600;color:var(--ink);">Regenerating your portraits\u2026</div>
      </div>
      <div style="height:6px;border-radius:4px;background:var(--paperDeep);overflow:hidden;">
        <div id="portraitProgressBar" style="height:100%;width:0%;background:var(--clay);border-radius:4px;transition:width .35s ease;"></div>
      </div>`;
    log.appendChild(progWrap);
    log.scrollTop = log.scrollHeight;

    const $bar = document.getElementById('portraitProgressBar');
    let pct = 0;
    const timer = setInterval(()=>{
      pct += 10 + Math.random()*15;
      if(pct >= 100){
        pct = 100;
        if($bar) $bar.style.width = '100%';
        clearInterval(timer);
        setTimeout(()=>{
          progWrap.remove();
          portraitRerenderAll();
          appendToLog(naomiBubble("Here are your updated portraits."));
          setTimeout(()=>portraitShowActions(), 300);
        }, 350);
        return;
      }
      if($bar) $bar.style.width = pct + '%';
    }, 180);
  }

  function portraitShowActions(){
    const canRegen = portraitRegenCount < PORTRAIT_MAX_REGENS;
    const log = document.getElementById('chatLog');
    if(!log) return;
    const wrap = document.createElement('div');
    wrap.id = 'portraitActions';
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:10px;';
    wrap.innerHTML = `
      ${canRegen ? `
      <button id="portraitRegenBtn" style="width:100%;padding:14px;border-radius:14px;border:1.5px dashed var(--line);background:transparent;font-family:var(--fontBody);font-size:13.5px;color:var(--inkSoft);cursor:pointer;">
        \u21bb Regenerate all 3 (${PORTRAIT_MAX_REGENS - portraitRegenCount} left)
      </button>` : `
      <div style="text-align:center;font-size:12px;color:var(--inkSoft);padding:4px 0;">No more regenerations available.</div>`}
      <button id="portraitContinueBtn" style="width:100%;padding:16px;border-radius:16px;border:none;background:var(--clay);color:var(--cream);font-family:var(--fontBody);font-size:15px;font-weight:700;cursor:pointer;">
        Upload your profile pictures \u2192
      </button>`;
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;

    const $regen = document.getElementById('portraitRegenBtn');
    if($regen) $regen.onclick = () => {
      portraitRegenCount++;
      matchPortraits.forEach(p => {
        p.variantIdx = (p.variantIdx + 3) % PORTRAIT_VARIANTS.length;
        p.liked = null;
        p.why = '';
        p.whyStage = false;
      });
      portraitShowProgressAndContinue();
    };

    const $cont = wrap.querySelector('#portraitContinueBtn');
    if($cont) $cont.onclick = () => { wrap.remove(); portraitShowPhotoUpload(); };
  }

  // -- Inline photo upload in chat -----------------------------------------------
  function portraitShowPhotoUpload(){
    inlinePhotos = []; // reset on entry
    const MAX = 4;
    const log = document.getElementById('chatLog');
    if(!log) return;

    appendToLog(naomiBubble("One last thing — add up to 4 photos of yourself. Your photos are only shared after a mutual match."));

    const outer = document.createElement('div');
    log.appendChild(outer);

    function slotId(){ return 'ppSlot_' + Date.now() + '_' + Math.random().toString(36).slice(2); }

    function render(){
      const n = inlinePhotos.length;
      const fid = 'ppFile_' + Date.now();

      outer.innerHTML = `
        <div style="border:1.5px solid var(--line);border-radius:18px;background:var(--cream);overflow:hidden;">

          <div style="padding:14px 16px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;">
            <div style="font-size:13.5px;font-weight:700;color:var(--ink);">Profile photos</div>
            <div style="font-family:var(--fontMono);font-size:11px;color:var(--inkSoft);">${n} / ${MAX}</div>
          </div>

          <div style="padding:14px 16px 10px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            ${Array.from({length:MAX}, (_,i) => {
              const photo = inlinePhotos[i];
              const isNext = i === n && n < MAX;
              if(photo) return `
                <div style="aspect-ratio:1;border-radius:12px;overflow:hidden;position:relative;border:2px solid ${i===0?'var(--clay)':'var(--line)'};">
                  <img src="${photo}" style="width:100%;height:100%;object-fit:cover;display:block;" />
                  <div style="position:absolute;top:5px;right:5px;display:flex;gap:4px;">
                    <label for="${fid}" data-replace="${i}"
                      style="width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;"
                      title="Change photo">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                      </svg>
                    </label>
                    <button data-del="${i}"
                      style="width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.6);border:none;cursor:pointer;color:white;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;"
                      title="Delete photo">&times;</button>
                  </div>
                  ${i===0?'<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(184,100,90,.88);text-align:center;font-size:9px;font-family:var(--fontMono);color:var(--cream);padding:3px 0;letter-spacing:.07em;">MAIN</div>':''}
                </div>`;
              if(isNext) return `
                <label for="${fid}" data-add="${i}"
                  style="aspect-ratio:1;border-radius:12px;background:var(--paperDeep);display:flex;flex-direction:column;align-items:center;justify-content:center;
                         border:1.5px dashed ${i===0?'var(--clay)':'var(--line)'};cursor:pointer;">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${i===0?'var(--clay)':'var(--inkSoft)'}" stroke-width="1.5" stroke-linecap="round">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
                  </svg>
                  <div style="font-size:10px;color:${i===0?'var(--clay)':'var(--inkSoft)'};margin-top:6px;">${i===0?'Main photo':'Add photo'}</div>
                </label>`;
              return `
                <div style="aspect-ratio:1;border-radius:12px;background:var(--paperDeep);display:flex;align-items:center;justify-content:center;
                            border:1.5px dashed var(--line);opacity:.3;">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--line)" stroke-width="2" stroke-linecap="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                  </svg>
                </div>`;
            }).join('')}
          </div>

          ${n > 0 ? `
          <div style="padding:2px 16px 10px;display:flex;gap:6px;align-items:center;">
            <span style="font-size:11px;color:var(--inkSoft);flex-shrink:0;">Uploaded:</span>
            ${inlinePhotos.map((p,i)=>`
              <div style="width:36px;height:36px;border-radius:8px;overflow:hidden;border:2px solid ${i===0?'var(--clay)':'var(--line)'};">
                <img src="${p}" style="width:100%;height:100%;object-fit:cover;display:block;" />
              </div>`).join('')}
          </div>` : ''}

          <!-- real file input — triggered by label[for] -->
          <input type="file" id="${fid}" accept="image/*"
            style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;top:0;left:0;" />

          <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:8px;">
            ${n > 0 ? `<button data-save="1"
              style="width:100%;padding:13px;border-radius:13px;border:none;background:var(--clay);color:var(--cream);font-family:var(--fontBody);font-size:14px;font-weight:700;cursor:pointer;">
              Save ${n} photo${n>1?'s':''} &amp; continue
            </button>` : ''}
            <button data-skip="1"
              style="width:100%;padding:12px;border-radius:13px;border:1.5px solid var(--line);background:transparent;font-family:var(--fontBody);font-size:13.5px;color:var(--inkSoft);cursor:pointer;">
              Skip for now →
            </button>
          </div>
        </div>`;

      // wire file input — get the actual input element from the rendered DOM
      const fi = outer.querySelector('#' + fid);
      let replaceSlot = -1;

      // wire replace labels — note slot before label opens picker
      outer.querySelectorAll('label[data-replace]').forEach(lbl => {
        lbl.addEventListener('click', () => { replaceSlot = +lbl.dataset.replace; });
      });
      // wire add labels
      outer.querySelectorAll('label[data-add]').forEach(lbl => {
        lbl.addEventListener('click', () => { replaceSlot = -1; });
      });

      if(fi) fi.addEventListener('change', function handler(){
        fi.removeEventListener('change', handler);
        const file = fi.files && fi.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          if(replaceSlot >= 0 && replaceSlot < inlinePhotos.length){
            inlinePhotos[replaceSlot] = ev.target.result;
          } else {
            inlinePhotos.push(ev.target.result);
          }
          replaceSlot = -1;
          render();
        };
        reader.readAsDataURL(file);
      });

      // wire delete
      outer.querySelectorAll('[data-del]').forEach(btn => {
        btn.addEventListener('click', e => {
          e.preventDefault(); e.stopPropagation();
          inlinePhotos.splice(+btn.dataset.del, 1);
          render();
        });
      });

      // wire save
      const saveBtn = outer.querySelector('[data-save]');
      if(saveBtn) saveBtn.addEventListener('click', () => finish(false));

      // wire skip
      outer.querySelector('[data-skip]').addEventListener('click', () => finish(true));

      log.scrollTop = log.scrollHeight;
    }

    function finish(skipped){
      outer.remove();
      if(!skipped && inlinePhotos.length){
        const bubble = document.createElement('div');
        bubble.style.cssText = 'display:flex;justify-content:flex-end;';
        bubble.innerHTML = `
          <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">
            ${inlinePhotos.map((p,i)=>`
              <div style="position:relative;width:72px;height:72px;border-radius:12px;overflow:hidden;border:2px solid ${i===0?'var(--clay)':'var(--line)'};">
                <img src="${p}" style="width:100%;height:100%;object-fit:cover;display:block;" />
                ${i===0?'<div style="position:absolute;bottom:0;left:0;right:0;background:rgba(184,100,90,.88);font-size:8px;font-family:var(--fontMono);color:var(--cream);text-align:center;padding:2px 0;">MAIN</div>':''}
              </div>`).join('')}
          </div>`;
        const logEl = document.getElementById('chatLog');
        if(logEl){ logEl.appendChild(bubble); logEl.scrollTop = logEl.scrollHeight; }
        appendToLog(naomiBubble(`${inlinePhotos.length} photo${inlinePhotos.length>1?'s':''} saved. ✔️`));
      } else {
        appendToLog(naomiBubble("No problem — you can add photos later from your profile."));
      }
      setTimeout(() => showKycConfirmCard(), 700);
    }

    render();
    log.scrollTop = log.scrollHeight;
  }


  function showKycConfirmCard(){
    const log = document.getElementById('chatLog');
    if(!log) return;

    appendToLog(naomiBubble("Before I can introduce you to anyone, I need to confirm you’re who you say you are. This keeps everyone on NAOMI safe."));

    // Simple button row directly under the message
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;gap:8px;padding:2px 0 4px;';

    const startBtn = document.createElement('button');
    startBtn.style.cssText = 'width:100%;padding:14px;border-radius:24px;border:none;background:var(--clay);color:var(--cream);font-family:var(--fontBody);font-size:14.5px;font-weight:700;cursor:pointer;text-align:center;';
    startBtn.textContent = 'Start verification';

    wrap.appendChild(startBtn);
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;

    startBtn.onclick = function(){
      wrap.remove();
      kycStartStep = 0;
      go('kycflow');

RENDERERS.matchmaking = function(){
  const steps = [
    { label:"Analysing your Relationship DNA",   duration: 1600 },
    { label:"Scanning compatibility patterns",    duration: 1800 },
    { label:"Filtering by values & dealbreakers", duration: 1500 },
    { label:"Ranking top candidates",             duration: 1400 },
    { label:"Preparing your introductions",       duration: 1200 },
  ];
  let current = 0;
  let progress = 0;
  let progressTimer = null;

  function paint(){
    const doneSteps = steps.slice(0, current);
    const activeStep = steps[current];

    $body.innerHTML = `
      <div style="height:100%;display:flex;flex-direction:column;background:var(--navy);padding:36px 28px 40px;">

        <!-- Header -->
        <div style="text-align:center;margin-bottom:40px;">
          <div style="width:56px;height:56px;border-radius:50%;background:rgba(201,162,75,.15);border:1.5px solid rgba(201,162,75,.4);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <span style="font-family:var(--fontDisplay);font-style:italic;font-size:24px;color:var(--goldSoft);">N</span>
          </div>
          <h2 style="font-family:var(--fontDisplay);font-size:22px;color:var(--cream);margin-bottom:6px;line-height:1.3;">Finding your matches.</h2>
          <p style="font-size:13px;color:rgba(255,252,246,.45);line-height:1.6;">Naomi is going through everyone to find the people who genuinely fit.</p>
        </div>

        <!-- Step list -->
        <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:36px;flex:1;">
          ${steps.map((s, i) => {
            const isDone   = i < current;
            const isActive = i === current;
            return `<div style="display:flex;align-items:center;gap:14px;opacity:${isDone||isActive?1:0.3};transition:opacity .4s;">
              <div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;
                background:${isDone?"var(--ok)":isActive?"rgba(201,162,75,.2)":"rgba(255,252,246,.06)"};
                border:1.5px solid ${isDone?"var(--ok)":isActive?"var(--gold)":"rgba(255,252,246,.12)"};
                display:flex;align-items:center;justify-content:center;transition:all .4s;">
                ${isDone
                  ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`
                  : isActive
                  ? `<div style="width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 1s ease-in-out infinite;"></div>`
                  : `<div style="width:6px;height:6px;border-radius:50%;background:rgba(255,252,246,.2);"></div>`}
              </div>
              <span style="font-size:14px;color:${isDone?"rgba(255,252,246,.6)":isActive?"var(--cream)":"rgba(255,252,246,.4)"};font-weight:${isActive?600:400};transition:all .3s;">${s.label}</span>
            </div>`;
          }).join("")}
        </div>

        <!-- Progress bar -->
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-family:var(--fontMono);font-size:10px;letter-spacing:.1em;color:rgba(255,252,246,.35);text-transform:uppercase;">Matching progress</span>
            <span id="pctLabel" style="font-family:var(--fontMono);font-size:11px;color:var(--goldSoft);">${progress}%</span>
          </div>
          <div style="height:4px;border-radius:4px;background:rgba(255,252,246,.1);overflow:hidden;">
            <div id="progBar" style="height:100%;width:${progress}%;background:linear-gradient(90deg,var(--clay),var(--gold));border-radius:4px;transition:width .3s ease;"></div>
          </div>
          <div style="margin-top:12px;font-size:12px;color:rgba(255,252,246,.3);text-align:center;line-height:1.5;">
            ${current < steps.length ? "This usually takes less than a minute." : "Matches ready."}
          </div>
        </div>
      </div>
      <style>@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.6}}</style>`;
  }

  function runStep(){
    if (current >= steps.length){
      clearInterval(progressTimer);
      setTimeout(() => go("matchreveal"), 600);
      return;
    }
    paint();

    // Smoothly increment progress bar over the step duration
    const stepProgress = 100 / steps.length;
    const startPct     = current * stepProgress;
    const endPct       = startPct + stepProgress;
    const stepMs       = steps[current].duration;
    const tickMs       = 40;
    const ticks        = stepMs / tickMs;
    let tick           = 0;

    progressTimer = setInterval(() => {
      tick++;
      progress = Math.round(startPct + (endPct - startPct) * (tick / ticks));
      const $bar = document.getElementById("progBar");
      const $pct = document.getElementById("pctLabel");
      if ($bar) $bar.style.width = progress + "%";
      if ($pct) $pct.textContent = Math.min(progress, 99) + "%";
      if (tick >= ticks){
        clearInterval(progressTimer);
        current++;
        setTimeout(runStep, 200);
      }
    }, tickMs);
    timers.push(progressTimer);
  }

  runStep();
};

  function paint(){

    if(!s){ naomiPostVerification = false; go('dashboard'); return; }
    const isLast = step === STAGES.length - 1;
    // Total sub-steps: face scan (1a) + ID scan (1b) + remaining STAGES
    const totalSteps = STAGES.length + 1; // +1 for 2 sub-steps counted as one extra
    const displayStep = step === 0 ? 1 : step + 1;
    const progress = Math.round((displayStep / totalSteps) * 100);

    $body.innerHTML = `
      <div style="height:100%;display:flex;flex-direction:column;background:var(--paper);">

            <div style="flex:1;">
              <div style="font-family:var(--fontMono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--inkSoft);margin-bottom:4px;">Identity verification</div>
              <div style="height:4px;border-radius:4px;background:var(--paperDeep);overflow:hidden;">

        </div>

        <!-- Content -->
        <div style="flex:1;overflow-y:auto;padding:20px 18px 16px;">

          <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;">
            <div style="width:46px;height:46px;border-radius:14px;background:var(--clayBg);border:1.5px solid rgba(184,100,90,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--clay);">
              ${s.icon}
            </div>
            <div>
              <div style="font-size:18px;font-weight:700;color:var(--ink);margin-bottom:3px;">${s.title}</div>
              ${s.subtitle ? `<div style="font-family:var(--fontMono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--clay);">${s.subtitle}</div>` : ''}
            </div>
          </div>

          ${s.naomi ? `<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:20px;">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <span style="font-family:var(--fontDisplay);font-style:italic;font-size:12px;color:var(--goldSoft);">N</span>

            <div style="background:var(--cream);border:1px solid var(--line);border-radius:14px 14px 14px 3px;padding:12px 14px;font-size:13.5px;line-height:1.6;color:var(--ink);">${s.naomi}</div>

          ${step === 0 ? `
          <!-- Face scan + ID scan status rows -->
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
            <div style="display:flex;gap:12px;align-items:center;background:${faceScanDone?'var(--okBg)':'var(--paperDeep)'};border-radius:13px;padding:13px 15px;border:1px solid ${faceScanDone?'var(--ok)':'var(--line)'};">

              </div>
              <div>
                <div style="font-size:13.5px;font-weight:700;color:var(--ink);">1a \u00b7 Face scan</div>
                <div style="font-size:12px;color:var(--inkSoft);margin-top:1px;">${faceScanDone?'Matched to your ID \u2714':'Take a selfie to match against your ID'}</div>
              </div>
            </div>
            <div style="display:flex;gap:12px;align-items:center;background:${idScanDone?'var(--okBg)':faceScanDone?'var(--paperDeep)':'var(--paperDeep)'};border-radius:13px;padding:13px 15px;border:1px solid ${idScanDone?'var(--ok)':'var(--line)'};opacity:${!faceScanDone?.5:1};">
              <div style="width:34px;height:34px;border-radius:50%;background:${idScanDone?'var(--ok)':faceScanDone?'var(--clay)':'var(--line)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                ${idScanDone ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>' : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>'}
              </div>
              <div>
                <div style="font-size:13.5px;font-weight:700;color:var(--ink);">1b \u00b7 ID document scan</div>
                <div style="font-size:12px;color:var(--inkSoft);margin-top:1px;">${idScanDone?'Document verified \u2714':faceScanDone?'Scan your passport, national ID, or licence':'Complete face scan first'}</div>
              </div>
            </div>
          </div>` : ''}

          <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:18px;">
            ${s.userChecks.map(c=>`
              <div style="display:flex;gap:12px;align-items:flex-start;background:var(--paperDeep);border-radius:14px;padding:14px 16px;border:1px solid var(--line);">
                <div style="width:7px;height:7px;border-radius:50%;background:var(--clay);flex-shrink:0;margin-top:5px;"></div>
                <div>
                  <div style="font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px;">${c.label}</div>
                  <div style="font-size:12.5px;color:var(--inkSoft);line-height:1.5;">${c.detail}</div>
                </div>
              </div>`).join('')}
          </div>

          <div style="background:rgba(31,58,53,.06);border-radius:12px;padding:12px 14px;border-left:3px solid var(--clay);">
            <div style="font-size:12.5px;color:var(--inkSoft);line-height:1.6;">${s.footer}</div>
          </div>
        </div>

        <!-- Footer CTA -->
        <div style="padding:14px 18px 20px;border-top:1px solid var(--line);flex-shrink:0;display:flex;flex-direction:column;gap:10px;">
          <button id="kfCont" class="btn" style="font-size:15px;display:flex;align-items:center;justify-content:center;gap:9px;${step===0 && !faceScanDone?'':''}">
            ${step===0 && !faceScanDone
              ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg> Start face scan'
              : step===0 && faceScanDone && !idScanDone
                ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg> Scan ID document'
                : isLast ? 'Complete verification' : 'Continue \u2014 ' + STAGES[step+1].title}
          </button>
          ${step === 0 ? '<p style="font-size:11.5px;color:var(--inkSoft);text-align:center;line-height:1.5;margin:0;">Your data is encrypted and used only for this verification.</p>' : ''}
        </div>
      </div>`;

    document.getElementById('kfBack').onclick = () => {
      if(step > 0){ step--; paint(); }
      else go('naomiintro');
    };
    document.getElementById('kfCont').onclick = () => {
      if(step === 0 && !faceScanDone){ showFaceScan(); }
      else if(step === 0 && faceScanDone && !idScanDone){ showIdScan(); }
      else if(step < STAGES.length - 1){ step++; paint(); }
      else { showDnaReveal(); }
    };
  }

  // ── DNA reveal after final verification step ──────────────────────────────
  function showDnaReveal(){
    naomiPostVerification = false; go('dashboard');
  }

  paint();
};
