<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAOMI · Clickable Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
  :root{
    --paper:#FAF6EF; --paperDeep:#F2ECDF; --ink:#1C1B19; --inkSoft:#5B564C;
    --line:#E3DCC9; --clay:#B8645A; --clayDeep:#8F4A42; --clayBg:#FBF1EE;
    --navy:#1F3A35; --gold:#C9A24B; --goldSoft:#E7D9AE; --cream:#FFFCF6;
    --ok:#5F7F5C; --okBg:#EAF1E8;
    --fontDisplay:"Fraunces","Iowan Old Style",Georgia,serif;
    --fontBody:"Inter",-apple-system,"Segoe UI",sans-serif;
    --fontMono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:radial-gradient(circle at 20% 10%, #F5EEDD, var(--paperDeep) 70%);
    display:flex; flex-direction:column; align-items:center;
    padding:40px 16px 60px; font-family:var(--fontBody);
  }
  .pageHeader{ text-align:center; margin-bottom:28px; max-width:480px; }
  .pageHeader .eyebrow{ font-family:var(--fontMono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--clayDeep); margin-bottom:8px; }
  .pageHeader h1{ font-family:var(--fontDisplay); font-size:28px; color:var(--ink); margin:0; }
  .pageHeader p{ font-size:13px; color:var(--inkSoft); margin-top:8px; }

  .layout{ display:flex; gap:28px; align-items:flex-start; }
  .phoneCol{ display:flex; flex-direction:column; align-items:center; gap:14px; }

  .phoneFrame{
    width:360px; height:740px; border-radius:44px; background:var(--ink);
    padding:10px; box-shadow:0 30px 60px rgba(28,27,25,.35), 0 2px 0 rgba(255,255,255,.4) inset;
    position:relative; flex-shrink:0;
  }
  .phoneScreen{
    width:100%; height:100%; border-radius:36px; background:var(--paper);
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .statusBar{
    height:44px; display:flex; align-items:center; justify-content:space-between;
    padding:0 26px; font-family:var(--fontBody); font-size:13px; font-weight:600;
    color:var(--ink); flex-shrink:0; transition:color .2s ease;
  }
  .statusBar.dark{ color:var(--cream); }
  .statusIcons{ display:flex; gap:5px; align-items:center; }
  .screenBody{ flex:1; position:relative; overflow:hidden; }
  .homeIndicatorWrap{ height:18px; display:flex; justify-content:center; align-items:flex-end; padding-bottom:6px; flex-shrink:0; }
  .homeIndicator{ width:120px; height:4px; border-radius:4px; background:rgba(28,27,25,.3); transition:background .2s ease; }
  .homeIndicator.dark{ background:rgba(255,252,246,.5); }

  .screen{
    height:100%; padding:28px; display:flex; flex-direction:column;
    justify-content:flex-start; font-family:var(--fontBody); color:var(--ink);
    box-sizing:border-box; overflow-y:auto; background:var(--paper);
  }
  .screen.justifyBetween{ justify-content:space-between; }
  .screen.justifyCenter{ justify-content:center; }

  .screenLabel{ font-family:var(--fontMono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--inkSoft); margin-bottom:14px; }

  .btn{
    width:100%; padding:16px 20px; border-radius:14px; border:none;
    background:var(--clay); color:var(--cream); font-family:var(--fontBody);
    font-size:15.5px; font-weight:600; cursor:pointer; transition:all .18s ease;
    box-shadow:0 4px 10px rgba(28,27,25,.12);
  }
  .btn:hover{ transform:translateY(-1px); box-shadow:0 8px 18px rgba(184,100,90,.35); }
  .btn:disabled{ opacity:.4; cursor:default; }
  .btn:disabled:hover{ transform:none; box-shadow:0 4px 10px rgba(28,27,25,.12); }
  .btn.dark{ background:var(--ink); }
  .btn.gold{ background:var(--gold); color:var(--navy); }
  .btn.navy{ background:var(--navy); }

  .btnGhost{
    width:100%; padding:14px 20px; border-radius:14px; border:1px solid var(--line);
    background:transparent; color:var(--ink); font-family:var(--fontBody);
    font-size:14.5px; font-weight:600; cursor:pointer;
  }
  .btnGhost:disabled{ opacity:.4; cursor:default; }

  .textLink{
    background:none; border:none; color:var(--inkSoft); font-family:var(--fontBody);
    font-size:13px; cursor:pointer; text-decoration:underline; text-decoration-color:var(--line); padding:0;
  }

  h1.disp{ font-family:var(--fontDisplay); margin:8px 0 18px; line-height:1.2; }
  .bodyMuted{ font-size:13.5px; color:var(--inkSoft); }

  .row{ display:flex; gap:10px; }
  .col{ display:flex; flex-direction:column; gap:10px; }

  input.field{
    padding:15px 16px; border-radius:12px; border:1px solid var(--line);
    background:var(--cream); font-family:var(--fontBody); font-size:14.5px; outline:none; width:100%;
  }

  .trustNote{ margin-top:22px; padding:12px 14px; border-radius:12px; background:var(--paperDeep); font-size:12px; color:var(--inkSoft); line-height:1.5; }

  .otpRow{ display:flex; gap:8px; justify-content:center; }
  .otpBox{
    width:38px; height:48px; border-radius:10px; border:1.5px solid var(--line);
    background:var(--cream); display:flex; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer; color:var(--clay); transition:border-color .15s ease;
  }
  .otpBox.filled{ border-color:var(--clay); }

  .checkRow{ display:flex; align-items:center; gap:12px; }
  .checkDot{
    width:20px; height:20px; border-radius:50%; border:1.5px solid rgba(255,252,246,.3);
    display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--navy);
    flex-shrink:0; transition:all .3s ease;
  }
  .checkDot.done{ background:var(--gold); border-color:var(--gold); }

  .naomiRow{ display:flex; gap:8px; align-items:flex-start; margin-bottom:12px; }
  .naomiAvatar{
    width:28px; height:28px; border-radius:50%; background:var(--navy); color:var(--goldSoft);
    font-family:var(--fontDisplay); font-style:italic; font-size:13px; display:flex;
    align-items:center; justify-content:center; flex-shrink:0;
  }
  .naomiAvatar.onDark{ background:var(--gold); color:var(--navy); width:32px; height:32px; font-size:15px; }
  .naomiBubble{
    background:var(--cream); border:1px solid var(--line); border-radius:4px 16px 16px 16px;
    padding:12px 15px; font-size:14px; line-height:1.5; max-width:78%; font-family:var(--fontDisplay);
  }
  .userRow{ display:flex; justify-content:flex-end; margin-bottom:12px; }
  .userBubble{ background:var(--clay); color:var(--cream); border-radius:16px 4px 16px 16px; padding:11px 16px; font-size:14px; max-width:72%; }

  .trustThread{ display:flex; gap:4px; align-items:center; height:36px; }
  .trustSeg{ width:26px; height:5px; border-radius:4px; background:var(--line); transition:background .3s ease; }
  .trustSeg.done{ background:var(--navy); }
  .trustSeg.doneGold{ background:var(--gold); }
  .trustSeg.current{ background:var(--clay); }

  .dnaCard{ border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:12px; background:var(--cream); }
  .dnaCardTitle{ font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--inkSoft); margin-bottom:10px; }
  .tagRow{ display:flex; flex-wrap:wrap; gap:7px; }
  .tag{ font-size:12.5px; padding:5px 11px; border-radius:20px; background:var(--clayBg); color:var(--clayDeep); }
  .tag.ok{ background:var(--okBg); color:var(--ok); }
  .tag.muted{ background:var(--paperDeep); color:var(--inkSoft); }
  .orderedItem{ display:flex; gap:9px; font-size:13.5px; margin-bottom:7px; }
  .orderedItem .num{ font-family:var(--fontMono); color:var(--clay); font-weight:700; }

  .navyBox{ background:var(--navy); border-radius:16px; padding:18px; color:var(--cream); }
  .navyBoxLabel{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--goldSoft); margin-bottom:12px; }
  .navyBoxItem{ display:flex; gap:10px; font-size:13px; line-height:1.4; margin-bottom:10px; }

  .docBox{
    height:200px; border-radius:16px; border:2px dashed var(--line); background:var(--cream);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; cursor:pointer;
  }
  .docBox.captured{ border-color:var(--ok); background:var(--okBg); }

  .progressTrack{ height:8px; border-radius:6px; background:var(--paperDeep); overflow:hidden; margin-bottom:8px; }
  .progressFill{ height:100%; background:var(--clay); }

  .unlockItem{ display:flex; gap:10px; align-items:center; padding:12px 14px; border-radius:12px; background:var(--clayBg); margin-bottom:9px; }

  .navRow{ display:flex; gap:10px; align-items:center; }
  .backBtn{
    padding:9px 16px; border-radius:10px; border:1px solid var(--line); background:var(--cream);
    font-size:12.5px; cursor:pointer; font-family:var(--fontBody);
  }
  .backBtn:disabled{ opacity:.4; cursor:default; }
  .stepBadge{ font-family:var(--fontMono); font-size:11px; color:var(--inkSoft); padding:9px 14px; border-radius:10px; background:var(--paperDeep); }

  .jumpNav{ width:230px; max-height:740px; overflow-y:auto; background:var(--cream); border:1px solid var(--line); border-radius:18px; padding:16px; }
  .jumpNav .jnTitle{ font-family:var(--fontMono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--inkSoft); margin-bottom:12px; }
  .jnSection{ margin-bottom:10px; }
  .jnSection .jnSecLabel{ font-size:11px; font-weight:700; color:var(--clayDeep); margin-bottom:5px; }
  .jnBtn{
    display:block; width:100%; text-align:left; padding:6px 9px; border-radius:8px; border:none;
    background:transparent; color:var(--ink); font-weight:400; font-size:12px; cursor:pointer; font-family:var(--fontBody);
  }
  .jnBtn.active{ background:var(--clayBg); color:var(--clayDeep); font-weight:700; }

  @media (max-width: 760px){
    .layout{ flex-direction:column; align-items:center; }
    .jumpNav{ width:360px; max-height:260px; }
  }
</style>
</head>
<body>

  <div class="pageHeader">
    <div class="eyebrow">Naomi &middot; Clickable Prototype</div>
    <h1>Awareness &rarr; Onboarding &rarr; Relationship DNA &rarr; Activation</h1>
    <p>Click through the phone like a real user. Matching &amp; first-date flows are out of scope for this pass.</p>
  </div>

  <div class="layout">
    <div class="phoneCol">
      <div class="phoneFrame">
        <div class="phoneScreen">
          <div class="statusBar" id="statusBar">
            <span>9:41</span>
            <div class="statusIcons" id="statusIcons"></div>
          </div>
          <div class="screenBody" id="screenBody"></div>
          <div class="homeIndicatorWrap">
            <div class="homeIndicator" id="homeIndicator"></div>
          </div>
        </div>
      </div>
      <div class="navRow">
        <button class="backBtn" id="backBtn">&larr; Back</button>
        <div class="stepBadge" id="stepBadge">&mdash;</div>
      </div>
    </div>

    <div class="jumpNav">
      <div class="jnTitle">Jump to screen</div>
      <div id="jumpNavContent"></div>
    </div>
  </div>

<script>
/* ============================================================
   NAOMI — Standalone Clickable Prototype (vanilla JS port)
   Mirrors NaomiPrototype.jsx screen-for-screen, no build step.
   ============================================================ */

const $body = document.getElementById('screenBody');
const $statusBar = document.getElementById('statusBar');
const $statusIcons = document.getElementById('statusIcons');
const $homeIndicator = document.getElementById('homeIndicator');
const $backBtn = document.getElementById('backBtn');
const $stepBadge = document.getElementById('stepBadge');
const $jumpNavContent = document.getElementById('jumpNavContent');

let history = ['splash'];
let timers = [];

function clearTimers(){ timers.forEach(t => clearTimeout(t) || clearInterval(t)); timers = []; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const STATUS_ICONS = `
  <svg width="16" height="11" viewBox="0 0 16 11" fill="none"><g class="sigfill">
  <rect x="0" y="7" width="3" height="4" rx="0.5"/><rect x="4.5" y="5" width="3" height="6" rx="0.5"/>
  <rect x="9" y="3" width="3" height="8" rx="0.5"/><rect x="13.5" y="0" width="3" height="11" rx="0.5"/></g></svg>
  <svg width="15" height="11" viewBox="0 0 15 11" fill="none"><g class="sigfill">
  <path d="M7.5 9.8a1.1 1.1 0 110 2.2 1.1 1.1 0 010-2.2z"/><path d="M4.4 7.2a4.4 4.4 0 016.2 0l-1 1a3 3 0 00-4.2 0l-1-1z"/>
  <path d="M1.8 4.6a8 8 0 0111.4 0l-1 1a6.6 6.6 0 00-9.4 0l-1-1z"/></g></svg>
  <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
  <rect x="0.5" y="0.5" width="20" height="11" rx="2.5" class="sigstroke" opacity="0.5"/>
  <rect x="2" y="2" width="17" height="8" rx="1.5" class="sigfill"/>
  <rect x="21.5" y="4" width="1.5" height="4" rx="0.7" class="sigfill" opacity="0.5"/></svg>
`;
$statusIcons.innerHTML = STATUS_ICONS;

function setStatusDark(dark){
  $statusBar.classList.toggle('dark', dark);
  $homeIndicator.classList.toggle('dark', dark);
  document.querySelectorAll('.sigfill').forEach(el => el.setAttribute('fill', dark ? '#FFFCF6' : '#1C1B19'));
  document.querySelectorAll('.sigstroke').forEach(el => el.setAttribute('stroke', dark ? '#FFFCF6' : '#1C1B19'));
}

// ── QUESTION BANK — 8 psychologically sequenced blocks ───────────────────────
// Block 1–2 are REQUIRED (5 Qs). Block 3–4 are CORE (strongly encouraged, individually skippable).
// Blocks 5–8 are OPTIONAL (can be deferred entirely, returned to later).

const KYC_BLOCKS = [
  {
    id: "b1",
    label: "About you",
    color: "var(--navy)",
    textColor: "var(--cream)",
    barColor: "var(--gold)",
    required: true,
    goal: "A light introduction — your daily life and where you are right now.",
    questions: [
      { id:"b1q1", q:"Where do you live, and do you love it there?",              hint:"City, neighbourhood, or just the vibe — whatever feels true." },
      { id:"b1q2", q:"What do you do for work — in your own words?",              hint:"Not your job title. What you actually do day to day." },
      { id:"b1q3", q:"What does a typical day look like for you?",                hint:"Walk us through it. Morning through evening." },
      { id:"b1q4", q:"What do you enjoy doing in your free time?",               hint:"The things you actually do, not just the things you say you do." },
      { id:"b1q5", q:"What kind of relationship are you looking for?",           hint:"There's no wrong answer — just an honest one." },
    ]
  },
  {
    id: "b2",
    label: "What drives you",
    color: "var(--navy)",
    textColor: "var(--cream)",
    barColor: "var(--gold)",
    required: true,
    goal: "What engages and motivates you internally.",
    questions: [
      { id:"b2q1", q:"What are you genuinely passionate about right now?",        hint:"Not what you think sounds good. What actually lights you up." },
      { id:"b2q2", q:"What activities make you lose track of time?",              hint:"The thing where you look up and two hours have passed." },
      { id:"b2q3", q:"What motivates you most in life?",                         hint:"Recognition, growth, freedom, love — or something else entirely?" },
      { id:"b2q4", q:"What's something new you've recently become interested in?", hint:"Could be anything. Big or small." },
      { id:"b2q5", q:"Do you prefer stability, growth, or adventure right now?",  hint:"Or a combination — tell Naomi how you'd put it." },
    ]
  },
  {
    id: "b3",
    label: "How you think",
    color: "var(--paper)",
    textColor: "var(--ink)",
    barColor: "var(--clay)",
    required: false,
    goal: "Your decision-making style and how you handle uncertainty.",
    questions: [
      { id:"b3q1", q:"How do you usually make important decisions?",               hint:"Gut feeling, research, talking it through — what's your process?" },
      { id:"b3q2", q:"Do you rely more on logic, intuition, or a mix of both?",   hint:"No right answer. Naomi just wants to understand how your mind works.", optional: true },
      { id:"b3q3", q:"Do you prefer planning ahead or going with the flow?",       hint:"Or does it depend? Tell Naomi when and why." },
      { id:"b3q4", q:"What is harder for you — starting something new or finishing what you started?", hint:"Most people have a clear answer.", optional: true },
      { id:"b3q5", q:"How do you handle uncertainty?",                             hint:"The moments when you don't know what comes next.", optional: true },
    ]
  },
  {
    id: "b4",
    label: "Emotions & stress",
    color: "var(--paper)",
    textColor: "var(--ink)",
    barColor: "var(--clay)",
    required: false,
    goal: "Emotional regulation and how you behave under pressure.",
    questions: [
      { id:"b4q1", q:"How do you usually react when you're stressed?",            hint:"What does stress actually look like for you?" },
      { id:"b4q2", q:"How do you behave during disagreements?",                   hint:"Do you go quiet, talk it out, need space, or something else?" },
      { id:"b4q3", q:"Do you prefer to talk things out immediately or take space first?", hint:"In relationships and with people close to you.", optional: true },
      { id:"b4q4", q:"What kinds of behaviour from others bother you most?",       hint:"Not a dealbreaker list — just what genuinely gets to you.", optional: true },
      { id:"b4q5", q:"How long does it usually take you to cool down after an argument?", hint:"Be honest. There's no impressive answer here.", optional: true },
    ]
  },
  {
    id: "b5",
    label: "People & connection",
    color: "var(--paper)",
    textColor: "var(--ink)",
    barColor: "var(--clay)",
    required: false,
    goal: "Empathy, social style, and how you relate to others.",
    questions: [
      { id:"b5q1", q:"What kind of people do you naturally connect with?",         hint:"What do they tend to have in common?", optional: true },
      { id:"b5q2", q:"How do you usually react when someone disappoints you?",     hint:"Your first instinct and what you do with it.", optional: true },
      { id:"b5q3", q:"Do you find it easy or difficult to forgive others?",        hint:"Be specific if you can.", optional: true },
      { id:"b5q4", q:"How important is loyalty in friendships and relationships?", hint:"What does loyalty actually mean to you?", optional: true },
      { id:"b5q5", q:"Who do you genuinely admire, and why?",                      hint:"Someone real — living or not.", optional: true },
    ]
  },
  {
    id: "b6",
    label: "Values",
    color: "var(--paper)",
    textColor: "var(--ink)",
    barColor: "var(--clay)",
    required: false,
    goal: "Your ethical foundation and what you won't compromise on.",
    questions: [
      { id:"b6q1", q:"What is absolutely unacceptable for you in a relationship?",  hint:"The things you know, not just the things you think.", optional: true },
      { id:"b6q2", q:"What does honesty mean to you in practice?",                  hint:"Not the definition — how you actually live it.", optional: true },
      { id:"b6q3", q:"Are there things you would never forgive?",                   hint:"This takes courage to answer honestly.", optional: true },
      { id:"b6q4", q:"What matters more to you: honesty or emotional comfort?",     hint:"When they conflict — which wins?", optional: true },
      { id:"b6q5", q:"Do you think people can change their core values over time?",  hint:"And has it ever happened to you?", optional: true },
    ]
  },
  {
    id: "b7",
    label: "Self-awareness",
    color: "var(--paper)",
    textColor: "var(--ink)",
    barColor: "var(--clay)",
    required: false,
    goal: "Introspection, psychological depth, and how well you know yourself.",
    questions: [
      { id:"b7q1", q:"What do you think is your biggest weakness?",                 hint:"The one you'd actually admit to.", optional: true },
      { id:"b7q2", q:"What criticism do you hear most often from others?",          hint:"Even if you don't fully agree with it.", optional: true },
      { id:"b7q3", q:"What do people often misunderstand about you?",               hint:"Something that surprises people once they know you better.", optional: true },
      { id:"b7q4", q:"What is something you are still learning about yourself?",    hint:"It's okay if the answer is uncertain.", optional: true },
      { id:"b7q5", q:"In what situations do you act differently than you'd like to?", hint:"No judgement. Just honesty.", optional: true },
    ]
  },
  {
    id: "b8",
    label: "Relationships",
    color: "var(--paper)",
    textColor: "var(--ink)",
    barColor: "var(--clay)",
    required: false,
    goal: "Romantic patterns, attachment style, and what you're actually like in love.",
    questions: [
      { id:"b8q1", q:"What does a healthy relationship look like to you?",          hint:"The day-to-day, not just the big picture.", optional: true },
      { id:"b8q2", q:"How do you usually show care in relationships?",              hint:"Actions, words, presence — how does it show up?", optional: true },
      { id:"b8q3", q:"What is most difficult for you in relationships?",            hint:"The pattern you keep running into.", optional: true },
      { id:"b8q4", q:"Do you have kids, or would you like to?",                    hint:"There's no wrong answer — Naomi just needs to know.", optional: true },
      { id:"b8q5", q:"Do you prefer closeness or independence in relationships?",   hint:"Or somewhere in between — and where exactly?", optional: true },
    ]
  },
];

// Flatten questions with block metadata for the question renderer
const ALL_QUESTIONS = KYC_BLOCKS.flatMap(b =>
  b.questions.map(q => ({ ...q, blockId: b.id, blockLabel: b.label, blockColor: b.color, blockTextColor: b.textColor, blockBarColor: b.barColor, blockRequired: b.required }))
);

// Required questions (blocks 1-2, all 10)
const REQUIRED_IDS = new Set(
  KYC_BLOCKS.filter(b => b.required).flatMap(b => b.questions.map(q => q.id))
);

// Core questions (blocks 3-4, not optional-flagged)
const CORE_IDS = new Set(
  KYC_BLOCKS.filter(b => !b.required).slice(0,2).flatMap(b => b.questions.filter(q => !q.optional).map(q => q.id))
);

// Progress save/load via localStorage
const SAVE_KEY = 'naomi_kyc_v1';
function saveProgress(answers, blockIdx, qIdx){
  try { localStorage.setItem(SAVE_KEY, JSON.stringify({ answers, blockIdx, qIdx, ts: Date.now() })); } catch(e){}
}
function loadProgress(){
  try { const d = localStorage.getItem(SAVE_KEY); return d ? JSON.parse(d) : null; } catch(e){ return null; }
}
function clearProgress(){
  try { localStorage.removeItem(SAVE_KEY); } catch(e){}
}

// Transcript simulations per question ID (subset — others get generic)
const TRANSCRIPT_SIMS = {

  history.push(id);
  render(id);

function jumpTo(id){

function back(){
  if (history.length < 2) return;

  render(history[history.length - 1], true);
}

function trustThreadHTML(stage){
  let html = '<div class="trustThread">';
  for (let s = 0; s < 3; s++){
    const done = stage > s, current = stage === s;
    let cls = 'trustSeg';
    if (done) cls += (stage >= 3 ? ' doneGold' : ' done');
    else if (current) cls += ' current';
    html += `<div class="${cls}"></div>`;
  }
  return html + '</div>';
}

function renderOtp(title, sub, nextId, digits){
  let code = new Array(digits).fill('');
  let seconds = 42;
  $body.innerHTML = `
    <div class="screen justifyBetween">
      <div>
        ${sub ? `<div class="screenLabel">${sub}</div>` : ''}
        <h1 class="disp" style="font-size:24px;margin-bottom:8px;">${title}</h1>
        <p class="bodyMuted" style="margin-bottom:24px;">Enter the ${digits}-digit code we sent you.</p>
        <div class="otpRow" id="otpRow"></div>
        <div style="display:flex;justify-content:flex-start;margin-top:18px;">
          <button class="textLink" id="resendLink">Resend in 0:42</button>
        </div>
      </div>
      <button class="btn" id="verifyBtn" style="opacity:.45;">Verify</button>
    </div>`;
  const $row = document.getElementById('otpRow');
  const $verify = document.getElementById('verifyBtn');
  function paintBoxes(){
    $row.innerHTML = code.map((c,i) => `<div class="otpBox ${c ? 'filled':''}" data-i="${i}">${c}</div>`).join('');
    $row.querySelectorAll('.otpBox').forEach(box => {
      box.onclick = () => {
        const i = +box.dataset.i;
        code[i] = code[i] ? '' : '&bull;';
        paintBoxes();
        const filled = code.filter(Boolean).length;
        $verify.style.opacity = filled === digits ? 1 : .45;
      };
    });
  }
  paintBoxes();
  const $resend = document.getElementById('resendLink');
  const timer = setInterval(() => {
    seconds = seconds > 0 ? seconds - 1 : 0;
    $resend.textContent = seconds > 0 ? `Resend in 0:${String(seconds).padStart(2,'0')}` : 'Resend code';
  }, 1000);
  timers.push(timer);
  $resend.onclick = () => { seconds = 42; };
  $verify.onclick = () => { if (code.filter(Boolean).length === digits) go(nextId); };
}

      };

    // Back
    document.getElementById('qBack').onclick = () => {
      stopRecording();
      if (qIdx > 0){ qIdx--; paint(); }
      else if (blockIdx > 0){ blockIdx--; qIdx = KYC_BLOCKS[blockIdx].questions.length-1; paint(); }
      else back();
    };


    // Mic
    document.getElementById('micBtn').onclick = () => {
      if (recording){
        stopRecording();
        if (!answers[q.id]) answers[q.id] = TRANSCRIPT_SIMS[q.id] || GENERIC_SIM;
        paint();
      } else {
        recording = true; answers[q.id]=''; paint();
        const sim = TRANSCRIPT_SIMS[q.id] || GENERIC_SIM;
        const $inp = document.getElementById('kycAnswer');
        if ($inp) $inp.value='';
        let ci=0;
        transcriptTimer = setInterval(()=>{
          const $ta2=document.getElementById('kycAnswer');
          if(!$ta2||!$ta2.isConnected){stopRecording();return;}
          if(ci<=sim.length){
            const chunk=sim.slice(0,ci);
            $ta2.value=chunk; answers[q.id]=chunk;
            $ta2.style.height='auto'; $ta2.style.height=Math.min($ta2.scrollHeight,100)+'px';
            ci++;
          } else {stopRecording();answers[q.id]=sim;paint();}
        },38);
        timers.push(transcriptTimer);
      }
    };

    // Advance
    function advance(){
      stopRecording();
      const $ta=document.getElementById('kycAnswer');
      if($ta) answers[q.id]=$ta.value.trim();
      save();

      // Next question in block
      if (qIdx < block.questions.length-1){ qIdx++; paint(); return; }

      // End of block — move to next
      blockIdx++;
      qIdx=0;

      // All blocks done
      if (blockIdx >= KYC_BLOCKS.length){ go('kycdone'); return; }

      // Required blocks: go straight into next block questions
      if (KYC_BLOCKS[blockIdx].required){ paint(); return; }

      // Optional block: show transition screen with defer option
      showBlockTransition();
    }

    // Next button (require answer for required Qs)
    document.getElementById('nextBtn').onclick = () => {
      const $ta=document.getElementById('kycAnswer');
      if($ta) answers[q.id]=$ta.value.trim();
      if (!isOpt && !answers[q.id]) return; // soft block on required
      advance();
    };

    // Skip (only for optional)
    const $skip = document.getElementById('skipBtn');
    if ($skip) $skip.onclick = () => {
      stopRecording(); skipped[q.id]=true; answers[q.id]=''; advance();
    };
  }

  // Check for saved progress — show resume prompt
  if (saved && (Date.now() - saved.ts) < 48*60*60*1000){
    const completedCount = Object.values(saved.answers).filter(a=>a&&a.trim()).length;

      <div class="screen justifyCenter" style="background:var(--navy);text-align:center;padding:32px;">

        </div>
      </div>`;
    document.getElementById('resumeBtn').onclick = () => paint();
    document.getElementById('restartBtn').onclick = () => {
      clearProgress(); blockIdx=0; qIdx=0; answers={}; paint();
    };
    return;
  }

  paint();
};

        let ci=0;transcriptTimer=setInterval(()=>{const $t2=document.getElementById('ddAnswer');if(!$t2||!$t2.isConnected){stopRecording();return;}if(ci<=sim.length){const ch=sim.slice(0,ci);$t2.value=ch;answers[q.id]=ch;$t2.style.height='auto';$t2.style.height=Math.min($t2.scrollHeight,100)+'px';ci++;}else{stopRecording();answers[q.id]=sim;paint();}},38);timers.push(transcriptTimer);}
    };
    const advance=()=>{stopRecording();const $t=document.getElementById('ddAnswer');if($t)answers[q.id]=$t.value.trim();saveProgress(answers,0,0);ri++;paint();};
    document.getElementById('ddNext').onclick=advance;
    document.getElementById('ddSkip').onclick=()=>{stopRecording();answers[q.id]='';ri++;paint();};
    document.getElementById('ddStop').onclick=()=>go('processing');
  }
  paint();
};


// ── SCHEDULE (keep for "schedule for later" branch) ───────────────────────────
RENDERERS.schedule = function(){
  let confirmed = false;

  const MONTHS = ["January","February","March","April","May","June",
                  "July","August","September","October","November","December"];
  const DAYS_SHORT = ["Su","Mo","Tu","We","Th","Fr","Sa"];

  const today = new Date();
  let viewYear  = today.getFullYear();
  let viewMonth = today.getMonth();
  let selDate   = null;   // Date object, null = none picked yet
  let selTime   = null;   // string like "10:00 AM"

  // Generate 1h slots 9am–8pm
  const ALL_SLOTS = [];
  for (let h = 9; h <= 20; h++){
    const suffix = h < 12 ? 'AM' : 'PM';
    const disp = h <= 12 ? h : h - 12;
    ALL_SLOTS.push(`${disp}:00 ${suffix}`);
  }

  // Simulate availability: weekends unavailable, past days unavailable
  function isAvailable(d){
    const day = d.getDay();
    const isPast = d < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    return day !== 0 && day !== 6 && !isPast;
  }

  function isSameDay(a, b){
    return a && b && a.getFullYear()===b.getFullYear() &&
           a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }

  function paint(){

    // ── CONFIRMED ──────────────────────────────────────────────
    if (confirmed){
      const label = `${MONTHS[selDate.getMonth()]} ${selDate.getDate()} · ${selTime}`;
      $body.innerHTML = `
        <div class="screen justifyCenter" style="padding:32px 28px;text-align:center;">
          <div style="width:56px;height:56px;border-radius:50%;background:var(--okBg);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--ok)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h2 style="font-family:var(--fontDisplay);font-size:22px;margin-bottom:12px;">You&rsquo;re scheduled.</h2>
          <div style="display:inline-block;padding:12px 22px;border-radius:14px;background:var(--paperDeep);border:1px solid var(--line);margin-bottom:18px;">
            <div style="font-family:var(--fontMono);font-size:12px;color:var(--inkSoft);letter-spacing:.08em;">${label}</div>
          </div>
          <p class="bodyMuted" style="font-size:13.5px;margin-bottom:32px;">I&rsquo;ll be ready when you are. You&rsquo;ll get a reminder 1 hour before.</p>
          <button class="btn" id="backStart">Back to start</button>
        </div>`;
      document.getElementById('backStart').onclick = () => go('naomiintro');
      return;
    }

    // ── CALENDAR ───────────────────────────────────────────────
    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const totalDays = new Date(viewYear, viewMonth + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < firstDay; i++) cells.push(null);
    for (let d = 1; d <= totalDays; d++) cells.push(new Date(viewYear, viewMonth, d));

    // Pad to complete last row
    while (cells.length % 7 !== 0) cells.push(null);

    const hasSel = selDate && selDate.getMonth() === viewMonth && selDate.getFullYear() === viewYear;
    const prevDisabled = viewYear === today.getFullYear() && viewMonth === today.getMonth();

    $body.innerHTML = `
      <div class="screen" style="padding:0;background:var(--paper);display:flex;flex-direction:column;height:100%;">

        <!-- Header -->
        <div style="padding:18px 20px 0;flex-shrink:0;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
            <button id="schedBack" style="padding:6px 13px;border-radius:9px;border:1px solid var(--line);background:var(--cream);color:var(--inkSoft);font-size:12px;cursor:pointer;">&larr;</button>
            <div class="screenLabel" style="margin-bottom:0;">schedule for later</div>
          </div>
          <h1 class="disp" style="font-size:21px;margin-bottom:16px;">When works for you?</h1>

          <!-- Month nav -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <button id="prevMonth" style="width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--cream);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;opacity:${prevDisabled?.4:1};" ${prevDisabled?'disabled':''}>&#8249;</button>
            <div style="font-family:var(--fontDisplay);font-size:17px;font-weight:600;">${MONTHS[viewMonth]} ${viewYear}</div>
            <button id="nextMonth" style="width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--cream);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">&#8250;</button>
          </div>

          <!-- Day headers -->
          <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;">
            ${DAYS_SHORT.map(d => `<div style="text-align:center;font-family:var(--fontMono);font-size:10px;color:var(--inkSoft);padding:4px 0;">${d}</div>`).join('')}
          </div>

          <!-- Calendar grid -->
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:0;" id="calGrid">
            ${cells.map(d => {
              if (!d) return `<div></div>`;
              const avail = isAvailable(d);
              const isTod = isSameDay(d, today);
              const isSel = isSameDay(d, selDate);
              let bg = 'transparent', color = avail ? 'var(--ink)' : 'var(--line)', border = 'none', fw = '400';
              if (isSel) { bg = 'var(--clay)'; color = 'var(--cream)'; fw = '700'; }
              else if (isTod) { border = '1.5px solid var(--clay)'; color = 'var(--clay)'; fw = '600'; }
              return `<button class="calDay" data-ts="${d.getTime()}" style="aspect-ratio:1;border-radius:50%;border:${border};background:${bg};color:${color};font-size:13px;font-weight:${fw};cursor:${avail?'pointer':'default'};display:flex;align-items:center;justify-content:center;">${d.getDate()}</button>`;
            }).join('')}
          </div>
        </div>

        <!-- Time slots — revealed after date pick -->
        ${hasSel ? `
        <div style="flex:1;overflow-y:auto;padding:16px 20px 20px;border-top:1px solid var(--line);margin-top:14px;">
          <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--inkSoft);margin-bottom:10px;">
            ${MONTHS[selDate.getMonth()].slice(0,3)} ${selDate.getDate()} &middot; available times
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;" id="timeList">
            ${ALL_SLOTS.map(t => `
              <button class="slotBtn" data-t="${t}" style="width:100%;padding:14px 16px;border-radius:12px;border:1.5px solid ${selTime===t?'var(--clay)':'var(--line)'};background:${selTime===t?'var(--clayBg)':'var(--cream)'};color:${selTime===t?'var(--clayDeep)':'var(--ink)'};font-size:14px;font-weight:${selTime===t?'700':'400'};cursor:pointer;text-align:center;">${t}</button>`).join('')}
          </div>
        </div>
        <div style="padding:14px 20px;flex-shrink:0;border-top:1px solid var(--line);">
          <button class="btn" id="confirmSched" style="opacity:${selTime?1:.4};">Confirm ${selTime?selTime:''}</button>
        </div>` : `
        <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:20px;">
          <p style="font-size:13.5px;color:var(--inkSoft);text-align:center;line-height:1.6;">Select a date above<br>to see available times.</p>
        </div>`}
      </div>`;

    // Wire back
    document.getElementById('schedBack').onclick = () => back();

    // Month nav
    if (!prevDisabled) {
      document.getElementById('prevMonth').onclick = () => {
        if (viewMonth === 0) { viewMonth = 11; viewYear--; } else viewMonth--;
        selDate = null; selTime = null; paint();
      };
    }
    document.getElementById('nextMonth').onclick = () => {
      if (viewMonth === 11) { viewMonth = 0; viewYear++; } else viewMonth++;
      selDate = null; selTime = null; paint();
    };

    // Calendar day clicks
    document.querySelectorAll('.calDay').forEach(btn => {
      btn.onclick = () => {
        const d = new Date(+btn.dataset.ts);
        if (!isAvailable(d)) return;
        selDate = d; selTime = null; paint();
        // Scroll time list into view
        setTimeout(() => {
          const tl = document.getElementById('timeList');
          if (tl) tl.scrollIntoView({ behavior:'smooth', block:'start' });
        }, 100);
      };
    });

    // Time slot clicks
    document.querySelectorAll('.slotBtn').forEach(btn => {
      btn.onclick = () => { selTime = btn.dataset.t; paint(); };
    });

    // Confirm
    const $conf = document.getElementById('confirmSched');
    if ($conf) $conf.onclick = () => { if (selTime) { confirmed = true; paint(); } };
  }

  paint();
};

/* ============================================================
   Frame orchestration
   ============================================================ */
function render(id, skipPush){
  clearTimers();
  RENDERERS[id]();
  setStatusDark(DARK_STATUS_SCREENS.has(id));
  const idx = FLOW_ORDER.indexOf(id);
  $stepBadge.textContent = `${SECTION_LABELS[id] || '—'} · ${idx >= 0 ? idx + 1 : '?'}/${FLOW_ORDER.length}`;
  $backBtn.disabled = history.length < 2;
  paintJumpNav(id);
}

function paintJumpNav(current){
  const groups = {};
  FLOW_ORDER.forEach(id => {
    const sec = SECTION_LABELS[id] || '—';
    (groups[sec] = groups[sec] || []).push(id);
  });
  $jumpNavContent.innerHTML = Object.entries(groups).map(([sec, ids]) => `
    <div class="jnSection">
      <div class="jnSecLabel">${sec}</div>
      ${ids.map(id => `<button class="jnBtn ${id === current ? 'active' : ''}" data-id="${id}">${id}</button>`).join('')}
    </div>`).join('');
  $jumpNavContent.querySelectorAll('.jnBtn').forEach(b => {
    b.onclick = () => jumpTo(b.dataset.id);
  });
}

$backBtn.onclick = back;

render('splash');
